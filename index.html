<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Photo AI" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/css/style.css" />
    <title>Photo Composition AI - Pro</title>
</head>
<body>
    <div id="root">
        <div class="camera-container" id="app">
            <div class="video-wrapper" id="videoWrapper">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="canvas-output"></canvas>
                <div class="overlay-grid" id="overlayGrid"></div>
                <div class="guide-label" id="guideLabel">REGRA DOS TERÇOS</div>

                <div class="focus-indicator" id="focusIndicator"></div>

                <div class="aperture-control" id="apertureControl">
                    <div class="label">📸 Abertura</div>
                    <div class="value" id="apertureValue">f/2.8</div>
                    <div class="sub">Profundidade</div>
                    <input type="range" class="aperture-slider" id="apertureSlider" min="0" max="8" value="2" step="1" />
                </div>

                <div class="zoom-slider" id="zoomSlider">
                    <div class="thumb" id="zoomThumb" style="top:50%;"></div>
                </div>

                <div class="loading-indicator" id="loadingIndicator">
                    <span class="spinner"></span>
                    <span class="text">Carregando IA...</span>
                </div>

                <div class="camera-selector" id="cameraSelector"></div>

                <div class="score-panel">
                    <div class="score-item"><span>Comp</span><span class="score-value" id="compScore">--</span></div>
                    <div class="score-item"><span>Luz</span><span class="score-value" id="lightScore">--</span></div>
                    <div class="score-item"><span>Quadro</span><span class="score-value" id="frameScore">--</span></div>
                    <div class="score-item" style="border-top:1px solid rgba(255,255,255,0.03);padding-top:1px;margin-top:1px">
                        <span>Geral</span>
                        <span class="score-value" style="color:#fbbf24" id="overallScore">--</span>
                    </div>
                </div>

                <div class="timer-badge" id="timerBadge">00:00</div>
                <div class="ai-suggestion" id="aiSuggestion">📸 Toque na tela para focar</div>

                <div class="bottom-controls">
                    <div class="mode-filters">
                        <button class="mode-filter-btn active" data-mode="camera">📷 Foto</button>
                        <button class="mode-filter-btn" data-mode="video">🎥 Vídeo</button>
                        <button class="mode-filter-btn" data-mode="portrait">👤 Retrato <span class="badge">Pro</span></button>
                        <button class="mode-filter-btn" data-mode="cinema">🎬 Cinema <span class="badge">Pro</span></button>
                    </div>

                    <div class="composition-scroll" id="compositionScroll">
                        <!-- Preenchido pelo JavaScript -->
                    </div>

                    <div class="action-buttons">
                        <button class="action-btn" id="flipBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 8v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/>
                                <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
                                <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0"/>
                            </svg>
                        </button>
                        <button class="shutter-btn" id="shutterBtn">
                            <div class="record-dot"></div>
                        </button>
                        <button class="action-btn" id="apertureBtn">⭕</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>
    
    <!-- App principal -->
    <script src="/js/app.js"></script>
</body>
</html>
