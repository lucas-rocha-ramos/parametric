<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Photo AI" />
    <link rel="manifest" href="/manifest.json" />
    <title>Photo Composition AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }
        #root {
            height: 100%;
            width: 100%;
            background: #000;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .overlay-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .grid-line {
            position: absolute;
            background: rgba(255, 215, 0, 0.5);
        }
        .guide-label {
            position: absolute;
            color: rgba(255, 215, 0, 0.9);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 12px;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 6;
            backdrop-filter: blur(4px);
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
            z-index: 20;
        }
        .ctrl-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.3);
        }
        .shutter-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .shutter-btn:active {
            transform: scale(0.9);
        }
        .score-panel {
            position: absolute;
            top: 20px;
            right: 16px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 10px 14px;
            min-width: 90px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            pointer-events: none;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 2px 0;
            color: #eee;
        }
        .score-value {
            font-weight: 700;
            color: #fbbf24;
        }
        .ai-suggestion {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #fbbf24;
            white-space: nowrap;
            z-index: 15;
            max-width: 85%;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }
        .guide-selector {
            position: absolute;
            top: 80px;
            left: 12px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 55%;
            overflow-y: auto;
            pointer-events: auto;
        }
        .guide-chip {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ddd;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            text-align: left;
        }
        .guide-chip.active {
            background: rgba(255, 215, 0, 0.25);
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .mode-tabs {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: auto;
        }
        .mode-tab {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #aaa;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            background: transparent;
            border: none;
            -webkit-tap-highlight-color: transparent;
        }
        .mode-tab.active {
            background: #fbbf24;
            color: #000;
        }
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 30px;
            text-align: center;
        }
        .permission-overlay h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        .permission-overlay p {
            color: #aaa;
            font-size: 16px;
            max-width: 300px;
            margin-bottom: 20px;
        }
        .permission-btn {
            background: #fbbf24;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            color: #000;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
        }
        @media (max-width: 430px) {
            .score-panel {
                padding: 8px 10px;
                min-width: 70px;
            }
            .score-item {
                font-size: 10px;
            }
            .guide-chip {
                font-size: 10px;
                padding: 4px 10px;
            }
            .ctrl-btn {
                width: 48px;
                height: 48px;
                font-size: 18px;
            }
            .shutter-btn {
                width: 64px;
                height: 64px;
            }
            .ai-suggestion {
                font-size: 13px;
                padding: 8px 16px;
                bottom: 110px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // Versão simplificada e robusta para iPhone
        (function() {
            const root = document.getElementById('root');

            // Estado
            let facingMode = 'environment';
            let currentGuide = 'regra-dos-tercos';
            let stream = null;
            let isCameraReady = false;
            let videoElement = null;

            // Elementos
            const createApp = () => {
                root.innerHTML = `
                    <div class="camera-container" id="app">
                        <div class="video-wrapper">
                            <video id="video" autoplay playsinline muted></video>
                            <div class="overlay-grid" id="overlayGrid"></div>
                            <div class="guide-label" id="guideLabel">Regra dos Terços</div>
                            
                            <div class="score-panel">
                                <div class="score-item"><span>Composição</span><span class="score-value" id="compScore">78%</span></div>
                                <div class="score-item"><span>Iluminação</span><span class="score-value" id="lightScore">65%</span></div>
                                <div class="score-item"><span>Enquadramento</span><span class="score-value" id="frameScore">72%</span></div>
                                <div class="score-item" style="border-top:1px solid rgba(255,255,255,0.1);padding-top:4px;margin-top:2px">
                                    <span>Geral</span>
                                    <span class="score-value" style="color:#fbbf24" id="overallScore">72</span>
                                </div>
                            </div>

                            <div class="ai-suggestion" id="suggestion">Aponte para um objeto principal</div>

                            <div class="guide-selector" id="guideSelector">
                                ${['regra-dos-tercos','triangulo','espiral-fibonacci','simetria','diagonais','proporcao-aurea'].map(g => `
                                    <div class="guide-chip ${g === currentGuide ? 'active' : ''}" data-guide="${g}">
                                        ${g.replace(/-/g,' ')}
                                    </div>
                                `).join('')}
                            </div>

                            <div class="mode-tabs">
                                <button class="mode-tab active" data-mode="camera">Câmera</button>
                                <button class="mode-tab" data-mode="learn">Aprender</button>
                                <button class="mode-tab" data-mode="reference">Referência</button>
                            </div>

                            <div class="controls">
                                <button class="ctrl-btn" id="flipBtn">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M4 8v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/>
                                        <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
                                        <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0"/>
                                    </svg>
                                </button>
                                <button class="shutter-btn" id="shutterBtn"></button>
                                <button class="ctrl-btn" id="zoomBtn">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="11" cy="11" r="8"/>
                                        <path d="m21 21-4.35-4.35"/>
                                        <path d="M11 8v6"/>
                                        <path d="M8 11h6"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                videoElement = document.getElementById('video');
                
                // Eventos
                document.getElementById('flipBtn').addEventListener('click', toggleCamera);
                document.getElementById('shutterBtn').addEventListener('click', capturePhoto);
                document.getElementById('zoomBtn').addEventListener('click', () => {
                    // Zoom simples
                });

                document.querySelectorAll('.guide-chip').forEach(chip => {
                    chip.addEventListener('click', function() {
                        document.querySelectorAll('.guide-chip').forEach(c => c.classList.remove('active'));
                        this.classList.add('active');
                        currentGuide = this.dataset.guide;
                        updateGuide();
                    });
                });

                document.querySelectorAll('.mode-tab').forEach(tab => {
                    tab.addEventListener('click', function() {
                        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                        this.classList.add('active');
                    });
                });

                // Iniciar câmera
                startCamera();
            };

            // Função para iniciar a câmera
            const startCamera = async () => {
                try {
                    const constraints = {
                        video: {
                            facingMode: facingMode,
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false
                    };

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    if (videoElement) {
                        videoElement.srcObject = stream;
                        await videoElement.play();
                        isCameraReady = true;
                        console.log('✅ Câmera iniciada com sucesso!');
                    }
                } catch (error) {
                    console.error('❌ Erro ao iniciar câmera:', error);
                    showPermissionError(error.message);
                }
            };

            // Mostrar erro de permissão
            const showPermissionError = (msg) => {
                const overlay = document.createElement('div');
                overlay.className = 'permission-overlay';
                overlay.id = 'permissionOverlay';
                overlay.innerHTML = `
                    <h2>📷 Acesso à Câmera</h2>
                    <p>O Photo Composition AI precisa acessar sua câmera para funcionar.</p>
                    <button class="permission-btn" id="retryBtn">Permitir Acesso</button>
                    <div class="error-msg">${msg || 'Toque no botão acima e permita o acesso no Safari'}</div>
                `;
                document.querySelector('.video-wrapper').appendChild(overlay);
                
                document.getElementById('retryBtn').addEventListener('click', () => {
                    overlay.remove();
                    startCamera();
                });
            };

            // Trocar câmera
            const toggleCamera = () => {
                facingMode = facingMode === 'environment' ? 'user' : 'environment';
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                startCamera();
            };

            // Capturar foto
            const capturePhoto = () => {
                if (!videoElement || !isCameraReady) {
                    alert('Aguarde a câmera iniciar');
                    return;
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = videoElement.videoWidth || 1280;
                canvas.height = videoElement.videoHeight || 720;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg');
                
                // Mostrar preview
                const preview = document.createElement('div');
                preview.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
                preview.innerHTML = `
                    <img src="${dataUrl}" style="max-width:100%;max-height:70%;border-radius:12px;object-fit:contain;" />
                    <div style="margin-top:20px;display:flex;gap:20px;">
                        <button style="background:#fbbf24;border:none;padding:12px 30px;border-radius:30px;font-weight:600;font-size:16px;" onclick="this.closest('div').remove()">Fechar</button>
                        <button style="background:#333;border:none;padding:12px 30px;border-radius:30px;color:white;font-size:16px;" onclick="downloadPhoto('${dataUrl}')">Salvar</button>
                    </div>
                `;
                document.body.appendChild(preview);
                
                // Atualizar scores (simulação)
                document.getElementById('compScore').textContent = Math.floor(60 + Math.random() * 35) + '%';
                document.getElementById('lightScore').textContent = Math.floor(50 + Math.random() * 40) + '%';
                document.getElementById('frameScore').textContent = Math.floor(55 + Math.random() * 40) + '%';
                document.getElementById('overallScore').textContent = Math.floor(55 + Math.random() * 40);
                
                // Sugestão aleatória
                const tips = ['Composição excelente!', 'Ajuste a iluminação', 'Enquadramento perfeito', 'Tente um ângulo diferente', 'Posicione melhor o objeto'];
                document.getElementById('suggestion').textContent = tips[Math.floor(Math.random() * tips.length)];
            };

            // Download
            window.downloadPhoto = (url) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = `photo-${Date.now()}.jpg`;
                link.click();
            };

            // Atualizar guia
            const updateGuide = () => {
                const grid = document.getElementById('overlayGrid');
                const label = document.getElementById('guideLabel');
                const guideName = {
                    'regra-dos-tercos': 'Regra dos Terços',
                    'triangulo': 'Triângulo',
                    'espiral-fibonacci': 'Espiral de Fibonacci',
                    'simetria': 'Simetria',
                    'diagonais': 'Diagonais',
                    'proporcao-aurea': 'Proporção Áurea'
                };
                label.textContent = guideName[currentGuide] || currentGuide;
                
                // Renderizar grade
                let html = '';
                switch(currentGuide) {
                    case 'regra-dos-tercos':
                        html = `
                            <div class="grid-line" style="left:33.33%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:66.66%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="top:33.33%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:66.66%;left:0;width:100%;height:1px;"></div>
                        `;
                        break;
                    case 'simetria':
                        html = `<div class="grid-line" style="left:50%;top:0;width:1px;height:100%;"></div>`;
                        break;
                    case 'diagonais':
                        html = `
                            <div class="grid-line" style="top:0;left:0;width:100%;height:1px;transform:rotate(45deg);transform-origin:0 0;"></div>
                            <div class="grid-line" style="bottom:0;right:0;width:100%;height:1px;transform:rotate(-45deg);transform-origin:100% 100%;"></div>
                        `;
                        break;
                    case 'triangulo':
                        html = `
                            <svg width="100%" height="100%" viewBox="0 0 100 100" style="position:absolute;top:0;left:0;">
                                <polygon points="50,5 5,95 95,95" fill="none" stroke="rgba(255,215,0,0.6)" stroke-width="1.5" />
                            </svg>
                        `;
                        break;
                    case 'espiral-fibonacci':
                        html = `
                            <svg width="100%" height="100%" viewBox="0 0 100 100" style="position:absolute;top:0;left:0;">
                                <path d="M50,50 Q60,40 70,50 Q80,60 70,70 Q60,80 50,70 Q40,60 50,50" fill="none" stroke="rgba(255,215,0,0.6)" stroke-width="1.5" />
                                <path d="M50,50 Q40,40 30,50 Q20,60 30,70 Q40,80 50,70" fill="none" stroke="rgba(255,215,0,0.4)" stroke-width="1" />
                            </svg>
                        `;
                        break;
                    default:
                        html = '';
                }
                grid.innerHTML = html;
            };

            // Verificar suporte a getUserMedia
            const checkCameraSupport = () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    root.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;padding:30px;text-align:center;background:#000;color:#fff;">
                            <h2 style="font-size:24px;margin-bottom:10px;">📱 Dispositivo não compatível</h2>
                            <p style="color:#aaa;max-width:300px;">Seu navegador não suporta acesso à câmera. Use um dispositivo com câmera e Safari/Chrome atualizado.</p>
                        </div>
                    `;
                    return false;
                }
                return true;
            };

            // Iniciar app
            if (checkCameraSupport()) {
                createApp();
            }

            // Simular sugestões da IA a cada 5s
            setInterval(() => {
                const suggestionEl = document.getElementById('suggestion');
                if (suggestionEl) {
                    const actions = ['Mova para esquerda', 'Mova para direita', 'Aproxime', 'Afaste', 'Suba a câmera', 'Abaixe a câmera', 'Gire levemente', 'Alinhe ao horizonte', 'Posicione no ponto ideal'];
                    suggestionEl.textContent = actions[Math.floor(Math.random() * actions.length)];
                }
            }, 5000);

        })();
    </script>
</body>
</html>
