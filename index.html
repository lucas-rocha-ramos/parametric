<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Photo AI" />
    <link rel="manifest" href="/manifest.json" />
    <title>Photo Composition AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #root {
            height: 100%;
            width: 100%;
            background: #000;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            touch-action: none;
        }
        #canvas-output {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            display: none;
            image-rendering: auto;
        }
        #canvas-output.active {
            display: block;
        }
        #canvas-lowres {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            display: none;
            image-rendering: pixelated;
        }
        #canvas-lowres.active {
            display: block;
        }
        .overlay-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .grid-line {
            position: absolute;
            background: rgba(255, 215, 0, 0.5);
        }
        .guide-label {
            position: absolute;
            color: rgba(255, 215, 0, 0.9);
            font-size: 11px;
            background: rgba(0, 0, 0, 0.7);
            padding: 3px 10px;
            border-radius: 12px;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 6;
            backdrop-filter: blur(4px);
            pointer-events: none;
            text-align: center;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .guide-label .position-indicator {
            display: block;
            font-size: 9px;
            color: rgba(255,215,0,0.6);
            margin-top: 1px;
        }
        
        .focus-indicator {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 2px solid #fbbf24;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(251, 191, 36, 0.08);
        }
        .focus-indicator.active {
            opacity: 1;
            animation: focusPulse 0.4s ease-out;
        }
        @keyframes focusPulse {
            0% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
        }
        
        .aperture-control {
            position: absolute;
            bottom: 190px;
            right: 12px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 10px 12px;
            border: 1px solid rgba(255,215,0,0.12);
            z-index: 12;
            min-width: 80px;
            display: none;
        }
        .aperture-control.active {
            display: block;
        }
        .aperture-control .label {
            font-size: 8px;
            color: #888;
            text-align: center;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }
        .aperture-control .value {
            font-size: 18px;
            font-weight: 700;
            color: #fbbf24;
            text-align: center;
        }
        .aperture-control .sub {
            font-size: 8px;
            color: #666;
            text-align: center;
        }
        .aperture-slider {
            width: 100%;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,215,0,0.15);
            border-radius: 2px;
            outline: none;
            margin-top: 6px;
        }
        .aperture-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fbbf24;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.15);
        }
        .aperture-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fbbf24;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.15);
        }
        
        .zoom-slider {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            z-index: 15;
            display: none;
            touch-action: none;
        }
        .zoom-slider.active {
            display: block;
        }
        .zoom-slider .thumb {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 18px;
            background: #fbbf24;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(251,191,36,0.2);
        }
        
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9) 30%);
            padding: 10px 0 16px 0;
            z-index: 20;
            pointer-events: none;
        }
        .bottom-controls > * {
            pointer-events: auto;
        }
        
        .mode-filters {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 0 10px;
            flex-wrap: wrap;
        }
        .mode-filter-btn {
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.08);
            color: #999;
            padding: 3px 10px;
            border-radius: 14px;
            font-size: 8px;
            font-weight: 600;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }
        .mode-filter-btn.active {
            background: #fbbf24;
            border-color: #fbbf24;
            color: #000;
        }
        .mode-filter-btn:active {
            transform: scale(0.92);
        }
        .mode-filter-btn .badge {
            display: inline-block;
            background: rgba(255,215,0,0.15);
            padding: 0 4px;
            border-radius: 3px;
            font-size: 6px;
            margin-left: 2px;
            color: #fbbf24;
        }
        .mode-filter-btn.active .badge {
            background: rgba(0,0,0,0.15);
            color: #000;
        }
        
        .composition-scroll {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 0 8px 4px 8px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .composition-scroll::-webkit-scrollbar {
            display: none;
        }
        .comp-chip {
            flex: 0 0 auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(6px);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 7px;
            border: 1px solid rgba(255,255,255,0.04);
            color: #aaa;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .comp-chip.active {
            background: rgba(255, 215, 0, 0.12);
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .comp-chip:active {
            transform: scale(0.92);
        }
        .comp-chip .pos-indicator {
            display: block;
            font-size: 5px;
            color: rgba(255,215,0,0.3);
            text-align: center;
            margin-top: 0px;
            font-weight: 400;
        }
        .comp-chip.active .pos-indicator {
            color: #fbbf24;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            padding: 0 16px;
            margin-top: 4px;
        }
        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.08);
            color: #ccc;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active {
            transform: scale(0.88);
            background: rgba(255,255,255,0.12);
        }
        .shutter-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255,255,255,0.25);
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: 0.15s;
            position: relative;
        }
        .shutter-btn:active {
            transform: scale(0.88);
        }
        .shutter-btn.recording {
            background: #ff3b30;
            border-color: #ff3b30;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        .shutter-btn .record-dot {
            width: 14px;
            height: 14px;
            background: #ff3b30;
            border-radius: 3px;
            margin: 0 auto;
            transition: 0.3s;
        }
        .shutter-btn.recording .record-dot {
            border-radius: 50%;
            width: 18px;
            height: 18px;
            background: white;
        }
        
        .score-panel {
            position: absolute;
            top: 12px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 10px;
            padding: 4px 8px;
            min-width: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 20;
            pointer-events: none;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            font-size: 8px;
            padding: 0px 0;
            color: #bbb;
        }
        .score-value {
            font-weight: 700;
            color: #fbbf24;
        }
        .ai-suggestion {
            position: absolute;
            bottom: 135px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 9px;
            font-weight: 500;
            border: 1px solid rgba(255, 215, 0, 0.12);
            color: #fbbf24;
            white-space: nowrap;
            z-index: 15;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            letter-spacing: 0.2px;
        }
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 30px;
            text-align: center;
        }
        .permission-overlay h2 {
            font-size: 18px;
            margin-bottom: 6px;
        }
        .permission-overlay p {
            color: #aaa;
            font-size: 13px;
            max-width: 260px;
            margin-bottom: 14px;
        }
        .permission-btn {
            background: #fbbf24;
            border: none;
            padding: 10px 28px;
            border-radius: 22px;
            font-size: 14px;
            font-weight: 600;
            color: #000;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .permission-btn:active {
            transform: scale(0.95);
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 11px;
            margin-top: 6px;
        }
        .photo-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .photo-preview img, .photo-preview video {
            max-width: 100%;
            max-height: 55%;
            border-radius: 12px;
            object-fit: contain;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .photo-actions {
            margin-top: 14px;
            display: flex;
            gap: 14px;
        }
        .photo-actions button {
            padding: 8px 20px;
            border-radius: 22px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .photo-actions button:active {
            transform: scale(0.95);
        }
        .btn-close {
            background: #fbbf24;
            color: #000;
        }
        .btn-save {
            background: #333;
            color: #fff;
        }
        .timer-badge {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8);
            padding: 2px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            z-index: 30;
            display: none;
        }
        .timer-badge.active {
            display: block;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .camera-selector {
            position: absolute;
            top: 12px;
            left: 8px;
            z-index: 25;
            display: flex;
            gap: 3px;
        }
        .cam-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.06);
            color: #888;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 7px;
            font-weight: 600;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .cam-btn.active {
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .cam-btn:active {
            transform: scale(0.92);
        }
        
        .loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 8;
            color: #fbbf24;
            font-size: 10px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.08);
            display: none;
        }
        .loading-indicator.active {
            display: block;
        }
        .loading-indicator .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,215,0,0.15);
            border-top: 2px solid #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fps-counter {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.15);
            font-size: 8px;
            z-index: 7;
            font-family: monospace;
            pointer-events: none;
            display: none;
        }
        
        @media (max-width: 430px) {
            .score-panel {
                padding: 3px 6px;
                min-width: 50px;
                top: 10px;
                right: 6px;
            }
            .score-item {
                font-size: 7px;
                padding: 0px;
            }
            .mode-filter-btn {
                font-size: 7px;
                padding: 2px 8px;
            }
            .mode-filters {
                gap: 5px;
            }
            .comp-chip {
                font-size: 6px;
                padding: 2px 6px;
            }
            .comp-chip .pos-indicator {
                font-size: 4px;
            }
            .action-btn {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }
            .shutter-btn {
                width: 48px;
                height: 48px;
            }
            .ai-suggestion {
                font-size: 8px;
                padding: 3px 10px;
                bottom: 120px;
                max-width: 92%;
            }
            .guide-label {
                font-size: 8px;
                padding: 2px 8px;
                bottom: 6px;
            }
            .guide-label .position-indicator {
                font-size: 7px;
            }
            .bottom-controls {
                padding: 6px 0 12px 0;
            }
            .cam-btn {
                font-size: 6px;
                padding: 2px 5px;
            }
            .timer-badge {
                font-size: 9px;
                padding: 2px 8px;
                top: 10px;
            }
            .focus-indicator {
                width: 35px;
                height: 35px;
            }
            .zoom-slider {
                height: 80px;
                right: 8px;
            }
            .aperture-control {
                bottom: 170px;
                right: 8px;
                padding: 6px 8px;
                min-width: 60px;
            }
            .aperture-control .value {
                font-size: 14px;
            }
            .aperture-control .label {
                font-size: 7px;
            }
            .aperture-slider::-webkit-slider-thumb {
                width: 12px;
                height: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>
    <script>
        // 15 COMPOSIÇÕES
        const COMPOSITIONS = [
            { id: 'rule-of-thirds', label: 'RULE OF THIRDS', positions: ['padrão', 'invertido', 'vertical', 'horizontal'] },
            { id: 'symmetry', label: 'SYMMETRY', positions: ['vertical', 'horizontal', 'central'] },
            { id: 'phi-grid', label: 'PHI GRID', positions: ['padrão', 'invertido'] },
            { id: 'fibonacci-spiral', label: 'FIBONACCI SPIRAL', positions: ['superior-esquerdo', 'superior-direito', 'inferior-esquerdo', 'inferior-direito'] },
            { id: 'golden-triangles', label: 'GOLDEN TRIANGLES', positions: ['superior', 'inferior', 'esquerda', 'direita'] },
            { id: 'vanishing-point', label: 'VANISHING POINT', positions: ['centro', 'superior', 'inferior', 'esquerda', 'direita'] },
            { id: 'framing-depth', label: 'FRAMING DEPTH', positions: ['padrão', 'invertido'] },
            { id: 'landscape-depth', label: 'LANDSCAPE DEPTH', positions: ['superior', 'inferior'] },
            { id: 'leading-lines', label: 'LEADING LINES', positions: ['direita', 'esquerda', 'centro'] },
            { id: 'lines-patterns', label: 'LINES AND PATTERNS', positions: ['horizontal', 'vertical', 'diagonal', 'curvo'] },
            { id: 'fill-the-frame', label: 'FILL THE FRAME', positions: ['centro', 'superior', 'inferior'] },
            { id: 'negative-space', label: 'NEGATIVE SPACE', positions: ['superior', 'inferior', 'esquerda', 'direita'] },
            { id: 'left-to-right', label: 'LEFT TO RIGHT', positions: ['esquerda→direita', 'direita→esquerda'] },
            { id: 'dynamic-symmetry', label: 'DYNAMIC SYMMETRY', positions: ['padrão', 'invertido'] },
            { id: 'harmonic-armature', label: 'HARMONIC ARMATURE', positions: ['padrão', 'refletido'] }
        ];

        // Valores de abertura (f-stop) com raio de desfoque otimizado
        const APERTURE_VALUES = [
            { label: 'f/1.4', value: 1.4, blur: 8 },
            { label: 'f/2.0', value: 2.0, blur: 7 },
            { label: 'f/2.8', value: 2.8, blur: 6 },
            { label: 'f/4.0', value: 4.0, blur: 4 },
            { label: 'f/5.6', value: 5.6, blur: 3 },
            { label: 'f/8.0', value: 8.0, blur: 2 },
            { label: 'f/11', value: 11, blur: 1 },
            { label: 'f/16', value: 16, blur: 0.5 },
            { label: 'f/22', value: 22, blur: 0 }
        ];

        (function() {
            const root = document.getElementById('root');
            let currentComposition = COMPOSITIONS[0];
            let currentPositionIndex = 0;
            let facingMode = 'environment';
            let stream = null;
            let isCameraReady = false;
            let videoElement = null;
            let canvasOutput = null;
            let canvasLowRes = null;
            let ctxOutput = null;
            let ctxLowRes = null;
            let zoomLevel = 1;
            let currentZoom = 1;
            let isRecording = false;
            let mediaRecorder = null;
            let recordedChunks = [];
            let recordingTimer = null;
            let seconds = 0;
            let availableCameras = [];
            let currentCameraIndex = 0;
            let currentMode = 'camera';
            let currentApertureIndex = 2;
            let isApertureActive = false;
            let isSegmenting = false;
            let segmentationReady = false;
            let bodyPixModel = null;
            let lastSegmentation = null;
            let animationFrame = null;
            let isProcessing = false;
            let frameCount = 0;
            let processEveryNFrames = 3;
            let lowResWidth = 320;
            let lowResHeight = 240;
            let isLowResMode = true;
            let blurCache = {};

            // Elementos
            let focusIndicator = null;
            let apertureControl = null;
            let apertureSlider = null;
            let apertureValueDisplay = null;
            let zoomSlider = null;
            let loadingIndicator = null;

            // Funções de posição
            const getCurrentPosition = () => {
                return currentComposition.positions[currentPositionIndex % currentComposition.positions.length];
            };

            const nextPosition = () => {
                currentPositionIndex = (currentPositionIndex + 1) % currentComposition.positions.length;
                renderGuideOverlay(currentComposition, getCurrentPosition());
                updateChips();
                updateLabel();
            };

            const updateChips = () => {
                document.querySelectorAll('.comp-chip').forEach(chip => {
                    const id = chip.dataset.id;
                    const isActive = id === currentComposition.id;
                    chip.classList.toggle('active', isActive);
                    if (isActive) {
                        const pos = getCurrentPosition();
                        const posDisplay = chip.querySelector('.pos-indicator');

            };

            const updateLabel = () => {
                const label = document.getElementById('guideLabel');
                const pos = getCurrentPosition();
                if (label) {
                    label.innerHTML = `${currentComposition.label} <span class="position-indicator">📍 ${pos}</span>`;
                }
            };

            // Renderizar overlay (simplificado)
            const renderGuideOverlay = (comp, position) => {
                const grid = document.getElementById('overlayGrid');
                if (!grid) return;
                grid.innerHTML = '';
                updateLabel();

                let container = document.createElement('div');
                container.style.cssText = 'width:100%;height:100%;position:relative;';

                const id = comp.id;
                const isInverted = position === 'invertido' || position === 'refletido' || position === 'inferior';

                switch(id) {
                    case 'rule-of-thirds': {
                        const lines = [
                            { left: '33.33%', top: '0', width: '1px', height: '100%' },
                            { left: '66.66%', top: '0', width: '1px', height: '100%' },
                            { top: '33.33%', left: '0', width: '100%', height: '1px' },
                            { top: '66.66%', left: '0', width: '100%', height: '1px' }
                        ];
                        if (position === 'vertical') lines.splice(2, 2);
                        else if (position === 'horizontal') lines.splice(0, 2);

                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            Object.assign(div.style, l);
                            container.appendChild(div);

                    case 'symmetry': {
                        if (position === 'vertical') {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            div.style.cssText = 'left:50%;top:0;width:1px;height:100%;';
                            container.appendChild(div);

                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            div.style.cssText = 'top:50%;left:0;width:100%;height:1px;';
                            container.appendChild(div);

                            const div1 = document.createElement('div');
                            div1.className = 'grid-line';
                            div1.style.cssText = 'left:50%;top:0;width:1px;height:100%;';
                            container.appendChild(div1);
                            const div2 = document.createElement('div');
                            div2.className = 'grid-line';
                            div2.style.cssText = 'top:50%;left:0;width:100%;height:1px;';
                            container.appendChild(div2);
                        }
                        break;
                    }
                    case 'phi-grid': {
                        const ratio = isInverted ? 61.8 : 38.2;
                        const div1 = document.createElement('div');
                        div1.className = 'grid-line';
                        div1.style.cssText = `left:${ratio}%;top:0;width:1px;height:100%;`;
                        container.appendChild(div1);
                        const div2 = document.createElement('div');
                        div2.className = 'grid-line';
                        div2.style.cssText = `top:${ratio}%;left:0;width:100%;height:1px;`;
                        container.appendChild(div2);
                        break;
                    }
                    case 'fibonacci-spiral': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        let cx = 50, cy = 50;
                        if (position === 'superior-esquerdo') { cx = 20; cy = 20; }
                        else if (position === 'superior-direito') { cx = 80; cy = 20; }
                        else if (position === 'inferior-esquerdo') { cx = 20; cy = 80; }
                        else if (position === 'inferior-direito') { cx = 80; cy = 80; }
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M${cx},${cy} Q${cx+10},${cy-10} ${cx+20},${cy} Q${cx+30},${cy+10} ${cx+20},${cy+20} Q${cx+10},${cy+30} ${cx},${cy+20} Q${cx-10},${cy+10} ${cx},${cy}`);
                        path.setAttribute('fill', 'none');
                        path.setAttribute('stroke', 'rgba(255,215,0,0.4)');
                        path.setAttribute('stroke-width', '1.2');
                        svg.appendChild(path);
                        container.appendChild(svg);
                        break;
                    }
                    case 'golden-triangles': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        let points = '50,5 5,95 95,95';
                        if (position === 'inferior') points = '50,95 5,5 95,5';
                        else if (position === 'esquerda') points = '5,50 95,5 95,95';
                        else if (position === 'direita') points = '95,50 5,5 5,95';
                        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                        poly.setAttribute('points', points);
                        poly.setAttribute('fill', 'none');
                        poly.setAttribute('stroke', 'rgba(255,215,0,0.35)');
                        poly.setAttribute('stroke-width', '1');
                        svg.appendChild(poly);
                        container.appendChild(svg);
                        break;
                    }
                    case 'vanishing-point': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        let vx = 50, vy = 50;
                        if (position === 'superior') { vx = 50; vy = 10; }
                        else if (position === 'inferior') { vx = 50; vy = 90; }
                        else if (position === 'esquerda') { vx = 10; vy = 50; }
                        else if (position === 'direita') { vx = 90; vy = 50; }
                        const lines = [[vx,vy,10,10], [vx,vy,90,10], [vx,vy,10,90], [vx,vy,90,90]];
                        lines.forEach(([x1,y1,x2,y2]) => {
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', x1 + '%');
                            line.setAttribute('y1', y1 + '%');
                            line.setAttribute('x2', x2 + '%');
                            line.setAttribute('y2', y2 + '%');
                            line.setAttribute('stroke', 'rgba(255,215,0,0.15)');
                            line.setAttribute('stroke-width', '0.6');
                            svg.appendChild(line);

                        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        dot.setAttribute('cx', vx + '%');
                        dot.setAttribute('cy', vy + '%');

                        dot.setAttribute('fill', 'rgba(255,215,0,0.6)');

                    default: {

                        const div2 = document.createElement('div');

                        div2.style.cssText = 'left:66.66%;top:0;width:1px;height:100%;opacity:0.2;';
                        container.appendChild(div2);

                        div3.className = 'grid-line';
                        div3.style.cssText = 'top:33.33%;left:0;width:100%;height:1px;opacity:0.2;';
                        container.appendChild(div3);

                        div4.className = 'grid-line';

                    }
