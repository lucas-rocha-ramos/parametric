<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Photo AI" />
    <link rel="manifest" href="/manifest.json" />
    <title>Photo Composition AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }
        #root {
            height: 100%;
            width: 100%;
            background: #000;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .overlay-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .grid-line {
            position: absolute;
            background: rgba(255, 215, 0, 0.5);
        }
        .guide-label {
            position: absolute;
            color: rgba(255, 215, 0, 0.9);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 12px;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 6;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
            z-index: 20;
        }
        .ctrl-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.3);
        }
        .shutter-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .shutter-btn:active {
            transform: scale(0.9);
        }
        .score-panel {
            position: absolute;
            top: 20px;
            right: 16px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 10px 14px;
            min-width: 90px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            pointer-events: none;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 2px 0;
            color: #eee;
        }
        .score-value {
            font-weight: 700;
            color: #fbbf24;
        }
        .ai-suggestion {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #fbbf24;
            white-space: nowrap;
            z-index: 15;
            max-width: 85%;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }
        .guide-selector {
            position: absolute;
            top: 80px;
            left: 12px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 3px;
            max-height: 55%;
            overflow-y: auto;
            pointer-events: auto;
            padding-right: 5px;
            width: 150px;
        }
        .guide-selector::-webkit-scrollbar {
            width: 3px;
        }
        .guide-selector::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.3);
            border-radius: 10px;
        }
        .guide-chip {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .guide-chip.active {
            background: rgba(255, 215, 0, 0.25);
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .guide-chip:active {
            transform: scale(0.95);
        }
        .mode-tabs {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: auto;
        }
        .mode-tab {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #aaa;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            background: transparent;
            border: none;
            -webkit-tap-highlight-color: transparent;
        }
        .mode-tab.active {
            background: #fbbf24;
            color: #000;
        }
        .mode-tab:active {
            transform: scale(0.95);
        }
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 30px;
            text-align: center;
        }
        .permission-overlay h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        .permission-overlay p {
            color: #aaa;
            font-size: 16px;
            max-width: 300px;
            margin-bottom: 20px;
        }
        .permission-btn {
            background: #fbbf24;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            color: #000;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .permission-btn:active {
            transform: scale(0.95);
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
        }
        .photo-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .photo-preview img {
            max-width: 100%;
            max-height: 70%;
            border-radius: 12px;
            object-fit: contain;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .photo-actions {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        .photo-actions button {
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .photo-actions button:active {
            transform: scale(0.95);
        }
        .btn-close {
            background: #fbbf24;
            color: #000;
        }
        .btn-save {
            background: #333;
            color: #fff;
        }
        @media (max-width: 430px) {
            .score-panel {
                padding: 8px 10px;
                min-width: 70px;
            }
            .score-item {
                font-size: 10px;
            }
            .guide-chip {
                font-size: 9px;
                padding: 3px 8px;
            }
            .guide-selector {
                width: 130px;
                max-height: 50%;
                top: 75px;
                left: 8px;
                gap: 2px;
            }
            .ctrl-btn {
                width: 48px;
                height: 48px;
                font-size: 18px;
            }
            .shutter-btn {
                width: 64px;
                height: 64px;
            }
            .ai-suggestion {
                font-size: 12px;
                padding: 8px 16px;
                bottom: 110px;
                max-width: 90%;
            }
            .mode-tabs {
                gap: 4px;
                padding: 3px 8px;
                top: 16px;
            }
            .mode-tab {
                font-size: 10px;
                padding: 4px 10px;
            }
            .guide-label {
                font-size: 10px;
                padding: 3px 10px;
                bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // TODAS AS 57 REGRAS DE COMPOSIÇÃO
        const COMPOSITION_RULES = [
            // 🎯 Posicionamento do assunto (6)
            'Regra dos Terços',
            'Proporção Áurea',
            'Espiral Áurea',
            'Regra do Centro',
            'Regra dos Quartos',
            'Regra dos Nove Quadrantes',
            // 📐 Equilíbrio visual (4)
            'Simetria',
            'Assimetria Balanceada',
            'Equilíbrio de Peso Visual',
            'Regra dos Ímpares',
            // 🧭 Linhas e direção do olhar (5)
            'Linhas Guia',
            'Linhas Diagonais',
            'Linhas Horizontais',
            'Linhas Verticais',
            'Pontos de Fuga',
            // 🏗️ Estrutura da cena (5)
            'Enquadramento Natural',
            'Moldura Dentro da Moldura',
            'Camadas',
            'Profundidade de Campo',
            'Sobreposição de Elementos',
            // 🌌 Espaço e área visual (4)
            'Espaço Negativo',
            'Espaço Positivo',
            'Espaço Respirável',
            'Minimalismo na Composição',
            // 🔁 Padrões e repetição (4)
            'Ritmo Visual',
            'Repetição de Formas',
            'Textura',
            'Padrões Geométricos',
            // 🎭 Foco e atenção (5)
            'Ponto Focal Único',
            'Múltiplos Pontos Focais',
            'Contraste de Foco',
            'Isolamento do Sujeito',
            'Bokeh',
            // 🎨 Luz e contraste (6)
            'Luz Dura vs Luz Suave',
            'Contraste Tonal',
            'High Key',
            'Low Key',
            'Silhueta',
            'Contraluz',
            // 📏 Geometria e forma (4)
            'Triângulos Composicionais',
            'Círculos e Curvas',
            'Formas Geométricas Implícitas',
            'Composição Triangular',
            // 🧠 Psicologia visual (4)
            'Hierarquia Visual',
            'Fluxo de Leitura da Imagem',
            'Direção Natural do Olhar',
            'Peso Visual',
            // 🎬 Regras cinematográficas (5)
            'Regra do Olhar',
            'Regra da Cabeça',
            'Plano de Fundo Limpo',
            'Separação de Planos',
            'Enquadramento Narrativo',
            // ⚡ Regras modernas/criativas (5)
            'Quebra Intencional de Regras',
            'Caos Controlado',
            'Composição Abstrata',
            'Minimalismo Extremo',
            'Assimetria Radical'
        ];

        (function() {
            const root = document.getElementById('root');

            // Estado
            let facingMode = 'environment';
            let currentGuide = 'Regra dos Terços';
            let stream = null;
            let isCameraReady = false;
            let videoElement = null;
            let zoomLevel = 1;

            // Função para renderizar o seletor de guias
            const renderGuideSelector = () => {
                return COMPOSITION_RULES.map(rule => `
                    <div class="guide-chip ${rule === currentGuide ? 'active' : ''}" data-guide="${rule}">
                        ${rule}
                    </div>
                `).join('');
            };

            // Função para renderizar a grade
            const renderGuideOverlay = (guide) => {
                const grid = document.getElementById('overlayGrid');
                const label = document.getElementById('guideLabel');
                label.textContent = guide;

                let html = '';
                switch(guide) {
                    case 'Regra dos Terços':
                        html = `
                            <div class="grid-line" style="left:33.33%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:66.66%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="top:33.33%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:66.66%;left:0;width:100%;height:1px;"></div>
                        `;
                        break;
                    case 'Regra dos Quartos':
                        html = `
                            <div class="grid-line" style="left:25%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:50%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:75%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="top:25%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:50%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:75%;left:0;width:100%;height:1px;"></div>
                        `;
                        break;
                    case 'Regra dos Nove Quadrantes':
                        html = `
                            <div class="grid-line" style="left:33.33%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:66.66%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="top:33.33%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:66.66%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="left:11.11%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="left:22.22%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="left:44.44%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="left:55.55%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="left:77.77%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="left:88.88%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="top:11.11%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                            <div class="grid-line" style="top:22.22%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                            <div class="grid-line" style="top:44.44%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                            <div class="grid-line" style="top:55.55%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                            <div class="grid-line" style="top:77.77%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                            <div class="grid-line" style="top:88.88%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                        `;
                        break;
                    case 'Simetria':
                        html = `<div class="grid-line" style="left:50%;top:0;width:1px;height:100%;"></div>`;
                        break;
                    case 'Linhas Diagonais':
                        html = `
                            <div class="grid-line" style="top:0;left:0;width:100%;height:1px;transform:rotate(45deg);transform-origin:0 0;"></div>
                            <div class="grid-line" style="bottom:0;right:0;width:100%;height:1px;transform:rotate(-45deg);transform-origin:100% 100%;"></div>
                        `;
                        break;
                    case 'Linhas Horizontais':
                        html = `
                            <div class="grid-line" style="top:33.33%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:66.66%;left:0;width:100%;height:1px;"></div>
                        `;
                        break;
                    case 'Linhas Verticais':
                        html = `
                            <div class="grid-line" style="left:33.33%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:66.66%;top:0;width:1px;height:100%;"></div>
                        `;
                        break;
                    case 'Pontos de Fuga':
                        html = `
                            <svg width="100%" height="100%" style="position:absolute;top:0;left:0;">
                                <line x1="50%" y1="50%" x2="10%" y2="10%" stroke="rgba(255,215,0,0.4)" stroke-width="1" />
                                <line x1="50%" y1="50%" x2="90%" y2="10%" stroke="rgba(255,215,0,0.4)" stroke-width="1" />
                                <line x1="50%" y1="50%" x2="10%" y2="90%" stroke="rgba(255,215,0,0.4)" stroke-width="1" />
                                <line x1="50%" y1="50%" x2="90%" y2="90%" stroke="rgba(255,215,0,0.4)" stroke-width="1" />
                                <circle cx="50%" cy="50%" r="4" fill="rgba(255,215,0,0.8)" />
                            </svg>
                        `;
                        break;
                    case 'Proporção Áurea':
                    case 'Espiral Áurea':
                        html = `
                            <svg width="100%" height="100%" viewBox="0 0 100 100" style="position:absolute;top:0;left:0;">
                                <rect x="38.2" y="38.2" width="23.6" height="23.6" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="1" />
                                <rect x="38.2" y="61.8" width="23.6" height="23.6" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="1" />
                                <rect x="61.8" y="38.2" width="23.6" height="23.6" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="1" />
                                <path d="M50,50 Q60,40 70,50 Q80,60 70,70 Q60,80 50,70 Q40,60 50,50" fill="none" stroke="rgba(255,215,0,0.6)" stroke-width="1.5" />
                                <circle cx="50" cy="50" r="2" fill="rgba(255,215,0,0.8)" />
                            </svg>
                        `;
                        break;
                    case 'Triângulos Composicionais':
                    case 'Composição Triangular':
                        html = `
                            <svg width="100%" height="100%" viewBox="0 0 100 100" style="position:absolute;top:0;left:0;">
                                <polygon points="50,5 5,95 95,95" fill="none" stroke="rgba(255,215,0,0.6)" stroke-width="1.5" />
                                <line x1="50" y1="5" x2="50" y2="95" stroke="rgba(255,215,0,0.3)" stroke-width="0.5" stroke-dasharray="3,3" />
                            </svg>
                        `;
                        break;
                    case 'Círculos e Curvas':
                        html = `
                            <svg width="100%" height="100%" viewBox="0 0 100 100" style="position:absolute;top:0;left:0;">
                                <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,215,0,0.4)" stroke-width="1" />
                                <circle cx="50" cy="50" r="15" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="0.5" />
                            </svg>
                        `;
                        break;
                    case 'Linhas Guia':
                        html = `
                            <svg width="100%" height="100%" style="position:absolute;top:0;left:0;">
                                <path d="M10,90 Q30,70 50,50 Q70,30 90,10" fill="none" stroke="rgba(255,215,0,0.5)" stroke-width="1.5" stroke-dasharray="5,5" />
                                <path d="M10,70 Q30,50 50,50 Q70,50 90,50" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="1" stroke-dasharray="3,3" />
                            </svg>
                        `;
                        break;
                    case 'Enquadramento Natural':
                    case 'Moldura Dentro da Moldura':
                        html = `
                            <div style="position:absolute;top:10%;left:10%;width:80%;height:80%;border:2px solid rgba(255,215,0,0.4);border-radius:8px;"></div>
                            <div style="position:absolute;top:20%;left:20%;width:60%;height:60%;border:1px solid rgba(255,215,0,0.2);border-radius:4px;"></div>
                        `;
                        break;
                    case 'Camadas':
                        html = `
                            <div style="position:absolute;bottom:0;left:0;width:100%;height:33%;border-top:1px solid rgba(255,215,0,0.3);"></div>
                            <div style="position:absolute;bottom:33%;left:0;width:100%;height:33%;border-top:1px solid rgba(255,215,0,0.2);"></div>
                        `;
                        break;
                    case 'Regra do Centro':
                        html = `
                            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30%;height:30%;border:2px solid rgba(255,215,0,0.4);border-radius:50%;"></div>
                            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10%;height:10%;border:1px solid rgba(255,215,0,0.6);border-radius:50%;"></div>
                        `;
                        break;
                    case 'Regra dos Ímpares':
                        html = `
                            <div style="position:absolute;top:30%;left:30%;width:8px;height:8px;background:rgba(255,215,0,0.4);border-radius:50%;"></div>
                            <div style="position:absolute;top:30%;left:50%;width:8px;height:8px;background:rgba(255,215,0,0.4);border-radius:50%;"></div>
                            <div style="position:absolute;top:30%;left:70%;width:8px;height:8px;background:rgba(255,215,0,0.4);border-radius:50%;"></div>
                        `;
                        break;
                    case 'Espaço Negativo':
                        html = `
                            <div style="position:absolute;top:0;left:0;width:100%;height:100%;border:2px solid rgba(255,215,0,0.2);"></div>
                            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40%;height:40%;border:1px solid rgba(255,215,0,0.4);"></div>
                            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20%;height:20%;background:rgba(255,215,0,0.1);border-radius:50%;"></div>
                        `;
                        break;
                    case 'Silhueta':
                        html = `
                            <div style="position:absolute;bottom:0;left:0;width:100%;height:40%;background:rgba(0,0,0,0.5);"></div>
                            <div style="position:absolute;bottom:40%;left:30%;width:40%;height:30%;background:rgba(0,0,0,0.3);clip-path:polygon(0% 100%,50% 0%,100% 100%);"></div>
                        `;
                        break;
                    default:
                        // Para regras sem overlay específico, mostrar apenas o label
                        html = '';
                }
                grid.innerHTML = html;
            };

            // Criar app
            const createApp = () => {
                root.innerHTML = `
                    <div class="camera-container" id="app">
                        <div class="video-wrapper">
                            <video id="video" autoplay playsinline muted></video>
                            <div class="overlay-grid" id="overlayGrid"></div>
                            <div class="guide-label" id="guideLabel">${currentGuide}</div>
                            
                            <div class="score-panel">
                                <div class="score-item"><span>Composição</span><span class="score-value" id="compScore">78%</span></div>
                                <div class="score-item"><span>Iluminação</span><span class="score-value" id="lightScore">65%</span></div>
                                <div class="score-item"><span>Enquadramento</span><span class="score-value" id="frameScore">72%</span></div>
                                <div class="score-item" style="border-top:1px solid rgba(255,255,255,0.1);padding-top:4px;margin-top:2px">
                                    <span>Geral</span>
                                    <span class="score-value" style="color:#fbbf24" id="overallScore">72</span>
                                </div>
                            </div>

                            <div class="ai-suggestion" id="suggestion">Aponte para um objeto principal</div>

                            <div class="guide-selector" id="guideSelector">
                                ${renderGuideSelector()}
                            </div>

                            <div class="mode-tabs">
                                <button class="mode-tab active" data-mode="camera">Câmera</button>
                                <button class="mode-tab" data-mode="learn">Aprender</button>
                                <button class="mode-tab" data-mode="reference">Referência</button>
                            </div>

                            <div class="controls">
                                <button class="ctrl-btn" id="flipBtn">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M4 8v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/>
                                        <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
                                        <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0"/>
                                    </svg>
                                </button>
                                <button class="shutter-btn" id="shutterBtn"></button>
                                <button class="ctrl-btn" id="zoomBtn">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="11" cy="11" r="8"/>
                                        <path d="m21 21-4.35-4.35"/>
                                        <path d="M11 8v6"/>
                                        <path d="M8 11h6"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                videoElement = document.getElementById('video');
                
                // Eventos
                document.getElementById('flipBtn').addEventListener('click', toggleCamera);
                document.getElementById('shutterBtn').addEventListener('click', capturePhoto);
                document.getElementById('zoomBtn').addEventListener('click', () => {
                    zoomLevel = Math.min(zoomLevel + 0.1, 3);
                    if (videoElement) {
                        videoElement.style.transform = `scale(${zoomLevel})`;
                    }
                });

                // Eventos para as guias
                document.querySelectorAll('.guide-chip').forEach(chip => {
                    chip.addEventListener('click', function() {
                        document.querySelectorAll('.guide-chip').forEach(c => c.classList.remove('active'));
                        this.classList.add('active');
                        currentGuide = this.dataset.guide;
                        renderGuideOverlay(currentGuide);
                    });
                });

                // Eventos para as abas de modo
                document.querySelectorAll('.mode-tab').forEach(tab => {
                    tab.addEventListener('click', function() {
                        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                        this.classList.add('active');
                        const mode = this.dataset.mode;
                        if (mode === 'learn') {
                            document.getElementById('suggestion').textContent = '📚 Toque em uma regra para aprender mais';
                        } else if (mode === 'reference') {
                            document.getElementById('suggestion').textContent = '📷 Carregue uma foto de referência';
                        } else {
                            document.getElementById('suggestion').textContent = '📸 Aponte para um objeto principal';
                        }
                    });
                });

                // Iniciar câmera
                startCamera();
                // Renderizar guia inicial
                renderGuideOverlay(currentGuide);
            };

            // Função para iniciar a câmera
            const startCamera = async () => {
                try {
                    const constraints = {
                        video: {
                            facingMode: facingMode,
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false
                    };

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    if (videoElement) {
                        videoElement.srcObject = stream;
                        await videoElement.play();
                        isCameraReady = true;
                        console.log('✅ Câmera iniciada com sucesso!');
                    }
                } catch (error) {
                    console.error('❌ Erro ao iniciar câmera:', error);
                    showPermissionError(error.message);
                }
            };

            // Mostrar erro de permissão
            const showPermissionError = (msg) => {
                const overlay = document.createElement('div');
                overlay.className = 'permission-overlay';
                overlay.id = 'permissionOverlay';
                overlay.innerHTML = `
                    <h2>📷 Acesso à Câmera</h2>
                    <p>O Photo Composition AI precisa acessar sua câmera para funcionar.</p>
                    <button class="permission-btn" id="retryBtn">Permitir Acesso</button>
                    <div class="error-msg">${msg || 'Toque no botão acima e permita o acesso no Safari'}</div>
                `;
                document.querySelector('.video-wrapper').appendChild(overlay);
                
                document.getElementById('retryBtn').addEventListener('click', () => {
                    overlay.remove();
                    startCamera();
                });
            };

            // Trocar câmera
            const toggleCamera = () => {
                facingMode = facingMode === 'environment' ? 'user' : 'environment';
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                startCamera();
            };

            // Capturar foto
            const capturePhoto = () => {
                if (!videoElement || !isCameraReady) {
                    alert('Aguarde a câmera iniciar');
                    return;
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = videoElement.videoWidth || 1280;
                canvas.height = videoElement.videoHeight || 720;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg');
                
                // Mostrar preview
                const preview = document.createElement('div');
                preview.className = 'photo-preview';
                preview.innerHTML = `
                    <img src="${dataUrl}" alt="Foto capturada" />
                    <div class="photo-actions">
                        <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                        <button class="btn-save" onclick="downloadPhoto('${dataUrl}')">💾 Salvar</button>
                    </div>
                `;
                document.body.appendChild(preview);
                
                // Atualizar scores (simulação)
                const compScore = Math.floor(60 + Math.random() * 35);
                const lightScore = Math.floor(50 + Math.random() * 40);
                const frameScore = Math.floor(55 + Math.random() * 40);
                const overall = Math.floor((compScore + lightScore + frameScore) / 3);
                
                document.getElementById('compScore').textContent = compScore + '%';
                document.getElementById('lightScore').textContent = lightScore + '%';
                document.getElementById('frameScore').textContent = frameScore + '%';
                document.getElementById('overallScore').textContent = overall;
                
                // Sugestão baseada na regra atual
                const tips = [
                    `📸 Ótima composição usando ${currentGuide}!`,
                    `💡 Ajuste a iluminação para melhorar`,
                    `🎯 Enquadramento perfeito com ${currentGuide}`,
                    `🔄 Tente um ângulo diferente`,
                    `✨ ${currentGuide} aplicada com sucesso!`
                ];
                document.getElementById('suggestion').textContent = tips[Math.floor(Math.random() * tips.length)];
            };

            // Download
            window.downloadPhoto = (url) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = `photo-${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Verificar suporte a getUserMedia
            const checkCameraSupport = () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    root.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;padding:30px;text-align:center;background:#000;color:#fff;">
                            <h2 style="font-size:24px;margin-bottom:10px;">📱 Dispositivo não compatível</h2>
                            <p style="color:#aaa;max-width:300px;">Seu navegador não suporta acesso à câmera. Use um dispositivo com câmera e Safari/Chrome atualizado.</p>
                        </div>
                    `;
                    return false;
                }
                return true;
            };

            // Iniciar app
            if (checkCameraSupport()) {
                createApp();
            }

            // Simular sugestões da IA a cada 5s
            setInterval(() => {
                const suggestionEl = document.getElementById('suggestion');
                if (suggestionEl && !suggestionEl.textContent.includes('📚') && !suggestionEl.textContent.includes('📷')) {
                    const actions = [
                        'Mova para esquerda',
                        'Mova para direita',
                        'Aproxime',
                        'Afaste',
                        'Suba a câmera',
                        'Abaixe a câmera',
                        'Gire levemente',
                        'Alinhe ao horizonte',
                        'Posicione no ponto ideal',
                        'Ajuste o enquadramento',
                        'Melhor ângulo para ' + currentGuide,
                        'Centralize o objeto principal'
                    ];
                    suggestionEl.textContent = actions[Math.floor(Math.random() * actions.length)];
                }
            }, 5000);

        })();
    </script>
</body>
</html>
