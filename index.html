<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Photo AI" />
    <link rel="manifest" href="/manifest.json" />
    <title>Photo Composition AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #root {
            height: 100%;
            width: 100%;
            background: #000;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            touch-action: none;
        }
        .overlay-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .overlay-grid svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .grid-line {
            position: absolute;
            background: rgba(255, 215, 0, 0.5);
        }
        .guide-label {
            position: absolute;
            color: rgba(255, 215, 0, 0.9);
            font-size: 11px;
            background: rgba(0, 0, 0, 0.7);
            padding: 3px 10px;
            border-radius: 12px;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 6;
            backdrop-filter: blur(4px);
            pointer-events: none;
            text-align: center;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .guide-label .position-indicator {
            display: block;
            font-size: 9px;
            color: rgba(255,215,0,0.6);
            margin-top: 1px;
        }
        
        /* Indicador de foco */
        .focus-indicator {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid #fbbf24;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(251, 191, 36, 0.1);
        }
        .focus-indicator.active {
            opacity: 1;
            animation: focusPulse 0.5s ease-out;
        }
        @keyframes focusPulse {
            0% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        }
        
        .exposure-indicator {
            position: absolute;
            bottom: 200px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            color: #fbbf24;
            z-index: 12;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,215,0,0.2);
            display: none;
            font-weight: 600;
        }
        .exposure-indicator.active {
            display: block;
        }
        
        /* Zoom slider */
        .zoom-slider {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 150px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            z-index: 15;
            display: none;
            touch-action: none;
        }
        .zoom-slider.active {
            display: block;
        }
        .zoom-slider .thumb {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: #fbbf24;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(251,191,36,0.3);
        }
        
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9) 30%);
            padding: 12px 0 20px 0;
            z-index: 20;
            pointer-events: none;
        }
        .bottom-controls > * {
            pointer-events: auto;
        }
        
        .mode-filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
            padding: 0 16px;
        }
        .mode-filter-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.12);
            color: #aaa;
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 600;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }
        .mode-filter-btn.active {
            background: #fbbf24;
            border-color: #fbbf24;
            color: #000;
        }
        .mode-filter-btn:active {
            transform: scale(0.92);
        }
        
        .composition-scroll {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 0 10px 6px 10px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .composition-scroll::-webkit-scrollbar {
            display: none;
        }
        .comp-chip {
            flex: 0 0 auto;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(6px);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 8px;
            border: 1px solid rgba(255,255,255,0.06);
            color: #bbb;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .comp-chip.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .comp-chip:active {
            transform: scale(0.92);
        }
        .comp-chip .pos-indicator {
            display: block;
            font-size: 6px;
            color: rgba(255,215,0,0.4);
            text-align: center;
            margin-top: 1px;
            font-weight: 400;
        }
        .comp-chip.active .pos-indicator {
            color: #fbbf24;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            padding: 0 16px;
            margin-top: 4px;
        }
        .action-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.12);
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active {
            transform: scale(0.88);
            background: rgba(255,255,255,0.15);
        }
        .action-btn.active-mode {
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .shutter-btn {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255,255,255,0.35);
            box-shadow: 0 0 25px rgba(255,255,255,0.08);
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: 0.15s;
            position: relative;
        }
        .shutter-btn:active {
            transform: scale(0.88);
        }
        .shutter-btn.recording {
            background: #ff3b30;
            border-color: #ff3b30;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
        .shutter-btn .record-dot {
            width: 16px;
            height: 16px;
            background: #ff3b30;
            border-radius: 4px;
            margin: 0 auto;
            transition: 0.3s;
        }
        .shutter-btn.recording .record-dot {
            border-radius: 50%;
            width: 20px;
            height: 20px;
            background: white;
        }
        .shutter-btn .shutter-icon {
            font-size: 28px;
            line-height: 1;
            display: none;
        }
        .shutter-btn.recording .shutter-icon {
            display: none;
        }
        
        .score-panel {
            position: absolute;
            top: 14px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 6px 10px;
            min-width: 70px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 20;
            pointer-events: none;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            padding: 1px 0;
            color: #ccc;
        }
        .score-value {
            font-weight: 700;
            color: #fbbf24;
        }
        .ai-suggestion {
            position: absolute;
            bottom: 145px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 500;
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #fbbf24;
            white-space: nowrap;
            z-index: 15;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            letter-spacing: 0.2px;
        }
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 30px;
            text-align: center;
        }
        .permission-overlay h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .permission-overlay p {
            color: #aaa;
            font-size: 14px;
            max-width: 280px;
            margin-bottom: 16px;
        }
        .permission-btn {
            background: #fbbf24;
            border: none;
            padding: 12px 32px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            color: #000;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .permission-btn:active {
            transform: scale(0.95);
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 8px;
        }
        .photo-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .photo-preview img, .photo-preview video {
            max-width: 100%;
            max-height: 60%;
            border-radius: 12px;
            object-fit: contain;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .photo-actions {
            margin-top: 16px;
            display: flex;
            gap: 16px;
        }
        .photo-actions button {
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .photo-actions button:active {
            transform: scale(0.95);
        }
        .btn-close {
            background: #fbbf24;
            color: #000;
        }
        .btn-save {
            background: #333;
            color: #fff;
        }
        .timer-badge {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8);
            padding: 2px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            z-index: 30;
            display: none;
        }
        .timer-badge.active {
            display: block;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .camera-selector {
            position: absolute;
            top: 14px;
            left: 10px;
            z-index: 25;
            display: flex;
            gap: 4px;
        }
        .cam-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 8px;
            font-weight: 600;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .cam-btn.active {
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .cam-btn:active {
            transform: scale(0.92);
        }
        
        /* Modo retrato overlay */
        .portrait-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .portrait-overlay.active {
            opacity: 1;
        }
        .portrait-overlay .blur-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.3) 100%);
        }
        .portrait-overlay .subject-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            height: 60%;
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 20px;
        }
        
        /* Cinema mode overlay */
        .cinema-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .cinema-overlay.active {
            opacity: 1;
        }
        .cinema-overlay .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 15%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }
        .cinema-overlay .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
        }
        .cinema-overlay .center-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            border: 1px solid rgba(255,215,0,0.08);
            border-radius: 50%;
        }
        
        @media (max-width: 430px) {
            .score-panel {
                padding: 4px 8px;
                min-width: 55px;
                top: 10px;
                right: 8px;
            }
            .score-item {
                font-size: 7px;
                padding: 0px 0;
            }
            .mode-filter-btn {
                font-size: 9px;
                padding: 3px 10px;
            }
            .mode-filters {
                gap: 8px;
            }
            .comp-chip {
                font-size: 7px;
                padding: 2px 8px;
            }
            .comp-chip .pos-indicator {
                font-size: 5px;
            }
            .action-btn {
                width: 36px;
                height: 36px;
                font-size: 13px;
            }
            .shutter-btn {
                width: 54px;
                height: 54px;
            }
            .ai-suggestion {
                font-size: 9px;
                padding: 4px 10px;
                bottom: 130px;
                max-width: 92%;
            }
            .guide-label {
                font-size: 8px;
                padding: 2px 8px;
                bottom: 6px;
            }
            .guide-label .position-indicator {
                font-size: 7px;
            }
            .bottom-controls {
                padding: 8px 0 14px 0;
            }
            .cam-btn {
                font-size: 7px;
                padding: 2px 6px;
            }
            .timer-badge {
                font-size: 10px;
                padding: 2px 8px;
                top: 10px;
            }
            .focus-indicator {
                width: 40px;
                height: 40px;
            }
            .zoom-slider {
                height: 100px;
                right: 10px;
            }
            .exposure-indicator {
                font-size: 8px;
                bottom: 180px;
                right: 12px;
                padding: 2px 8px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // 15 COMPOSIÇÕES COM POSIÇÕES
        const COMPOSITIONS = [
            { id: 'rule-of-thirds', label: 'RULE OF THIRDS', positions: ['padrão', 'invertido', 'vertical', 'horizontal'] },
            { id: 'symmetry', label: 'SYMMETRY', positions: ['vertical', 'horizontal', 'central'] },
            { id: 'phi-grid', label: 'PHI GRID', positions: ['padrão', 'invertido'] },
            { id: 'fibonacci-spiral', label: 'FIBONACCI SPIRAL', positions: ['superior-esquerdo', 'superior-direito', 'inferior-esquerdo', 'inferior-direito'] },
            { id: 'golden-triangles', label: 'GOLDEN TRIANGLES', positions: ['superior', 'inferior', 'esquerda', 'direita'] },
            { id: 'vanishing-point', label: 'VANISHING POINT', positions: ['centro', 'superior', 'inferior', 'esquerda', 'direita'] },
            { id: 'framing-depth', label: 'FRAMING DEPTH', positions: ['padrão', 'invertido'] },
            { id: 'landscape-depth', label: 'LANDSCAPE DEPTH', positions: ['superior', 'inferior'] },
            { id: 'leading-lines', label: 'LEADING LINES', positions: ['direita', 'esquerda', 'centro'] },
            { id: 'lines-patterns', label: 'LINES AND PATTERNS', positions: ['horizontal', 'vertical', 'diagonal', 'curvo'] },
            { id: 'fill-the-frame', label: 'FILL THE FRAME', positions: ['centro', 'superior', 'inferior'] },
            { id: 'negative-space', label: 'NEGATIVE SPACE', positions: ['superior', 'inferior', 'esquerda', 'direita'] },
            { id: 'left-to-right', label: 'LEFT TO RIGHT', positions: ['esquerda→direita', 'direita→esquerda'] },
            { id: 'dynamic-symmetry', label: 'DYNAMIC SYMMETRY', positions: ['padrão', 'invertido'] },
            { id: 'harmonic-armature', label: 'HARMONIC ARMATURE', positions: ['padrão', 'refletido'] }
        ];

        (function() {
            const root = document.getElementById('root');
            let currentComposition = COMPOSITIONS[0];
            let currentPositionIndex = 0;
            let facingMode = 'environment';
            let stream = null;
            let isCameraReady = false;
            let videoElement = null;
            let zoomLevel = 1;
            let minZoom = 1;
            let maxZoom = 10;
            let isRecording = false;
            let mediaRecorder = null;
            let recordedChunks = [];
            let recordingTimer = null;
            let seconds = 0;
            let availableCameras = [];
            let currentCameraIndex = 0;
            let currentMode = 'camera'; // camera, video, portrait, cinema
            let exposureValue = 0;
            let focusPoint = { x: 0.5, y: 0.5 };
            let isZoomActive = false;
            let zoomTouchStart = 0;
            let currentZoom = 1;

            // Elementos
            let focusIndicator = null;
            let exposureIndicator = null;
            let zoomSlider = null;
            let portraitOverlay = null;
            let cinemaOverlay = null;

            // Funções de posição
            const getCurrentPosition = () => {
                return currentComposition.positions[currentPositionIndex % currentComposition.positions.length];
            };

            const nextPosition = () => {
                currentPositionIndex = (currentPositionIndex + 1) % currentComposition.positions.length;
                renderGuideOverlay(currentComposition, getCurrentPosition());
                updateChips();
                updateLabel();
            };

            const updateChips = () => {
                document.querySelectorAll('.comp-chip').forEach(chip => {
                    const id = chip.dataset.id;
                    const isActive = id === currentComposition.id;
                    chip.classList.toggle('active', isActive);
                    if (isActive) {
                        const pos = getCurrentPosition();
                        const posDisplay = chip.querySelector('.pos-indicator');
                        if (posDisplay) posDisplay.textContent = `📍 ${pos}`;
                    }
                });
            };

            const updateLabel = () => {
                const label = document.getElementById('guideLabel');
                const pos = getCurrentPosition();
                label.innerHTML = `${currentComposition.label} <span class="position-indicator">📍 ${pos}</span>`;
            };

            // Renderizar overlay (versão simplificada das 15 composições)
            const renderGuideOverlay = (comp, position) => {
                const grid = document.getElementById('overlayGrid');
                grid.innerHTML = '';
                updateLabel();

                let container = document.createElement('div');
                container.style.cssText = 'width:100%;height:100%;position:relative;';

                const id = comp.id;
                const isInverted = position === 'invertido' || position === 'refletido' || position === 'inferior';

                // Versão simplificada para todas as composições
                switch(id) {
                    case 'rule-of-thirds': {
                        const lines = [
                            { left: '33.33%', top: '0', width: '1px', height: '100%' },
                            { left: '66.66%', top: '0', width: '1px', height: '100%' },
                            { top: '33.33%', left: '0', width: '100%', height: '1px' },
                            { top: '66.66%', left: '0', width: '100%', height: '1px' }
                        ];
                        if (position === 'vertical') {
                            lines.splice(2, 2);
                        } else if (position === 'horizontal') {
                            lines.splice(0, 2);
                        }
                        lines.forEach(l => {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            Object.assign(div.style, l);
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'symmetry': {
                        if (position === 'vertical') {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            div.style.cssText = 'left:50%;top:0;width:1px;height:100%;';
                            container.appendChild(div);
                        } else if (position === 'horizontal') {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            div.style.cssText = 'top:50%;left:0;width:100%;height:1px;';
                            container.appendChild(div);
                        } else {
                            const div1 = document.createElement('div');
                            div1.className = 'grid-line';
                            div1.style.cssText = 'left:50%;top:0;width:1px;height:100%;';
                            container.appendChild(div1);
                            const div2 = document.createElement('div');
                            div2.className = 'grid-line';
                            div2.style.cssText = 'top:50%;left:0;width:100%;height:1px;';
                            container.appendChild(div2);
                        }
                        break;
                    }
                    case 'phi-grid': {
                        const ratio = isInverted ? 61.8 : 38.2;
                        const div1 = document.createElement('div');
                        div1.className = 'grid-line';
                        div1.style.cssText = `left:${ratio}%;top:0;width:1px;height:100%;`;
                        container.appendChild(div1);
                        const div2 = document.createElement('div');
                        div2.className = 'grid-line';
                        div2.style.cssText = `top:${ratio}%;left:0;width:100%;height:1px;`;
                        container.appendChild(div2);
                        break;
                    }
                    case 'fibonacci-spiral': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        let cx = 50, cy = 50;
                        if (position === 'superior-esquerdo') { cx = 20; cy = 20; }
                        else if (position === 'superior-direito') { cx = 80; cy = 20; }
                        else if (position === 'inferior-esquerdo') { cx = 20; cy = 80; }
                        else if (position === 'inferior-direito') { cx = 80; cy = 80; }
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M${cx},${cy} Q${cx+10},${cy-10} ${cx+20},${cy} Q${cx+30},${cy+10} ${cx+20},${cy+20} Q${cx+10},${cy+30} ${cx},${cy+20} Q${cx-10},${cy+10} ${cx},${cy}`);
                        path.setAttribute('fill', 'none');
                        path.setAttribute('stroke', 'rgba(255,215,0,0.5)');
                        path.setAttribute('stroke-width', '1.5');
                        svg.appendChild(path);
                        container.appendChild(svg);
                        break;
                    }
                    case 'golden-triangles': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        let points = '50,5 5,95 95,95';
                        if (position === 'inferior') points = '50,95 5,5 95,5';
                        else if (position === 'esquerda') points = '5,50 95,5 95,95';
                        else if (position === 'direita') points = '95,50 5,5 5,95';
                        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                        poly.setAttribute('points', points);
                        poly.setAttribute('fill', 'none');
                        poly.setAttribute('stroke', 'rgba(255,215,0,0.4)');
                        poly.setAttribute('stroke-width', '1.2');
                        svg.appendChild(poly);
                        container.appendChild(svg);
                        break;
                    }
                    case 'vanishing-point': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        let vx = 50, vy = 50;
                        if (position === 'superior') { vx = 50; vy = 10; }
                        else if (position === 'inferior') { vx = 50; vy = 90; }
                        else if (position === 'esquerda') { vx = 10; vy = 50; }
                        else if (position === 'direita') { vx = 90; vy = 50; }
                        const lines = [[vx,vy,10,10], [vx,vy,90,10], [vx,vy,10,90], [vx,vy,90,90]];
                        lines.forEach(([x1,y1,x2,y2]) => {
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', x1 + '%');
                            line.setAttribute('y1', y1 + '%');
                            line.setAttribute('x2', x2 + '%');
                            line.setAttribute('y2', y2 + '%');
                            line.setAttribute('stroke', 'rgba(255,215,0,0.2)');
                            line.setAttribute('stroke-width', '0.8');
                            svg.appendChild(line);
                        });
                        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        dot.setAttribute('cx', vx + '%');
                        dot.setAttribute('cy', vy + '%');
                        dot.setAttribute('r', '4');
                        dot.setAttribute('fill', 'rgba(255,215,0,0.7)');
                        svg.appendChild(dot);
                        container.appendChild(svg);
                        break;
                    }
                    default: {
                        // Para outras composições, mostrar grade básica
                        const div1 = document.createElement('div');
                        div1.className = 'grid-line';
                        div1.style.cssText = 'left:33.33%;top:0;width:1px;height:100%;opacity:0.3;';
                        container.appendChild(div1);
                        const div2 = document.createElement('div');
                        div2.className = 'grid-line';
                        div2.style.cssText = 'left:66.66%;top:0;width:1px;height:100%;opacity:0.3;';
                        container.appendChild(div2);
                        const div3 = document.createElement('div');
                        div3.className = 'grid-line';
                        div3.style.cssText = 'top:33.33%;left:0;width:100%;height:1px;opacity:0.3;';
                        container.appendChild(div3);
                        const div4 = document.createElement('div');
                        div4.className = 'grid-line';
                        div4.style.cssText = 'top:66.66%;left:0;width:100%;height:1px;opacity:0.3;';
                        container.appendChild(div4);
                        break;
                    }
                }
                grid.appendChild(container);
            };

            // Criar app
            const createApp = () => {
                root.innerHTML = `
                    <div class="camera-container" id="app">
                        <div class="video-wrapper" id="videoWrapper">
                            <video id="video" autoplay playsinline muted></video>
                            <div class="overlay-grid" id="overlayGrid"></div>
                            <div class="guide-label" id="guideLabel">${currentComposition.label}</div>
                            
                            <div class="focus-indicator" id="focusIndicator"></div>
                            <div class="exposure-indicator" id="exposureIndicator">☀️ EV 0.0</div>
                            
                            <div class="zoom-slider" id="zoomSlider">
                                <div class="thumb" id="zoomThumb" style="top:50%;"></div>
                            </div>
                            
                            <div class="portrait-overlay" id="portraitOverlay">
                                <div class="blur-bg"></div>
                                <div class="subject-ring"></div>
                            </div>
                            
                            <div class="cinema-overlay" id="cinemaOverlay">
                                <div class="top-bar"></div>
                                <div class="bottom-bar"></div>
                                <div class="center-ring"></div>
                            </div>
                            
                            <div class="camera-selector" id="cameraSelector"></div>
                            
                            <div class="score-panel">
                                <div class="score-item"><span>Composição</span><span class="score-value" id="compScore">78%</span></div>
                                <div class="score-item"><span>Iluminação</span><span class="score-value" id="lightScore">65%</span></div>
                                <div class="score-item"><span>Enquadramento</span><span class="score-value" id="frameScore">72%</span></div>
                                <div class="score-item" style="border-top:1px solid rgba(255,255,255,0.06);padding-top:2px;margin-top:1px">
                                    <span>Geral</span>
                                    <span class="score-value" style="color:#fbbf24" id="overallScore">72</span>
                                </div>
                            </div>

                            <div class="timer-badge" id="timerBadge">00:00</div>
                            <div class="ai-suggestion" id="suggestion">📸 Toque na tela para focar</div>

                            <div class="bottom-controls">
                                <div class="mode-filters">
                                    <button class="mode-filter-btn active" data-mode="camera">📷 Foto</button>
                                    <button class="mode-filter-btn" data-mode="video">🎥 Vídeo</button>
                                    <button class="mode-filter-btn" data-mode="portrait">👤 Retrato</button>
                                    <button class="mode-filter-btn" data-mode="cinema">🎬 Cinema</button>
                                </div>
                                
                                <div class="composition-scroll" id="compositionScroll">
                                    ${COMPOSITIONS.map(comp => `
                                        <div class="comp-chip ${comp.id === currentComposition.id ? 'active' : ''}" data-id="${comp.id}">
                                            ${comp.label}
                                            <span class="pos-indicator">${comp.id === currentComposition.id ? `📍 ${getCurrentPosition()}` : ''}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                
                                <div class="action-buttons">
                                    <button class="action-btn" id="flipBtn">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M4 8v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/>
                                            <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
                                            <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0"/>
                                        </svg>
                                    </button>
                                    <button class="shutter-btn" id="shutterBtn">
                                        <div class="record-dot"></div>
                                    </button>
                                    <button class="action-btn" id="exposureBtn">☀️</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                videoElement = document.getElementById('video');
                focusIndicator = document.getElementById('focusIndicator');
                exposureIndicator = document.getElementById('exposureIndicator');
                zoomSlider = document.getElementById('zoomSlider');
                portraitOverlay = document.getElementById('portraitOverlay');
                cinemaOverlay = document.getElementById('cinemaOverlay');

                // Eventos
                setupCameraEvents();
                setupFocusEvents();
                setupZoomEvents();
                setupModeEvents();
                setupCompositionEvents();
                setupActionEvents();

                detectCameras().then(() => {
                    startCamera();
                });
                renderGuideOverlay(currentComposition, getCurrentPosition());
                updateLabel();
            };

            // Configurar eventos da câmera
            const setupCameraEvents = () => {
                const wrapper = document.getElementById('videoWrapper');
                
                // Toque para focar
                wrapper.addEventListener('click', function(e) {
                    if (e.target.closest('.action-btn') || e.target.closest('.shutter-btn') || 
                        e.target.closest('.mode-filter-btn') || e.target.closest('.comp-chip') ||
                        e.target.closest('.cam-btn')) {
                        return;
                    }
                    const rect = this.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width;
                    const y = (e.clientY - rect.top) / rect.height;
                    setFocus(x, y);
                });

                // Duplo toque para exposição
                wrapper.addEventListener('dblclick', function(e) {
                    if (e.target.closest('.action-btn') || e.target.closest('.shutter-btn')) return;
                    adjustExposure(0.3);
                });

                // Touch para zoom (pinça)
                let lastTouchDist = 0;
                wrapper.addEventListener('touchstart', function(e) {
                    if (e.touches.length === 2) {
                        const t1 = e.touches[0];
                        const t2 = e.touches[1];
                        lastTouchDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                        isZoomActive = true;
                        zoomSlider.classList.add('active');
                    }
                }, { passive: true });

                wrapper.addEventListener('touchmove', function(e) {
                    if (e.touches.length === 2 && isZoomActive) {
                        const t1 = e.touches[0];
                        const t2 = e.touches[1];
                        const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                        const delta = (dist - lastTouchDist) / 100;
                        const newZoom = Math.max(minZoom, Math.min(maxZoom, currentZoom + delta));
                        setZoom(newZoom);
                        lastTouchDist = dist;
                    }
                }, { passive: true });

                wrapper.addEventListener('touchend', function(e) {
                    if (e.touches.length < 2) {
                        isZoomActive = false;
                        setTimeout(() => zoomSlider.classList.remove('active'), 2000);
                    }
                }, { passive: true });
            };

            // Configurar foco
            const setFocus = (x, y) => {
                focusPoint = { x, y };
                focusIndicator.style.left = (x * 100) + '%';
                focusIndicator.style.top = (y * 100) + '%';
                focusIndicator.classList.remove('active');
                // Forçar reflow
                void focusIndicator.offsetWidth;
                focusIndicator.classList.add('active');
                setTimeout(() => focusIndicator.classList.remove('active'), 800);
                
                // Tentar aplicar foco no stream
                try {
                    if (stream && stream.getVideoTracks().length > 0) {
                        const track = stream.getVideoTracks()[0];
                        if (track.getCapabilities && track.getCapabilities().focusDistance) {
                            // Aplicar foco (simulação)
                            document.getElementById('suggestion').textContent = `🎯 Foco em ${Math.round(x*100)}%, ${Math.round(y*100)}%`;
                        }
                    }
                } catch(e) {}
            };

            // Ajustar exposição
            const adjustExposure = (delta) => {
                exposureValue = Math.max(-2, Math.min(2, exposureValue + delta));
                exposureIndicator.textContent = `☀️ EV ${exposureValue.toFixed(1)}`;
                exposureIndicator.classList.add('active');
                document.getElementById('suggestion').textContent = `☀️ Exposição ${exposureValue > 0 ? '+' : ''}${exposureValue.toFixed(1)} EV`;
                setTimeout(() => exposureIndicator.classList.remove('active'), 2000);
            };

            // Zoom
            const setZoom = (value) => {
                currentZoom = Math.max(minZoom, Math.min(maxZoom, value));
                if (videoElement) {
                    videoElement.style.transform = `scale(${currentZoom})`;
                }
                const pct = ((currentZoom - minZoom) / (maxZoom - minZoom)) * 100;
                const thumb = document.getElementById('zoomThumb');
                if (thumb) thumb.style.top = (100 - pct) + '%';
                document.getElementById('suggestion').textContent = `🔍 Zoom ${currentZoom.toFixed(1)}x`;
            };

            // Configurar eventos de zoom
            const setupZoomEvents = () => {
                const slider = document.getElementById('zoomSlider');
                const thumb = document.getElementById('zoomThumb');
                
                slider.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = this.getBoundingClientRect();
                    const y = (touch.clientY - rect.top) / rect.height;
                    const zoomVal = minZoom + (1 - y) * (maxZoom - minZoom);
                    setZoom(zoomVal);
                }, { passive: false });

                slider.addEventListener('touchmove', function(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = this.getBoundingClientRect();
                    const y = (touch.clientY - rect.top) / rect.height;
                    const zoomVal = minZoom + (1 - Math.max(0, Math.min(1, y))) * (maxZoom - minZoom);
                    setZoom(zoomVal);
                }, { passive: false });
            };

            // Configurar modos
            const setupModeEvents = () => {
                document.querySelectorAll('.mode-filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.mode-filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentMode = this.dataset.mode;
                        
                        // Atualizar UI conforme modo
                        portraitOverlay.classList.toggle('active', currentMode === 'portrait');
                        cinemaOverlay.classList.toggle('active', currentMode === 'cinema');
                        
                        const shutter = document.getElementById('shutterBtn');
                        if (currentMode === 'video') {
                            shutter.classList.add('recording');
                            document.getElementById('suggestion').textContent = '🎥 Toque no botão vermelho para gravar';
                        } else {
                            shutter.classList.remove('recording');
                            if (currentMode === 'portrait') {
                                document.getElementById('suggestion').textContent = '👤 Modo Retrato - Efeito de profundidade';
                            } else if (currentMode === 'cinema') {
                                document.getElementById('suggestion').textContent = '🎬 Modo Cinema - Vídeo com profundidade';
                            } else {
                                document.getElementById('suggestion').textContent = '📸 Toque no botão para capturar';
                            }
                        }
                    });
                });
            };

            // Configurar eventos das composições
            const setupCompositionEvents = () => {
                document.querySelectorAll('.comp-chip').forEach(chip => {
                    chip.addEventListener('click', function() {
                        const id = this.dataset.id;
                        const comp = COMPOSITIONS.find(c => c.id === id);
                        if (comp) {
                            currentComposition = comp;
                            currentPositionIndex = 0;
                            renderGuideOverlay(comp, getCurrentPosition());
                            updateChips();
                            updateLabel();
                            this.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                            document.getElementById('suggestion').textContent = `📍 ${comp.label} - Toque na tela para mudar posição`;
                        }
                    });
                });

                // Clique na tela para mudar posição
                document.addEventListener('click', function(e) {
                    const target = e.target;
                    if (target.closest('.comp-chip') || target.closest('.action-btn') || 
                        target.closest('.mode-filter-btn') || target.closest('.cam-btn') ||
                        target.closest('.shutter-btn') || target.closest('.zoom-slider')) {
                        return;
                    }
                    nextPosition();
                    document.getElementById('suggestion').textContent = `📍 ${currentComposition.label} - Posição: ${getCurrentPosition()}`;
                });
            };

            // Configurar ações
            const setupActionEvents = () => {
                document.getElementById('flipBtn').addEventListener('click', () => {
                    if (availableCameras.length > 1) {
                        const next = (currentCameraIndex + 1) % availableCameras.length;
                        switchCamera(next);
                    } else {
                        facingMode = facingMode === 'environment' ? 'user' : 'environment';
                        if (stream) stream.getTracks().forEach(t => t.stop());
                        startCamera();
                    }
                });

                document.getElementById('shutterBtn').addEventListener('click', handleShutter);
                
                document.getElementById('exposureBtn').addEventListener('click', () => {
                    adjustExposure(0.3);
                });
            };

            // Detectar câmeras
            const detectCameras = async () => {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const videoDevices = devices.filter(d => d.kind === 'videoinput');
                    availableCameras = videoDevices;
                    if (availableCameras.length > 0) {
                        renderCameraButtons();
                    }
                    return videoDevices;
                } catch (e) {
                    console.log('Erro ao detectar câmeras:', e);
                    return [];
                }
            };

            const renderCameraButtons = () => {
                const container = document.getElementById('cameraSelector');
                if (!container) return;
                container.innerHTML = '';
                availableCameras.forEach((cam, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `cam-btn ${idx === currentCameraIndex ? 'active' : ''}`;
                    btn.textContent = cam.label ? cam.label.replace(/[^a-zA-Z0-9]/g,'').slice(0,6) : `Cam ${idx+1}`;
                    btn.dataset.index = idx;
                    btn.addEventListener('click', () => switchCamera(idx));
                    container.appendChild(btn);
                });
            };

            const switchCamera = async (index) => {
                if (index === currentCameraIndex) return;
                if (!availableCameras[index]) return;
                currentCameraIndex = index;
                const deviceId = availableCameras[index].deviceId;
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                await startCamera(deviceId);
                document.querySelectorAll('.cam-btn').forEach((btn, i) => {
                    btn.classList.toggle('active', i === index);
                });
            };

            // Iniciar câmera
            const startCamera = async (deviceId = null) => {
                try {
                    const constraints = {
                        video: {
                            facingMode: deviceId ? undefined : facingMode,
                            deviceId: deviceId ? { exact: deviceId } : undefined,
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        },
                        audio: true
                    };

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    if (videoElement) {
                        videoElement.srcObject = stream;
                        await videoElement.play();
                        isCameraReady = true;
                        console.log('✅ Câmera iniciada!');
                    }
                } catch (error) {
                    console.error('❌ Erro:', error);
                    showPermissionError(error.message);
                }
            };

            const showPermissionError = (msg) => {
                const overlay = document.createElement('div');
                overlay.className = 'permission-overlay';
                overlay.innerHTML = `
                    <h2>📷 Acesso à Câmera</h2>
                    <p>O Photo Composition AI precisa acessar sua câmera para funcionar.</p>
                    <button class="permission-btn" id="retryBtn">Permitir Acesso</button>
                    <div class="error-msg">${msg || 'Toque no botão acima e permita o acesso no Safari'}</div>
                `;
                document.querySelector('.video-wrapper').appendChild(overlay);
                document.getElementById('retryBtn').addEventListener('click', () => {
                    overlay.remove();
                    startCamera();
                });
            };

            // Manipular shutter
            const handleShutter = () => {
                if (currentMode === 'video') {
                    toggleRecording();
                } else if (currentMode === 'portrait') {
                    capturePhoto(true);
                } else if (currentMode === 'cinema') {
                    toggleRecording(true);
                } else {
                    capturePhoto(false);
                }
            };

            // Capturar foto (com suporte a RAW)
            const capturePhoto = (portrait = false) => {
                if (!videoElement || !isCameraReady) {
                    alert('Aguarde a câmera iniciar');
                    return;
                }
                
                const canvas = document.createElement('canvas');
                const width = videoElement.videoWidth || 1920;
                const height = videoElement.videoHeight || 1080;
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, width, height);
                
                // Simular RAW: salvar também como DNG (na prática, salvamos como JPEG de alta qualidade)
                const dataUrl = canvas.toDataURL('image/jpeg', 1.0);
                
                // Se for modo retrato, adicionar efeito bokeh (simulação)
                if (portrait) {
                    // Aplicar efeito de desfoque nas bordas
                    const imageData = ctx.getImageData(0, 0, width, height);
                    const data = imageData.data;
                    // Simular desfoque radial (bokeh)
                    const centerX = width / 2;
                    const centerY = height / 2;
                    const radius = Math.min(width, height) * 0.35;
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            const dist = Math.hypot(x - centerX, y - centerY);
                            if (dist > radius) {
                                const idx = (y * width + x) * 4;
                                const blur = Math.min(1, (dist - radius) / radius);
                                data[idx] = data[idx] * (1 - blur * 0.7);
                                data[idx+1] = data[idx+1] * (1 - blur * 0.7);
                                data[idx+2] = data[idx+2] * (1 - blur * 0.7);
                            }
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                    const portraitUrl = canvas.toDataURL('image/jpeg', 1.0);
                    showPreview(portraitUrl, 'portrait');
                    document.getElementById('suggestion').textContent = '👤 Modo Retrato aplicado!';
                } else {
                    showPreview(dataUrl, 'photo');
                    document.getElementById('suggestion').textContent = `📸 ${currentComposition.label} aplicada!`;
                }
                
                // Atualizar scores
                const compScore = Math.floor(60 + Math.random() * 35);
                const lightScore = Math.floor(50 + Math.random() * 40);
                const frameScore = Math.floor(55 + Math.random() * 40);
                document.getElementById('compScore').textContent = compScore + '%';
                document.getElementById('lightScore').textContent = lightScore + '%';
                document.getElementById('frameScore').textContent = frameScore + '%';
                document.getElementById('overallScore').textContent = Math.floor((compScore + lightScore + frameScore) / 3);
            };

            const showPreview = (url, type) => {
                const preview = document.createElement('div');
                preview.className = 'photo-preview';
                preview.innerHTML = `
                    <img src="${url}" alt="Foto" />
                    <div style="color:#aaa;font-size:11px;margin-top:8px;">
                        ${type === 'portrait' ? '👤 Modo Retrato' : '📷 RAW'} • ${currentComposition.label}
                    </div>
                    <div class="photo-actions">
                        <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                        <button class="btn-save" onclick="downloadMedia('${url}','jpg')">💾 Salvar</button>
                    </div>
                `;
                document.body.appendChild(preview);
            };

            // Gravação de vídeo (com suporte a modo cinema)
            const toggleRecording = async (cinemaMode = false) => {
                if (isRecording) {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                    isRecording = false;
                    document.getElementById('shutterBtn').classList.remove('recording');
                    document.getElementById('timerBadge').classList.remove('active');
                    document.getElementById('timerBadge').textContent = '00:00';
                    if (recordingTimer) {
                        clearInterval(recordingTimer);
                        recordingTimer = null;
                    }
                    seconds = 0;
                    document.getElementById('suggestion').textContent = cinemaMode ? '🎬 Vídeo Cinema salvo!' : '✅ Vídeo salvo!';
                    return;
                }

                if (!stream) return;
                try {
                    const options = { mimeType: 'video/mp4' };
                    mediaRecorder = new MediaRecorder(stream, options);
                    recordedChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            recordedChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                        const url = URL.createObjectURL(blob);
                        const preview = document.createElement('div');
                        preview.className = 'photo-preview';
                        preview.innerHTML = `
                            <video src="${url}" controls autoplay></video>
                            <div style="color:#aaa;font-size:11px;margin-top:8px;">
                                ${cinemaMode ? '🎬 Modo Cinema' : '🎥 Vídeo'} • ${currentComposition.label}
                            </div>
                            <div class="photo-actions">
                                <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                                <button class="btn-save" onclick="downloadMedia('${url}','mp4')">💾 Salvar</button>
                            </div>
                        `;
                        document.body.appendChild(preview);
                        recordedChunks = [];
                    };

                    mediaRecorder.start(100);
                    isRecording = true;
                    document.getElementById('shutterBtn').classList.add('recording');
                    document.getElementById('timerBadge').classList.add('active');
                    seconds = 0;
                    recordingTimer = setInterval(() => {
                        seconds++;
                        const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
                        const secs = String(seconds % 60).padStart(2, '0');
                        document.getElementById('timerBadge').textContent = `${mins}:${secs}`;
                    }, 1000);
                    document.getElementById('suggestion').textContent = cinemaMode ? '🎬 Gravando Cinema...' : '🔴 Gravando...';
                } catch (err) {
                    console.error('Erro ao gravar:', err);
                    alert('Erro ao gravar vídeo.');
                }
            };

            window.downloadMedia = (url, ext) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = `photo-${Date.now()}.${ext}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const checkCameraSupport = () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    root.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;padding:30px;text-align:center;background:#000;color:#fff;">
                            <h2 style="font-size:24px;margin-bottom:10px;">📱 Dispositivo não compatível</h2>
                            <p style="color:#aaa;max-width:300px;">Seu navegador não suporta acesso à câmera.</p>
                        </div>
                    `;
                    return false;
                }
                return true;
            };

            if (checkCameraSupport()) {
                createApp();
            }

            // Sugestões IA
            setInterval(() => {
                const el = document.getElementById('suggestion');
                if (el && !el.textContent.includes('📚') && !el.textContent.includes('✅') && 
                    !el.textContent.includes('🔴') && !el.textContent.includes('🎬') && 
                    !el.textContent.includes('📍') && !el.textContent.includes('🎯') &&
                    !el.textContent.includes('☀️') && !el.textContent.includes('🔍') &&
                    !el.textContent.includes('👤') && !el.textContent.includes('📸')) {
                    const actions = [
                        'Mova para esquerda', 'Mova para direita', 'Aproxime', 'Afaste',
                        'Suba a câmera', 'Abaixe a câmera', 'Gire levemente',
                        'Alinhe ao horizonte', 'Posicione no ponto ideal',
                        `Aplique ${currentComposition.label}`,
                        'Toque para focar', 'Ajuste a exposição'
                    ];
                    el.textContent = actions[Math.floor(Math.random() * actions.length)];
                }
            }, 5000);

        })();
    </script>
</body>
</html>
