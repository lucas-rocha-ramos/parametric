                grid.appendChild(container);
            };

            // Desfoque otimizado (separável - horizontal + vertical)
            const applyBlurOptimized = (imageData, width, height, radius, mask) => {
                if (radius < 0.5) return imageData;
                
                const data = imageData.data;
                const tempData = new Uint8ClampedArray(data);
                const r = Math.round(radius);
                if (r <= 0) return imageData;
                
                // Usar cache para o mesmo raio
                const cacheKey = `${r}`;
                if (!blurCache[cacheKey]) {
                    // Gerar kernel gaussiano simplificado
                    const kernel = [];
                    let sum = 0;
                    for (let i = -r; i <= r; i++) {
                        const val = Math.exp(-(i * i) / (2 * r * r * 0.5));
                        kernel.push(val);
                        sum += val;
                    }
                    blurCache[cacheKey] = { kernel, sum, radius: r };
                }
                
                const { kernel, sum } = blurCache[cacheKey];
                const half = r;
                const size = kernel.length;
                
                // Aplicar blur apenas onde mask == 0 (fundo)
                // Pular processamento se não houver máscara
                const useMask = mask && mask.length > 0;
                
                // Se não houver máscara, aplicar blur em toda imagem
                if (!useMask) {
                    // Blur horizontal
                    const tempData2 = new Uint8ClampedArray(data);
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            const idx = (y * width + x) * 4;
                            let rSum = 0, gSum = 0, bSum = 0;
                            let weightSum = 0;
                            for (let i = 0; i < size; i++) {
                                const dx = i - half;
                                const px = Math.min(width - 1, Math.max(0, x + dx));
                                const pIdx = (y * width + px) * 4;
                                const w = kernel[i];
                                rSum += tempData2[pIdx] * w;
                                gSum += tempData2[pIdx + 1] * w;
                                bSum += tempData2[pIdx + 2] * w;
                                weightSum += w;
                            }
                            if (weightSum > 0) {
                                data[idx] = rSum / weightSum;
                                data[idx + 1] = gSum / weightSum;
                                data[idx + 2] = bSum / weightSum;
                            }
                        }
                    }
                    
                    // Blur vertical
                    const tempData3 = new Uint8ClampedArray(data);
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            const idx = (y * width + x) * 4;
                            let rSum = 0, gSum = 0, bSum = 0;
                            let weightSum = 0;
                            for (let i = 0; i < size; i++) {
                                const dy = i - half;
                                const py = Math.min(height - 1, Math.max(0, y + dy));
                                const pIdx = (py * width + x) * 4;
                                const w = kernel[i];
                                rSum += tempData3[pIdx] * w;
                                gSum += tempData3[pIdx + 1] * w;
                                bSum += tempData3[pIdx + 2] * w;
                                weightSum += w;
                            }
                            if (weightSum > 0) {
                                data[idx] = rSum / weightSum;
                                data[idx + 1] = gSum / weightSum;
                                data[idx + 2] = bSum / weightSum;
                            }
                        }
                    }
                    return imageData;
                }
                
                // Com máscara - blur apenas no fundo
                // Horizontal
                const tempData2 = new Uint8ClampedArray(data);
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const idx = (y * width + x) * 4;
                        const isPerson = mask[y * width + x] > 0.5;
                        if (!isPerson) {
                            let rSum = 0, gSum = 0, bSum = 0;
                            let weightSum = 0;
                            for (let i = 0; i < size; i++) {
                                const dx = i - half;
                                const px = Math.min(width - 1, Math.max(0, x + dx));
                                const pIdx = (y * width + px) * 4;
                                const w = kernel[i];
                                rSum += tempData2[pIdx] * w;
                                gSum += tempData2[pIdx + 1] * w;
                                bSum += tempData2[pIdx + 2] * w;
                                weightSum += w;
                            }
                            if (weightSum > 0) {
                                data[idx] = rSum / weightSum;
                                data[idx + 1] = gSum / weightSum;
                                data[idx + 2] = bSum / weightSum;
                            }
                        }
                    }
                }
                
                // Vertical
                const tempData3 = new Uint8ClampedArray(data);
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const idx = (y * width + x) * 4;
                        const isPerson = mask[y * width + x] > 0.5;
                        if (!isPerson) {
                            let rSum = 0, gSum = 0, bSum = 0;
                            let weightSum = 0;
                            for (let i = 0; i < size; i++) {
                                const dy = i - half;
                                const py = Math.min(height - 1, Math.max(0, y + dy));
                                const pIdx = (py * width + x) * 4;
                                const w = kernel[i];
                                rSum += tempData3[pIdx] * w;
                                gSum += tempData3[pIdx + 1] * w;
                                bSum += tempData3[pIdx + 2] * w;
                                weightSum += w;
                            }
                            if (weightSum > 0) {
                                data[idx] = rSum / weightSum;
                                data[idx + 1] = gSum / weightSum;
                                data[idx + 2] = bSum / weightSum;
                            }
                        }
                    }
                }
                
                return imageData;
            };

            // Carregar BodyPix
            const loadBodyPix = async () => {
                try {
                    loadingIndicator.classList.add('active');
                    loadingIndicator.querySelector('.text').textContent = '🔄 Carregando IA...';
                    
                    bodyPixModel = await bodyPix.load({
                        architecture: 'MobileNetV1',
                        outputStride: 16,
                        multiplier: 0.5,
                        quantBytes: 2
                    });
                    
                    segmentationReady = true;
                    loadingIndicator.classList.remove('active');
                    document.getElementById('suggestion').textContent = '🧠 IA carregada!';
                    console.log('✅ BodyPix carregado!');
                } catch (error) {
                    console.error('❌ Erro BodyPix:', error);
                    loadingIndicator.classList.remove('active');
                    loadingIndicator.querySelector('.text').textContent = '⚠️ Falha ao carregar IA';
                    document.getElementById('suggestion').textContent = '⚠️ IA não disponível';
                }
            };

            // Processar segmentação OTIMIZADO
            const processSegmentation = async () => {
                if (!videoElement || !canvasOutput || !bodyPixModel || !segmentationReady || isProcessing) {
                    return;
                }

                try {
                    isProcessing = true;
                    
                    // Pular frames para performance
                    frameCount++;
                    if (frameCount % processEveryNFrames !== 0) {
                        isProcessing = false;
                        return;
                    }
                    
                    const vw = videoElement.videoWidth || 640;
                    const vh = videoElement.videoHeight || 480;
                    
                    // Usar resolução reduzida para segmentação
                    const segW = Math.floor(vw / 3);
                    const segH = Math.floor(vh / 3);
                    
                    // Fazer segmentação em resolução reduzida
                    const segmentation = await bodyPixModel.segmentPerson(videoElement, {
                        flipHorizontal: facingMode === 'user',
                        internalResolution: 'low',
                        segmentationThreshold: 0.65
                    });

                    if (!segmentation || !segmentation.data) {
                        isProcessing = false;
                        return;
                    }

                    lastSegmentation = segmentation;
                    
                    // Configurar canvas para saída
                    const displayWidth = canvasOutput.width;
                    const displayHeight = canvasOutput.height;
                    
                    // Desenhar o vídeo no canvas
                    ctxOutput.drawImage(videoElement, 0, 0, displayWidth, displayHeight);
                    
                    // Obter dados da imagem
                    const imageData = ctxOutput.getImageData(0, 0, displayWidth, displayHeight);
                    
                    // Criar máscara em baixa resolução e redimensionar
                    const segData = segmentation.data;
                    const segWidth = segmentation.width;
                    const segHeight = segmentation.height;
                    
                    // Criar máscara para a resolução do canvas
                    const mask = new Float32Array(displayWidth * displayHeight);
                    
                    for (let y = 0; y < displayHeight; y++) {
                        for (let x = 0; x < displayWidth; x++) {
                            const segX = Math.floor((x / displayWidth) * segWidth);
                            const segY = Math.floor((y / displayHeight) * segHeight);
                            const segIdx = segY * segWidth + segX;
                            mask[y * displayWidth + x] = segData[segIdx] > 0.5 ? 1 : 0;
                        }
                    }
                    
                    // Aplicar desfoque otimizado
                    const aperture = APERTURE_VALUES[currentApertureIndex];
                    const blurRadius = aperture.blur * 0.8; // Reduzido para performance
                    
                    if (blurRadius > 0.5) {
                        applyBlurOptimized(imageData, displayWidth, displayHeight, blurRadius, mask);
                    }
                    
                    // Vinheta suave (mais leve)
                    if (blurRadius > 1) {
                        const centerX = displayWidth / 2;
                        const centerY = displayHeight / 2;
                        const maxDist = Math.min(displayWidth, displayHeight) / 2;
                        const data = imageData.data;
                        const vignetteStrength = 0.15;
                        
                        for (let y = 0; y < displayHeight; y++) {
                            for (let x = 0; x < displayWidth; x++) {
                                const idx = (y * displayWidth + x) * 4;
                                const dist = Math.hypot(x - centerX, y - centerY);
                                const vignette = 1 - Math.pow(dist / maxDist, 2) * vignetteStrength;
                                data[idx] *= vignette;
                                data[idx + 1] *= vignette;
                                data[idx + 2] *= vignette;
                            }
                        }
                    }
                    
                    ctxOutput.putImageData(imageData, 0, 0);
                    
                    // Atualizar display da abertura
                    const aperDisplay = document.querySelector('.aperture-control .value');
                    if (aperDisplay) {
                        aperDisplay.textContent = aperture.label;
                    }
                    
                    isProcessing = false;
                } catch (error) {
                    console.error('Erro no processamento:', error);
                    isProcessing = false;
                }
            };

            // Loop de processamento OTIMIZADO
            const startProcessingLoop = () => {
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                }
                
                const processLoop = async () => {
                    if (currentMode === 'portrait' || currentMode === 'cinema') {
                        await processSegmentation();
                    } else {
                        // Limpar canvas se não estiver em modo IA
                        if (canvasOutput) {
                            ctxOutput.clearRect(0, 0, canvasOutput.width, canvasOutput.height);
                        }
                    }
                    animationFrame = requestAnimationFrame(processLoop);
                };
                
                processLoop();
            };

            // Criar app
            const createApp = () => {
                root.innerHTML = `
                    <div class="camera-container" id="app">
                        <div class="video-wrapper" id="videoWrapper">
                            <video id="video" autoplay playsinline muted></video>
                            <canvas id="canvas-output"></canvas>
                            <div class="overlay-grid" id="overlayGrid"></div>
                            <div class="guide-label" id="guideLabel">${currentComposition.label}</div>
                            
                            <div class="focus-indicator" id="focusIndicator"></div>
                            
                            <div class="aperture-control" id="apertureControl">
                                <div class="label">📸 Abertura</div>
                                <div class="value" id="apertureValue">f/2.8</div>
                                <div class="sub">Profundidade</div>
                                <input type="range" class="aperture-slider" id="apertureSlider" 
                                       min="0" max="${APERTURE_VALUES.length - 1}" value="2" step="1" />
                            </div>
                            
                            <div class="zoom-slider" id="zoomSlider">
                                <div class="thumb" id="zoomThumb" style="top:50%;"></div>
                            </div>
                            
                            <div class="loading-indicator" id="loadingIndicator">
                                <span class="spinner"></span>
                                <span class="text">Carregando IA...</span>
                            </div>
                            
                            <div class="camera-selector" id="cameraSelector"></div>
                            
                            <div class="score-panel">
                                <div class="score-item"><span>Comp</span><span class="score-value" id="compScore">--</span></div>
                                <div class="score-item"><span>Luz</span><span class="score-value" id="lightScore">--</span></div>
                                <div class="score-item"><span>Quadro</span><span class="score-value" id="frameScore">--</span></div>
                                <div class="score-item" style="border-top:1px solid rgba(255,255,255,0.04);padding-top:1px;margin-top:1px">
                                    <span>Geral</span>
                                    <span class="score-value" style="color:#fbbf24" id="overallScore">--</span>
                                </div>
                            </div>

                            <div class="timer-badge" id="timerBadge">00:00</div>
                            <div class="ai-suggestion" id="suggestion">📸 Toque na tela para focar</div>

                            <div class="bottom-controls">
                                <div class="mode-filters">
                                    <button class="mode-filter-btn active" data-mode="camera">📷 Foto</button>
                                    <button class="mode-filter-btn" data-mode="video">🎥 Vídeo</button>
                                    <button class="mode-filter-btn" data-mode="portrait">👤 Retrato <span class="badge">IA</span></button>
                                    <button class="mode-filter-btn" data-mode="cinema">🎬 Cinema <span class="badge">IA</span></button>
                                </div>
                                
                                <div class="composition-scroll" id="compositionScroll">
                                    ${COMPOSITIONS.map(comp => `
                                        <div class="comp-chip ${comp.id === currentComposition.id ? 'active' : ''}" data-id="${comp.id}">
                                            ${comp.label}
                                            <span class="pos-indicator">${comp.id === currentComposition.id ? `📍 ${getCurrentPosition()}` : ''}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                
                                <div class="action-buttons">
                                    <button class="action-btn" id="flipBtn">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M4 8v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/>
                                            <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
                                            <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0"/>
                                        </svg>
                                    </button>
                                    <button class="shutter-btn" id="shutterBtn">
                                        <div class="record-dot"></div>
                                    </button>
                                    <button class="action-btn" id="apertureBtn">⭕</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                videoElement = document.getElementById('video');
                canvasOutput = document.getElementById('canvas-output');
                ctxOutput = canvasOutput.getContext('2d');
                focusIndicator = document.getElementById('focusIndicator');
                apertureControl = document.getElementById('apertureControl');
                apertureSlider = document.getElementById('apertureSlider');
                apertureValueDisplay = document.getElementById('apertureValue');
                zoomSlider = document.getElementById('zoomSlider');
                loadingIndicator = document.getElementById('loadingIndicator');

                // Configurar tamanho do canvas
                const resizeCanvas = () => {
                    const rect = videoElement.getBoundingClientRect();
                    canvasOutput.width = Math.floor(rect.width * 0.8);
                    canvasOutput.height = Math.floor(rect.height * 0.8);
                };
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);

                // Eventos
                setupEvents();
                
                detectCameras().then(() => {
                    startCamera();
                });
                
                setTimeout(() => {
                    loadBodyPix();
                }, 1500);
                
                renderGuideOverlay(currentComposition, getCurrentPosition());
                updateLabel();
                startProcessingLoop();
            };

            // Configurar eventos
            const setupEvents = () => {
                const wrapper = document.getElementById('videoWrapper');
                
                wrapper.addEventListener('click', function(e) {
                    if (e.target.closest('.action-btn') || e.target.closest('.shutter-btn') || 
                        e.target.closest('.mode-filter-btn') || e.target.closest('.comp-chip') ||
                        e.target.closest('.cam-btn') || e.target.closest('.zoom-slider') ||
                        e.target.closest('.aperture-control')) {
                        return;
                    }
                    const rect = this.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width;
                    const y = (e.clientY - rect.top) / rect.height;
                    setFocus(x, y);
                });

                let lastTouchDist = 0;
                wrapper.addEventListener('touchstart', function(e) {
                    if (e.touches.length === 2) {
                        const t1 = e.touches[0];
                        const t2 = e.touches[1];
                        lastTouchDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                        isZoomActive = true;
                        zoomSlider.classList.add('active');
                    }
                }, { passive: true });

                wrapper.addEventListener('touchmove', function(e) {
                    if (e.touches.length === 2 && isZoomActive) {
                        const t1 = e.touches[0];
                        const t2 = e.touches[1];
                        const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                        const delta = (dist - lastTouchDist) / 300;
                        const newZoom = Math.max(1, Math.min(4, currentZoom + delta));
                        setZoom(newZoom);
                        lastTouchDist = dist;
                    }
                }, { passive: true });

                wrapper.addEventListener('touchend', function(e) {
                    if (e.touches.length < 2) {
                        isZoomActive = false;
                        setTimeout(() => zoomSlider.classList.remove('active'), 1500);
                    }
                }, { passive: true });

                document.getElementById('flipBtn').addEventListener('click', () => {
                    if (availableCameras.length > 1) {
                        const next = (currentCameraIndex + 1) % availableCameras.length;
                        switchCamera(next);
                    } else {
                        facingMode = facingMode === 'environment' ? 'user' : 'environment';
                        if (stream) {
                            stream.getTracks().forEach(t => t.stop());
                        }
                        startCamera();
                    }
                });

                document.getElementById('shutterBtn').addEventListener('click', handleShutter);
                
                document.getElementById('apertureBtn').addEventListener('click', () => {
                    isApertureActive = !isApertureActive;
                    apertureControl.classList.toggle('active', isApertureActive);
                    if (isApertureActive) {
                        document.getElementById('suggestion').textContent = '⭕ Ajuste a abertura';
                    }
                });

                apertureSlider.addEventListener('input', function() {
                    currentApertureIndex = parseInt(this.value);
                    const aperture = APERTURE_VALUES[currentApertureIndex];
                    apertureValueDisplay.textContent = aperture.label;
                    document.getElementById('suggestion').textContent = `⭕ ${aperture.label}`;
                    
                    if (currentMode === 'portrait' || currentMode === 'cinema') {
                        isProcessing = false;
                    }
                });

                document.querySelectorAll('.mode-filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.mode-filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentMode = this.dataset.mode;
                        
                        const isIA = currentMode === 'portrait' || currentMode === 'cinema';
                        canvasOutput.classList.toggle('active', isIA);
                        apertureControl.classList.toggle('active', isIA);
                        
                        if (isIA && !segmentationReady) {
                            document.getElementById('suggestion').textContent = '⏳ Carregando IA...';
                            loadBodyPix();
                        }
                        
                        const shutter = document.getElementById('shutterBtn');
                        if (currentMode === 'video' || currentMode === 'cinema') {
                            shutter.classList.add('recording');
                            document.getElementById('suggestion').textContent = currentMode === 'cinema' ? 
                                '🎬 Cinema - Toque para gravar' : '🎥 Toque para gravar';
                        } else {
                            shutter.classList.remove('recording');
                            if (currentMode === 'portrait') {
                                document.getElementById('suggestion').textContent = '👤 Retrato com IA';
                            } else {
                                document.getElementById('suggestion').textContent = '📸 Toque para capturar';
                            }
                        }
                        
                        if (isIA) {
                            isProcessing = false;
                        }
                    });
                });

                document.querySelectorAll('.comp-chip').forEach(chip => {
                    chip.addEventListener('click', function() {
                        const id = this.dataset.id;
                        const comp = COMPOSITIONS.find(c => c.id === id);
                        if (comp) {
                            currentComposition = comp;
                            currentPositionIndex = 0;
                            renderGuideOverlay(comp, getCurrentPosition());
                            updateChips();
                            updateLabel();
                            this.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                            document.getElementById('suggestion').textContent = `📍 ${comp.label}`;
                        }
                    });
                });

                document.addEventListener('click', function(e) {
                    const target = e.target;
                    if (target.closest('.comp-chip') || target.closest('.action-btn') || 
                        target.closest('.mode-filter-btn') || target.closest('.cam-btn') ||
                        target.closest('.shutter-btn') || target.closest('.zoom-slider') ||
                        target.closest('.aperture-control') || target.closest('.photo-preview')) {
                        return;
                    }
                    if (currentMode !== 'video' && currentMode !== 'cinema') {
                        nextPosition();
                        document.getElementById('suggestion').textContent = `📍 ${getCurrentPosition()}`;
                    }
                });

                const slider = document.getElementById('zoomSlider');
                slider.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = this.getBoundingClientRect();
                    const y = (touch.clientY - rect.top) / rect.height;
                    const zoomVal = 1 + (1 - y) * 3;
                    setZoom(zoomVal);
                }, { passive: false });

                slider.addEventListener('touchmove', function(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = this.getBoundingClientRect();
                    const y = (touch.clientY - rect.top) / rect.height;
                    const zoomVal = 1 + (1 - Math.max(0, Math.min(1, y))) * 3;
                    setZoom(zoomVal);
                }, { passive: false });
            };

            const setFocus = (x, y) => {
                focusIndicator.style.left = (x * 100) + '%';
                focusIndicator.style.top = (y * 100) + '%';
                focusIndicator.classList.remove('active');
                void focusIndicator.offsetWidth;
                focusIndicator.classList.add('active');
                setTimeout(() => focusIndicator.classList.remove('active'), 600);
                document.getElementById('suggestion').textContent = `🎯 Foco`;
            };

            const setZoom = (value) => {
                currentZoom = Math.max(1, Math.min(4, value));
                if (videoElement) {
                    videoElement.style.transform = `scale(${currentZoom})`;
                }
                const pct = ((currentZoom - 1) / 3) * 100;
                const thumb = document.getElementById('zoomThumb');
                if (thumb) thumb.style.top = (100 - pct) + '%';
                document.getElementById('suggestion').textContent = `🔍 ${currentZoom.toFixed(1)}x`;
            };

            const detectCameras = async () => {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const videoDevices = devices.filter(d => d.kind === 'videoinput');
                    availableCameras = videoDevices;
                    if (availableCameras.length > 0) {
                        renderCameraButtons();
                    }
                    return videoDevices;
                } catch (e) {
                    console.log('Erro ao detectar câmeras:', e);
                    return [];
                }
            };

            const renderCameraButtons = () => {
                const container = document.getElementById('cameraSelector');
                if (!container) return;
                container.innerHTML = '';
                availableCameras.forEach((cam, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `cam-btn ${idx === currentCameraIndex ? 'active' : ''}`;
                    btn.textContent = cam.label ? cam.label.replace(/[^a-zA-Z0-9]/g,'').slice(0,5) : `Cam ${idx+1}`;
                    btn.dataset.index = idx;
                    btn.addEventListener('click', () => switchCamera(idx));
                    container.appendChild(btn);
                });
            };

            const switchCamera = async (index) => {
                if (index === currentCameraIndex) return;
                if (!availableCameras[index]) return;
                currentCameraIndex = index;
                const deviceId = availableCameras[index].deviceId;
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                }
                await startCamera(deviceId);
                document.querySelectorAll('.cam-btn').forEach((btn, i) => {
                    btn.classList.toggle('active', i === index);
                });
            };

            const startCamera = async (deviceId = null) => {
                try {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error('Navegador não suporta câmera');
                    }

                    const constraints = {
                        video: {
                            facingMode: deviceId ? undefined : facingMode,
                            deviceId: deviceId ? { exact: deviceId } : undefined,
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        },
                        audio: false
                    };

                    if (!deviceId) {
                        delete constraints.video.deviceId;
                    }

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    if (videoElement) {
                        videoElement.srcObject = stream;
                        await videoElement.play();
                        isCameraReady = true;
                        document.getElementById('suggestion').textContent = '📸 Câmera pronta!';
                        
                        // Ajustar canvas após câmera iniciar
                        setTimeout(() => {
                            const rect = videoElement.getBoundingClientRect();
                            canvasOutput.width = Math.floor(rect.width * 0.7);
                            canvasOutput.height = Math.floor(rect.height * 0.7);
                        }, 100);
                    }
                } catch (error) {
                    console.error('❌ Erro:', error);
                    if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                        showPermissionError('Permissão negada. Permita o acesso à câmera nas configurações do Safari.');
                    } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
                        showPermissionError('Nenhuma câmera encontrada.');
                    } else {
                        showPermissionError(error.message || 'Erro ao acessar a câmera.');
                    }
                }
            };

            const showPermissionError = (msg) => {
                const overlay = document.querySelector('.permission-overlay');
                if (overlay) {
                    overlay.querySelector('.error-msg').textContent = msg;
                    return;
                }
                
                const overlayDiv = document.createElement('div');
                overlayDiv.className = 'permission-overlay';
                overlayDiv.innerHTML = `
                    <h2>📷 Acesso à Câmera</h2>
                    <p>O Photo Composition AI precisa acessar sua câmera.</p>
                    <button class="permission-btn" id="retryBtn">🔄 Tentar Novamente</button>
                    <div class="error-msg">${msg}</div>
                `;
                document.querySelector('.video-wrapper').appendChild(overlayDiv);
                
                document.getElementById('retryBtn').addEventListener('click', () => {
                    overlayDiv.remove();
                    startCamera();
                });
            };

            const handleShutter = () => {
                if (!isCameraReady || !stream) {
                    document.getElementById('suggestion').textContent = '⏳ Aguarde...';
                    return;
                }
                
                if (currentMode === 'video') {
                    toggleRecording(false);
                } else if (currentMode === 'cinema') {
                    toggleRecording(true);
                } else if (currentMode === 'portrait') {
                    capturePhoto(true);
                } else {
                    capturePhoto(false);
                }
            };

            const capturePhoto = (portrait = false) => {
                if (!videoElement || !isCameraReady) {
                    document.getElementById('suggestion').textContent = '⏳ Aguarde...';
                    return;
                }
                
                const canvas = document.createElement('canvas');
                const width = videoElement.videoWidth || 640;
                const height = videoElement.videoHeight || 480;
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                if (portrait && segmentationReady && lastSegmentation) {
                    // Usar segmentação para foto com IA
                    ctx.drawImage(videoElement, 0, 0, width, height);
                    const imageData = ctx.getImageData(0, 0, width, height);
                    
                    const segData = lastSegmentation.data;
                    const segWidth = lastSegmentation.width;
                    const segHeight = lastSegmentation.height;
                    
                    // Criar máscara
                    const mask = new Float32Array(width * height);
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            const segX = Math.floor((x / width) * segWidth);
                            const segY = Math.floor((y / height) * segHeight);
                            const segIdx = segY * segWidth + segX;
                            mask[y * width + x] = segData[segIdx] > 0.5 ? 1 : 0;
                        }
                    }
                    
                    const aperture = APERTURE_VALUES[currentApertureIndex];
                    const blurRadius = aperture.blur * 0.6;
                    
                    if (blurRadius > 0.5) {
                        applyBlurOptimized(imageData, width, height, blurRadius, mask);
                    }
                    
                    ctx.putImageData(imageData, 0, 0);
                    document.getElementById('suggestion').textContent = `👤 Retrato ${aperture.label}`;
                } else if (portrait) {
                    // Fallback: desfoque radial simples
                    ctx.drawImage(videoElement, 0, 0, width, height);
                    const imageData = ctx.getImageData(0, 0, width, height);
                    const data = imageData.data;
                    const centerX = width / 2;
                    const centerY = height / 2;
                    const radius = Math.min(width, height) * 0.3;
                    
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            const dist = Math.hypot(x - centerX, y - centerY);
                            if (dist > radius) {
                                const idx = (y * width + x) * 4;
                                const blur = Math.min(0.4, (dist - radius) / radius * 0.3);
                                data[idx] = data[idx] * (1 - blur);
                                data[idx + 1] = data[idx + 1] * (1 - blur);
                                data[idx + 2] = data[idx + 2] * (1 - blur);
                            }
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                    document.getElementById('suggestion').textContent = '👤 Retrato (simples)';
                } else {
                    ctx.drawImage(videoElement, 0, 0, width, height);
                    document.getElementById('suggestion').textContent = `📸 ${currentComposition.label}`;
                }
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                showPreview(dataUrl, portrait ? 'portrait' : 'photo');
                
                const compScore = Math.floor(60 + Math.random() * 35);
                const lightScore = Math.floor(50 + Math.random() * 40);
                const frameScore = Math.floor(55 + Math.random() * 40);
                document.getElementById('compScore').textContent = compScore + '%';
                document.getElementById('lightScore').textContent = lightScore + '%';
                document.getElementById('frameScore').textContent = frameScore + '%';
                document.getElementById('overallScore').textContent = Math.floor((compScore + lightScore + frameScore) / 3);
            };

            const showPreview = (url, type) => {
                const preview = document.createElement('div');
                preview.className = 'photo-preview';
                preview.innerHTML = `
                    <img src="${url}" alt="Foto" />
                    <div style="color:#888;font-size:10px;margin-top:6px;">
                        ${type === 'portrait' ? `👤 Retrato ${APERTURE_VALUES[currentApertureIndex].label}` : '📷 Foto'} • ${currentComposition.label}
                    </div>
                    <div class="photo-actions">
                        <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                        <button class="btn-save" onclick="downloadMedia('${url}','jpg')">💾 Salvar</button>
                    </div>
                `;
                document.body.appendChild(preview);
            };

            const toggleRecording = async (cinemaMode = false) => {
                if (isRecording) {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                    isRecording = false;
                    document.getElementById('shutterBtn').classList.remove('recording');
                    document.getElementById('timerBadge').classList.remove('active');
                    document.getElementById('timerBadge').textContent = '00:00';
                    if (recordingTimer) {
                        clearInterval(recordingTimer);
                        recordingTimer = null;
                    }
                    seconds = 0;
                    document.getElementById('suggestion').textContent = cinemaMode ? '🎬 Cinema salvo!' : '✅ Vídeo salvo!';
                    return;
                }

                if (!stream) {
                    document.getElementById('suggestion').textContent = '⏳ Aguarde...';
                    return;
                }
                
                try {
                    if (typeof MediaRecorder === 'undefined') {
                        throw new Error('MediaRecorder não suportado');
                    }

                    let sourceStream = stream;
                    if (cinemaMode && canvasOutput && canvasOutput.captureStream) {
                        sourceStream = canvasOutput.captureStream(15);
                    }

                    const options = { mimeType: 'video/mp4' };
                    mediaRecorder = new MediaRecorder(sourceStream, options);
                    recordedChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            recordedChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        if (recordedChunks.length === 0) {
                            document.getElementById('suggestion').textContent = '⚠️ Nenhum dado';
                            return;
                        }
                        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                        const url = URL.createObjectURL(blob);
                        const preview = document.createElement('div');
                        preview.className = 'photo-preview';
                        preview.innerHTML = `
                            <video src="${url}" controls autoplay></video>
                            <div style="color:#888;font-size:10px;margin-top:6px;">
                                ${cinemaMode ? `🎬 Cinema ${APERTURE_VALUES[currentApertureIndex].label}` : '🎥 Vídeo'} • ${currentComposition.label}
                            </div>
                            <div class="photo-actions">
                                <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                                <button class="btn-save" onclick="downloadMedia('${url}','mp4')">💾 Salvar</button>
                            </div>
                        `;
                        document.body.appendChild(preview);
                        recordedChunks = [];
                    };

                    mediaRecorder.start(100);
                    isRecording = true;
                    document.getElementById('shutterBtn').classList.add('recording');
                    document.getElementById('timerBadge').classList.add('active');
                    seconds = 0;
                    recordingTimer = setInterval(() => {
                        seconds++;
                        const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
                        const secs = String(seconds % 60).padStart(2, '0');
                        document.getElementById('timerBadge').textContent = `${mins}:${secs}`;
                    }, 1000);
                    document.getElementById('suggestion').textContent = cinemaMode ? '🎬 Gravando Cinema...' : '🔴 Gravando...';
                } catch (err) {
                    console.error('Erro:', err);
                    document.getElementById('suggestion').textContent = '⚠️ Erro: ' + err.message;
                }
            };

            window.downloadMedia = (url, ext) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = `photo-${Date.now()}.${ext}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const checkCameraSupport = () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    root.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;padding:30px;text-align:center;background:#000;color:#fff;">
                            <h2 style="font-size:20px;margin-bottom:8px;">📱 Dispositivo não compatível</h2>
                            <p style="color:#888;max-width:260px;">Seu navegador não suporta acesso à câmera.</p>
                        </div>
                    `;
                    return false;
                }
                return true;
            };

            if (checkCameraSupport()) {
                createApp();
            }

            // Sugestões IA (mais leves)
            setInterval(() => {
                const el = document.getElementById('suggestion');
                if (el && isCameraReady && !el.textContent.includes('📍') && !el.textContent.includes('⭕') &&
                    !el.textContent.includes('🔴') && !el.textContent.includes('✅') && !el.textContent.includes('🎬') &&
                    !el.textContent.includes('⏳') && !el.textContent.includes('⚠️') && !el.textContent.includes('📸') &&
                    !el.textContent.includes('🎯') && !el.textContent.includes('🔍') && !el.textContent.includes('👤') &&
                    !el.textContent.includes('🧠') && !el.textContent.includes('🎥')) {
                    const actions = [
                        'Mova para esquerda', 'Mova para direita', 'Aproxime', 'Afaste',
                        'Alinhe ao horizonte', 'Posicione no ponto ideal',
                        `Aplique ${currentComposition.label}`
                    ];
                    el.textContent = actions[Math.floor(Math.random() * actions.length)];
                }
            }, 6000);

        })();
    </script>
</body>
</html>
