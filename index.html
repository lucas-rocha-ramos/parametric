<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Photo AI" />
    <link rel="manifest" href="/manifest.json" />
    <title>Photo Composition AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none;
        }
        #root {
            height: 100%;
            width: 100%;
            background: #000;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .overlay-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .overlay-grid svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .grid-line {
            position: absolute;
            background: rgba(255, 215, 0, 0.5);
        }
        .guide-label {
            position: absolute;
            color: rgba(255, 215, 0, 0.9);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 12px;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 6;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.85) 30%);
            padding: 15px 0 25px 0;
            z-index: 20;
            pointer-events: none;
        }
        .bottom-controls > * {
            pointer-events: auto;
        }
        
        .mode-filters {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
            padding: 0 20px;
        }
        .mode-filter-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            color: #aaa;
            padding: 5px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(4px);
        }
        .mode-filter-btn.active {
            background: #fbbf24;
            border-color: #fbbf24;
            color: #000;
        }
        .mode-filter-btn:active {
            transform: scale(0.92);
        }
        
        .composition-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 0 12px 8px 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .composition-scroll::-webkit-scrollbar {
            display: none;
        }
        .comp-chip {
            flex: 0 0 auto;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(6px);
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 9px;
            border: 1px solid rgba(255,255,255,0.08);
            color: #ccc;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .comp-chip.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .comp-chip:active {
            transform: scale(0.92);
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
            padding: 0 20px;
            margin-top: 5px;
        }
        .action-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active {
            transform: scale(0.88);
            background: rgba(255,255,255,0.2);
        }
        .shutter-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255,255,255,0.4);
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: 0.15s;
        }
        .shutter-btn:active {
            transform: scale(0.88);
        }
        .shutter-btn.recording {
            background: #ff3b30;
            border-color: #ff3b30;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .record-dot {
            width: 18px;
            height: 18px;
            background: #ff3b30;
            border-radius: 4px;
            margin: 0 auto;
        }
        .shutter-btn.recording .record-dot {
            border-radius: 50%;
            width: 22px;
            height: 22px;
        }
        
        .score-panel {
            position: absolute;
            top: 16px;
            right: 12px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 8px 12px;
            min-width: 80px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 20;
            pointer-events: none;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            padding: 1px 0;
            color: #ddd;
        }
        .score-value {
            font-weight: 700;
            color: #fbbf24;
        }
        .ai-suggestion {
            position: absolute;
            bottom: 165px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(255, 215, 0, 0.25);
            color: #fbbf24;
            white-space: nowrap;
            z-index: 15;
            max-width: 88%;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 30px;
            text-align: center;
        }
        .permission-overlay h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        .permission-overlay p {
            color: #aaa;
            font-size: 16px;
            max-width: 300px;
            margin-bottom: 20px;
        }
        .permission-btn {
            background: #fbbf24;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            color: #000;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .permission-btn:active {
            transform: scale(0.95);
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
        }
        .photo-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .photo-preview img, .photo-preview video {
            max-width: 100%;
            max-height: 65%;
            border-radius: 12px;
            object-fit: contain;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .photo-actions {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        .photo-actions button {
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .photo-actions button:active {
            transform: scale(0.95);
        }
        .btn-close {
            background: #fbbf24;
            color: #000;
        }
        .btn-save {
            background: #333;
            color: #fff;
        }
        .timer-badge {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8);
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            z-index: 30;
            display: none;
        }
        .timer-badge.active {
            display: block;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .camera-selector {
            position: absolute;
            top: 16px;
            left: 12px;
            z-index: 25;
            display: flex;
            gap: 6px;
        }
        .cam-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
            color: #aaa;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: 600;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .cam-btn.active {
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .cam-btn:active {
            transform: scale(0.92);
        }
        
        @media (max-width: 430px) {
            .score-panel {
                padding: 5px 8px;
                min-width: 60px;
                top: 12px;
                right: 8px;
            }
            .score-item {
                font-size: 8px;
                padding: 0px 0;
            }
            .mode-filter-btn {
                font-size: 10px;
                padding: 4px 12px;
            }
            .mode-filters {
                gap: 12px;
            }
            .comp-chip {
                font-size: 8px;
                padding: 3px 8px;
            }
            .action-btn {
                width: 40px;
                height: 40px;
                font-size: 15px;
            }
            .shutter-btn {
                width: 58px;
                height: 58px;
            }
            .ai-suggestion {
                font-size: 10px;
                padding: 5px 12px;
                bottom: 150px;
                max-width: 92%;
            }
            .guide-label {
                font-size: 9px;
                padding: 2px 8px;
                bottom: 6px;
            }
            .bottom-controls {
                padding: 10px 0 18px 0;
            }
            .cam-btn {
                font-size: 8px;
                padding: 2px 8px;
            }
            .timer-badge {
                font-size: 11px;
                padding: 2px 10px;
                top: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // TODAS AS 57 REGRAS DE COMPOSIÇÃO
        const COMPOSITION_RULES = [
            'Regra dos Terços', 'Proporção Áurea', 'Espiral Áurea', 'Regra do Centro',
            'Regra dos Quartos', 'Regra dos Nove Quadrantes', 'Simetria',
            'Assimetria Balanceada', 'Equilíbrio de Peso Visual', 'Regra dos Ímpares',
            'Linhas Guia', 'Linhas Diagonais', 'Linhas Horizontais', 'Linhas Verticais',
            'Pontos de Fuga', 'Enquadramento Natural', 'Moldura Dentro da Moldura',
            'Camadas', 'Profundidade de Campo', 'Sobreposição de Elementos',
            'Espaço Negativo', 'Espaço Positivo', 'Espaço Respirável',
            'Minimalismo na Composição', 'Ritmo Visual', 'Repetição de Formas',
            'Textura', 'Padrões Geométricos', 'Ponto Focal Único',
            'Múltiplos Pontos Focais', 'Contraste de Foco', 'Isolamento do Sujeito',
            'Bokeh', 'Luz Dura vs Luz Suave', 'Contraste Tonal', 'High Key',
            'Low Key', 'Silhueta', 'Contraluz', 'Triângulos Composicionais',
            'Círculos e Curvas', 'Formas Geométricas Implícitas', 'Composição Triangular',
            'Hierarquia Visual', 'Fluxo de Leitura da Imagem', 'Direção Natural do Olhar',
            'Peso Visual', 'Regra do Olhar', 'Regra da Cabeça', 'Plano de Fundo Limpo',
            'Separação de Planos', 'Enquadramento Narrativo', 'Quebra Intencional de Regras',
            'Caos Controlado', 'Composição Abstrata', 'Minimalismo Extremo', 'Assimetria Radical'
        ];

        (function() {
            const root = document.getElementById('root');
            let currentFacingMode = 'environment';
            let currentGuide = 'Regra dos Terços';
            let stream = null;
            let isCameraReady = false;
            let videoElement = null;
            let zoomLevel = 1;
            let isRecording = false;
            let mediaRecorder = null;
            let recordedChunks = [];
            let recordingTimer = null;
            let seconds = 0;
            let availableCameras = [];
            let currentCameraIndex = 0;

            // Renderizar overlay da guia
            const renderGuideOverlay = (guide) => {
                const grid = document.getElementById('overlayGrid');
                const label = document.getElementById('guideLabel');
                label.textContent = guide;
                grid.innerHTML = '';

                let container = document.createElement('div');
                container.style.cssText = 'width:100%;height:100%;position:relative;';

                switch(guide) {
                    case 'Regra dos Terços': {
                        const lines = [
                            { left: '33.33%', top: '0', width: '1px', height: '100%' },
                            { left: '66.66%', top: '0', width: '1px', height: '100%' },
                            { left: '0', top: '33.33%', width: '100%', height: '1px' },
                            { left: '0', top: '66.66%', width: '100%', height: '1px' }
                        ];
                        lines.forEach(l => {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            Object.assign(div.style, l);
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'Regra dos Quartos': {
                        const lines = [
                            { left: '25%', top: '0', width: '1px', height: '100%' },
                            { left: '50%', top: '0', width: '1px', height: '100%' },
                            { left: '75%', top: '0', width: '1px', height: '100%' },
                            { left: '0', top: '25%', width: '100%', height: '1px' },
                            { left: '0', top: '50%', width: '100%', height: '1px' },
                            { left: '0', top: '75%', width: '100%', height: '1px' }
                        ];
                        lines.forEach(l => {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            Object.assign(div.style, l);
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'Regra dos Nove Quadrantes': {
                        for (let i = 1; i <= 8; i++) {
                            const pct = (i / 9 * 100).toFixed(2);
                            const div1 = document.createElement('div');
                            div1.className = 'grid-line';
                            div1.style.cssText = `left:${pct}%;top:0;width:1px;height:100%;opacity:${i%3===0?0.5:0.25};`;
                            container.appendChild(div1);
                            const div2 = document.createElement('div');
                            div2.className = 'grid-line';
                            div2.style.cssText = `top:${pct}%;left:0;width:100%;height:1px;opacity:${i%3===0?0.5:0.25};`;
                            container.appendChild(div2);
                        }
                        break;
                    }
                    case 'Simetria': {
                        const div = document.createElement('div');
                        div.className = 'grid-line';
                        div.style.cssText = 'left:50%;top:0;width:1px;height:100%;';
                        container.appendChild(div);
                        break;
                    }
                    case 'Linhas Diagonais': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        const line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line1.setAttribute('x1', '0%');
                        line1.setAttribute('y1', '0%');
                        line1.setAttribute('x2', '100%');
                        line1.setAttribute('y2', '100%');
                        line1.setAttribute('stroke', 'rgba(255,215,0,0.5)');
                        line1.setAttribute('stroke-width', '1');
                        svg.appendChild(line1);
                        const line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line2.setAttribute('x1', '100%');
                        line2.setAttribute('y1', '0%');
                        line2.setAttribute('x2', '0%');
                        line2.setAttribute('y2', '100%');
                        line2.setAttribute('stroke', 'rgba(255,215,0,0.5)');
                        line2.setAttribute('stroke-width', '1');
                        svg.appendChild(line2);
                        container.appendChild(svg);
                        break;
                    }
                    case 'Linhas Horizontais': {
                        [33.33, 66.66].forEach(pct => {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            div.style.cssText = `top:${pct}%;left:0;width:100%;height:1px;`;
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'Linhas Verticais': {
                        [33.33, 66.66].forEach(pct => {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            div.style.cssText = `left:${pct}%;top:0;width:1px;height:100%;`;
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'Pontos de Fuga': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        const lines = [
                            ['50%','50%','10%','10%'],
                            ['50%','50%','90%','10%'],
                            ['50%','50%','10%','90%'],
                            ['50%','50%','90%','90%']
                        ];
                        lines.forEach(([x1,y1,x2,y2]) => {
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', x1);
                            line.setAttribute('y1', y1);
                            line.setAttribute('x2', x2);
                            line.setAttribute('y2', y2);
                            line.setAttribute('stroke', 'rgba(255,215,0,0.35)');
                            line.setAttribute('stroke-width', '1');
                            svg.appendChild(line);
                        });
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('cx', '50%');
                        circle.setAttribute('cy', '50%');
                        circle.setAttribute('r', '4');
                        circle.setAttribute('fill', 'rgba(255,215,0,0.8)');
                        svg.appendChild(circle);
                        container.appendChild(svg);
                        break;
                    }
                    case 'Proporção Áurea':
                    case 'Espiral Áurea': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        const rects = [
                            {x:38.2,y:38.2,w:23.6,h:23.6},
                            {x:38.2,y:61.8,w:23.6,h:23.6},
                            {x:61.8,y:38.2,w:23.6,h:23.6}
                        ];
                        rects.forEach(r => {
                            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                            rect.setAttribute('x', r.x);
                            rect.setAttribute('y', r.y);
                            rect.setAttribute('width', r.w);
                            rect.setAttribute('height', r.h);
                            rect.setAttribute('fill', 'none');
                            rect.setAttribute('stroke', 'rgba(255,215,0,0.25)');
                            rect.setAttribute('stroke-width', '1');
                            svg.appendChild(rect);
                        });
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', 'M50,50 Q60,40 70,50 Q80,60 70,70 Q60,80 50,70 Q40,60 50,50');
                        path.setAttribute('fill', 'none');
                        path.setAttribute('stroke', 'rgba(255,215,0,0.6)');
                        path.setAttribute('stroke-width', '1.5');
                        svg.appendChild(path);
                        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        dot.setAttribute('cx', '50');
                        dot.setAttribute('cy', '50');
                        dot.setAttribute('r', '2');
                        dot.setAttribute('fill', 'rgba(255,215,0,0.8)');
                        svg.appendChild(dot);
                        container.appendChild(svg);
                        break;
                    }
                    case 'Triângulos Composicionais':
                    case 'Composição Triangular': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                        poly.setAttribute('points', '50,5 5,95 95,95');
                        poly.setAttribute('fill', 'none');
                        poly.setAttribute('stroke', 'rgba(255,215,0,0.5)');
                        poly.setAttribute('stroke-width', '1.5');
                        svg.appendChild(poly);
                        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line.setAttribute('x1', '50');
                        line.setAttribute('y1', '5');
                        line.setAttribute('x2', '50');
                        line.setAttribute('y2', '95');
                        line.setAttribute('stroke', 'rgba(255,215,0,0.2)');
                        line.setAttribute('stroke-width', '0.5');
                        line.setAttribute('stroke-dasharray', '3,3');
                        svg.appendChild(line);
                        container.appendChild(svg);
                        break;
                    }
                    case 'Círculos e Curvas': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        const circles = [
                            {cx:50,cy:50,r:30},
                            {cx:50,cy:50,r:15}
                        ];
                        circles.forEach(c => {
                            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                            circle.setAttribute('cx', c.cx + '%');
                            circle.setAttribute('cy', c.cy + '%');
                            circle.setAttribute('r', c.r + '%');
                            circle.setAttribute('fill', 'none');
                            circle.setAttribute('stroke', 'rgba(255,215,0,0.35)');
                            circle.setAttribute('stroke-width', '1');
                            svg.appendChild(circle);
                        });
                        container.appendChild(svg);
                        break;
                    }
                    case 'Linhas Guia': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        const path1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path1.setAttribute('d', 'M10,90 Q30,70 50,50 Q70,30 90,10');
                        path1.setAttribute('fill', 'none');
                        path1.setAttribute('stroke', 'rgba(255,215,0,0.4)');
                        path1.setAttribute('stroke-width', '1.5');
                        path1.setAttribute('stroke-dasharray', '5,5');
                        svg.appendChild(path1);
                        const path2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path2.setAttribute('d', 'M10,70 Q30,50 50,50 Q70,50 90,50');
                        path2.setAttribute('fill', 'none');
                        path2.setAttribute('stroke', 'rgba(255,215,0,0.25)');
                        path2.setAttribute('stroke-width', '1');
                        path2.setAttribute('stroke-dasharray', '3,3');
                        svg.appendChild(path2);
                        container.appendChild(svg);
                        break;
                    }
                    case 'Enquadramento Natural':
                    case 'Moldura Dentro da Moldura': {
                        const divs = [
                            {top:'10%',left:'10%',width:'80%',height:'80%',borderWidth:'2px',opacity:0.4},
                            {top:'20%',left:'20%',width:'60%',height:'60%',borderWidth:'1px',opacity:0.2}
                        ];
                        divs.forEach(d => {
                            const div = document.createElement('div');
                            div.style.cssText = `position:absolute;top:${d.top};left:${d.left};width:${d.width};height:${d.height};border:${d.borderWidth} solid rgba(255,215,0,${d.opacity});border-radius:8px;pointer-events:none;`;
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'Camadas': {
                        [33, 66].forEach(pct => {
                            const div = document.createElement('div');
                            div.style.cssText = `position:absolute;bottom:${pct}%;left:0;width:100%;height:1px;border-top:1px solid rgba(255,215,0,${pct===33?0.3:0.2});`;
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'Regra do Centro': {
                        const div1 = document.createElement('div');
                        div1.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30%;height:30%;border:2px solid rgba(255,215,0,0.4);border-radius:50%;';
                        container.appendChild(div1);
                        const div2 = document.createElement('div');
                        div2.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10%;height:10%;border:1px solid rgba(255,215,0,0.6);border-radius:50%;';
                        container.appendChild(div2);
                        break;
                    }
                    case 'Regra dos Ímpares': {
                        [30,50,70].forEach(pct => {
                            const div = document.createElement('div');
                            div.style.cssText = `position:absolute;top:30%;left:${pct}%;width:8px;height:8px;background:rgba(255,215,0,0.4);border-radius:50%;transform:translateX(-50%);`;
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'Espaço Negativo': {
                        const div1 = document.createElement('div');
                        div1.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:2px solid rgba(255,215,0,0.15);';
                        container.appendChild(div1);
                        const div2 = document.createElement('div');
                        div2.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40%;height:40%;border:1px solid rgba(255,215,0,0.3);';
                        container.appendChild(div2);
                        const div3 = document.createElement('div');
                        div3.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20%;height:20%;background:rgba(255,215,0,0.08);border-radius:50%;';
                        container.appendChild(div3);
                        break;
                    }
                    case 'Silhueta': {
                        const div1 = document.createElement('div');
                        div1.style.cssText = 'position:absolute;bottom:0;left:0;width:100%;height:40%;background:rgba(0,0,0,0.5);';
                        container.appendChild(div1);
                        const div2 = document.createElement('div');
                        div2.style.cssText = 'position:absolute;bottom:40%;left:30%;width:40%;height:30%;background:rgba(0,0,0,0.3);clip-path:polygon(0% 100%,50% 0%,100% 100%);';
                        container.appendChild(div2);
                        break;
                    }
                    case 'Contraluz': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        [20,10,5].forEach(r => {
                            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                            circle.setAttribute('cx', '50%');
                            circle.setAttribute('cy', '30%');
                            circle.setAttribute('r', r + '%');
                            circle.setAttribute('fill', `rgba(255,200,50,${r===20?0.08:r===10?0.15:0.25})`);
                            svg.appendChild(circle);
                        });
                        container.appendChild(svg);
                        break;
                    }
                    case 'Bokeh': {
                        const positions = [
                            {top:20,left:15,size:8,blur:2,opacity:0.3},
                            {top:25,left:75,size:12,blur:3,opacity:0.2},
                            {top:60,left:20,size:6,blur:1,opacity:0.3},
                            {top:70,left:80,size:10,blur:4,opacity:0.2},
                            {top:40,left:50,size:4,blur:1,opacity:0.4}
                        ];
                        positions.forEach(p => {
                            const div = document.createElement('div');
                            div.style.cssText = `position:absolute;top:${p.top}%;left:${p.left}%;width:${p.size}px;height:${p.size}px;background:rgba(255,215,0,${p.opacity});border-radius:50%;filter:blur(${p.blur}px);transform:translate(-50%,-50%);`;
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'High Key': {
                        const div = document.createElement('div');
                        div.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center, rgba(255,255,255,0.12), transparent 70%);';
                        container.appendChild(div);
                        break;
                    }
                    case 'Low Key': {
                        const div1 = document.createElement('div');
                        div1.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.5));';
                        container.appendChild(div1);
                        const div2 = document.createElement('div');
                        div2.style.cssText = 'position:absolute;bottom:20%;left:50%;transform:translateX(-50%);width:60%;height:1px;background:rgba(255,215,0,0.15);';
                        container.appendChild(div2);
                        break;
                    }
                    default: {
                        // Para regras sem overlay específico
                        const div = document.createElement('div');
                        div.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:1px dashed rgba(255,215,0,0.1);';
                        container.appendChild(div);
                        break;
                    }
                }
                grid.appendChild(container);
            };

            // Detectar câmeras disponíveis
            const detectCameras = async () => {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const videoDevices = devices.filter(d => d.kind === 'videoinput');
                    availableCameras = videoDevices;
                    if (availableCameras.length > 0) {
                        renderCameraButtons();
                    }
                    return videoDevices;
                } catch (e) {
                    console.log('Erro ao detectar câmeras:', e);
                    return [];
                }
            };

            const renderCameraButtons = () => {
                const container = document.getElementById('cameraSelector');
                if (!container) return;
                container.innerHTML = '';
                availableCameras.forEach((cam, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `cam-btn ${idx === currentCameraIndex ? 'active' : ''}`;
                    btn.textContent = cam.label ? cam.label.replace(/[^a-zA-Z0-9]/g,'').slice(0,8) : `Cam ${idx+1}`;
                    btn.dataset.index = idx;
                    btn.addEventListener('click', () => switchCamera(idx));
                    container.appendChild(btn);
                });
            };

            const switchCamera = async (index) => {
                if (index === currentCameraIndex) return;
                if (!availableCameras[index]) return;
                currentCameraIndex = index;
                const deviceId = availableCameras[index].deviceId;
                // Reiniciar com a nova câmera
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                await startCamera(deviceId);
                document.querySelectorAll('.cam-btn').forEach((btn, i) => {
                    btn.classList.toggle('active', i === index);
                });
            };

            // Criar app
            const createApp = () => {
                root.innerHTML = `
                    <div class="camera-container" id="app">
                        <div class="video-wrapper">
                            <video id="video" autoplay playsinline muted></video>
                            <div class="overlay-grid" id="overlayGrid"></div>
                            <div class="guide-label" id="guideLabel">${currentGuide}</div>
                            <div class="timer-badge" id="timerBadge">00:00</div>
                            
                            <div class="camera-selector" id="cameraSelector"></div>
                            
                            <div class="score-panel">
                                <div class="score-item"><span>Composição</span><span class="score-value" id="compScore">78%</span></div>
                                <div class="score-item"><span>Iluminação</span><span class="score-value" id="lightScore">65%</span></div>
                                <div class="score-item"><span>Enquadramento</span><span class="score-value" id="frameScore">72%</span></div>
                                <div class="score-item" style="border-top:1px solid rgba(255,255,255,0.08);padding-top:3px;margin-top:1px">
                                    <span>Geral</span>
                                    <span class="score-value" style="color:#fbbf24" id="overallScore">72</span>
                                </div>
                            </div>

                            <div class="ai-suggestion" id="suggestion">📸 Aponte para um objeto principal</div>

                            <div class="bottom-controls">
                                <div class="mode-filters">
                                    <button class="mode-filter-btn active" data-mode="camera">📷 Foto</button>
                                    <button class="mode-filter-btn" data-mode="video">🎥 Vídeo</button>
                                    <button class="mode-filter-btn" data-mode="learn">📚 Aprender</button>
                                </div>
                                
                                <div class="composition-scroll" id="compositionScroll">
                                    ${COMPOSITION_RULES.map(rule => `
                                        <div class="comp-chip ${rule === currentGuide ? 'active' : ''}" data-guide="${rule}">
                                            ${rule}
                                        </div>
                                    `).join('')}
                                </div>
                                
                                <div class="action-buttons">
                                    <button class="action-btn" id="flipBtn">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M4 8v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/>
                                            <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
                                            <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0"/>
                                        </svg>
                                    </button>
                                    <button class="shutter-btn" id="shutterBtn">
                                        <div class="record-dot"></div>
                                    </button>
                                    <button class="action-btn" id="zoomBtn">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="11" cy="11" r="8"/>
                                            <path d="m21 21-4.35-4.35"/>
                                            <path d="M11 8v6"/>
                                            <path d="M8 11h6"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                videoElement = document.getElementById('video');
                
                // Eventos
                document.getElementById('flipBtn').addEventListener('click', () => {
                    // Alternar para próxima câmera disponível
                    if (availableCameras.length > 1) {
                        const next = (currentCameraIndex + 1) % availableCameras.length;
                        switchCamera(next);
                    } else {
                        // Fallback: alternar entre front/back
                        currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
                        if (stream) stream.getTracks().forEach(t => t.stop());
                        startCamera();
                    }
                });

                document.getElementById('shutterBtn').addEventListener('click', handleShutter);
                document.getElementById('zoomBtn').addEventListener('click', () => {
                    zoomLevel = Math.min(zoomLevel + 0.1, 3);
                    if (videoElement) {
                        videoElement.style.transform = `scale(${zoomLevel})`;
                    }
                });

                // Eventos para as guias
                document.querySelectorAll('.comp-chip').forEach(chip => {
                    chip.addEventListener('click', function() {
                        document.querySelectorAll('.comp-chip').forEach(c => c.classList.remove('active'));
                        this.classList.add('active');
                        currentGuide = this.dataset.guide;
                        renderGuideOverlay(currentGuide);
                        this.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    });
                });

                // Eventos para os modos
                document.querySelectorAll('.mode-filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.mode-filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        const mode = this.dataset.mode;
                        const shutter = document.getElementById('shutterBtn');
                        if (mode === 'video') {
                            shutter.classList.add('recording');
                            document.getElementById('suggestion').textContent = '🎥 Toque no botão vermelho para gravar';
                        } else if (mode === 'learn') {
                            shutter.classList.remove('recording');
                            document.getElementById('suggestion').textContent = '📚 Toque em uma regra para aprender mais';
                        } else {
                            shutter.classList.remove('recording');
                            document.getElementById('suggestion').textContent = '📸 Toque no botão para capturar';
                        }
                    });
                });

                // Detectar câmeras e iniciar
                detectCameras().then(() => {
                    startCamera();
                });
                renderGuideOverlay(currentGuide);
            };

            // Iniciar câmera
            const startCamera = async (deviceId = null) => {
                try {
                    const constraints = {
                        video: {
                            facingMode: deviceId ? undefined : currentFacingMode,
                            deviceId: deviceId ? { exact: deviceId } : undefined,
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: true
                    };

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    if (videoElement) {
                        videoElement.srcObject = stream;
                        await videoElement.play();
                        isCameraReady = true;
                        console.log('✅ Câmera iniciada!');
                    }
                } catch (error) {
                    console.error('❌ Erro:', error);
                    showPermissionError(error.message);
                }
            };

            const showPermissionError = (msg) => {
                const overlay = document.createElement('div');
                overlay.className = 'permission-overlay';
                overlay.innerHTML = `
                    <h2>📷 Acesso à Câmera</h2>
                    <p>O Photo Composition AI precisa acessar sua câmera para funcionar.</p>
                    <button class="permission-btn" id="retryBtn">Permitir Acesso</button>
                    <div class="error-msg">${msg || 'Toque no botão acima e permita o acesso no Safari'}</div>
                `;
                document.querySelector('.video-wrapper').appendChild(overlay);
                document.getElementById('retryBtn').addEventListener('click', () => {
                    overlay.remove();
                    startCamera();
                });
            };

            // Manipular shutter
            const handleShutter = () => {
                const activeMode = document.querySelector('.mode-filter-btn.active');
                if (!activeMode) return;
                const mode = activeMode.dataset.mode;
                
                if (mode === 'video') {
                    toggleRecording();
                } else if (mode === 'camera') {
                    capturePhoto();
                } else {
                    document.getElementById('suggestion').textContent = `📚 "${currentGuide}" - Regra de composição para criar imagens equilibradas.`;
                }
            };

            // Capturar foto
            const capturePhoto = () => {
                if (!videoElement || !isCameraReady) {
                    alert('Aguarde a câmera iniciar');
                    return;
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = videoElement.videoWidth || 1280;
                canvas.height = videoElement.videoHeight || 720;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg');
                
                const preview = document.createElement('div');
                preview.className = 'photo-preview';
                preview.innerHTML = `
                    <img src="${dataUrl}" alt="Foto" />
                    <div class="photo-actions">
                        <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                        <button class="btn-save" onclick="downloadMedia('${dataUrl}','jpg')">💾 Salvar</button>
                    </div>
                `;
                document.body.appendChild(preview);
                
                const compScore = Math.floor(60 + Math.random() * 35);
                const lightScore = Math.floor(50 + Math.random() * 40);
                const frameScore = Math.floor(55 + Math.random() * 40);
                document.getElementById('compScore').textContent = compScore + '%';
                document.getElementById('lightScore').textContent = lightScore + '%';
                document.getElementById('frameScore').textContent = frameScore + '%';
                document.getElementById('overallScore').textContent = Math.floor((compScore + lightScore + frameScore) / 3);
                document.getElementById('suggestion').textContent = `📸 ${currentGuide} aplicada!`;
            };

            // Gravação
            const toggleRecording = async () => {
                if (isRecording) {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                    isRecording = false;
                    document.getElementById('shutterBtn').classList.remove('recording');
                    document.getElementById('timerBadge').classList.remove('active');
                    document.getElementById('timerBadge').textContent = '00:00';
                    if (recordingTimer) {
                        clearInterval(recordingTimer);
                        recordingTimer = null;
                    }
                    seconds = 0;
                    document.getElementById('suggestion').textContent = '✅ Vídeo salvo!';
                    return;
                }

                if (!stream) return;
                try {
                    const options = { mimeType: 'video/mp4' };
                    mediaRecorder = new MediaRecorder(stream, options);
                    recordedChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            recordedChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                        const url = URL.createObjectURL(blob);
                        const preview = document.createElement('div');
                        preview.className = 'photo-preview';
                        preview.innerHTML = `
                            <video src="${url}" controls autoplay></video>
                            <div class="photo-actions">
                                <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                                <button class="btn-save" onclick="downloadMedia('${url}','mp4')">💾 Salvar</button>
                            </div>
                        `;
                        document.body.appendChild(preview);
                        recordedChunks = [];
                    };

                    mediaRecorder.start(100);
                    isRecording = true;
                    document.getElementById('shutterBtn').classList.add('recording');
                    document.getElementById('timerBadge').classList.add('active');
                    seconds = 0;
                    recordingTimer = setInterval(() => {
                        seconds++;
                        const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
                        const secs = String(seconds % 60).padStart(2, '0');
                        document.getElementById('timerBadge').textContent = `${mins}:${secs}`;
                    }, 1000);
                    document.getElementById('suggestion').textContent = '🔴 Gravando... Toque no botão vermelho para parar';
                } catch (err) {
                    console.error('Erro ao gravar:', err);
                    alert('Erro ao gravar vídeo.');
                }
            };

            window.downloadMedia = (url, ext) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = `photo-${Date.now()}.${ext}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const checkCameraSupport = () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    root.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;padding:30px;text-align:center;background:#000;color:#fff;">
                            <h2 style="font-size:24px;margin-bottom:10px;">📱 Dispositivo não compatível</h2>
                            <p style="color:#aaa;max-width:300px;">Seu navegador não suporta acesso à câmera.</p>
                        </div>
                    `;
                    return false;
                }
                return true;
            };

            if (checkCameraSupport()) {
                createApp();
            }

            // Sugestões IA
            setInterval(() => {
                const el = document.getElementById('suggestion');
                if (el && !el.textContent.includes('📚') && !el.textContent.includes('✅') && !el.textContent.includes('🔴') && !el.textContent.includes('🎥')) {
                    const actions = [
                        'Mova para esquerda', 'Mova para direita', 'Aproxime', 'Afaste',
                        'Suba a câmera', 'Abaixe a câmera', 'Gire levemente',
                        'Alinhe ao horizonte', 'Posicione no ponto ideal',
                        `Aplique ${currentGuide}`
                    ];
                    el.textContent = actions[Math.floor(Math.random() * actions.length)];
                }
            }, 5000);

        })();
    </script>
</body>
</html>
