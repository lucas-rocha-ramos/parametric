<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Photo AI" />
    <link rel="manifest" href="/manifest.json" />
    <title>Photo Composition AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none;
        }
        #root {
            height: 100%;
            width: 100%;
            background: #000;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .overlay-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .overlay-grid svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .grid-line {
            position: absolute;
            background: rgba(255, 215, 0, 0.5);
        }
        .guide-label {
            position: absolute;
            color: rgba(255, 215, 0, 0.9);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 12px;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 6;
            backdrop-filter: blur(4px);
            pointer-events: none;
            text-align: center;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .guide-label .position-indicator {
            display: block;
            font-size: 10px;
            color: rgba(255,215,0,0.6);
            margin-top: 2px;
        }
        
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.85) 30%);
            padding: 15px 0 25px 0;
            z-index: 20;
            pointer-events: none;
        }
        .bottom-controls > * {
            pointer-events: auto;
        }
        
        .mode-filters {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
            padding: 0 20px;
        }
        .mode-filter-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            color: #aaa;
            padding: 5px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(4px);
        }
        .mode-filter-btn.active {
            background: #fbbf24;
            border-color: #fbbf24;
            color: #000;
        }
        .mode-filter-btn:active {
            transform: scale(0.92);
        }
        
        .composition-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 0 12px 8px 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .composition-scroll::-webkit-scrollbar {
            display: none;
        }
        .comp-chip {
            flex: 0 0 auto;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(6px);
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 9px;
            border: 1px solid rgba(255,255,255,0.08);
            color: #ccc;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .comp-chip.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .comp-chip:active {
            transform: scale(0.92);
        }
        .comp-chip .pos-indicator {
            display: block;
            font-size: 7px;
            color: rgba(255,215,0,0.5);
            text-align: center;
            margin-top: 1px;
            font-weight: 400;
        }
        .comp-chip.active .pos-indicator {
            color: #fbbf24;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
            padding: 0 20px;
            margin-top: 5px;
        }
        .action-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active {
            transform: scale(0.88);
            background: rgba(255,255,255,0.2);
        }
        .shutter-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255,255,255,0.4);
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: 0.15s;
        }
        .shutter-btn:active {
            transform: scale(0.88);
        }
        .shutter-btn.recording {
            background: #ff3b30;
            border-color: #ff3b30;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .record-dot {
            width: 18px;
            height: 18px;
            background: #ff3b30;
            border-radius: 4px;
            margin: 0 auto;
        }
        .shutter-btn.recording .record-dot {
            border-radius: 50%;
            width: 22px;
            height: 22px;
        }
        
        .score-panel {
            position: absolute;
            top: 16px;
            right: 12px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 8px 12px;
            min-width: 80px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 20;
            pointer-events: none;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            padding: 1px 0;
            color: #ddd;
        }
        .score-value {
            font-weight: 700;
            color: #fbbf24;
        }
        .ai-suggestion {
            position: absolute;
            bottom: 165px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(255, 215, 0, 0.25);
            color: #fbbf24;
            white-space: nowrap;
            z-index: 15;
            max-width: 88%;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 30px;
            text-align: center;
        }
        .permission-overlay h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        .permission-overlay p {
            color: #aaa;
            font-size: 16px;
            max-width: 300px;
            margin-bottom: 20px;
        }
        .permission-btn {
            background: #fbbf24;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            color: #000;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .permission-btn:active {
            transform: scale(0.95);
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
        }
        .photo-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .photo-preview img, .photo-preview video {
            max-width: 100%;
            max-height: 65%;
            border-radius: 12px;
            object-fit: contain;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .photo-actions {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        .photo-actions button {
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .photo-actions button:active {
            transform: scale(0.95);
        }
        .btn-close {
            background: #fbbf24;
            color: #000;
        }
        .btn-save {
            background: #333;
            color: #fff;
        }
        .timer-badge {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8);
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            z-index: 30;
            display: none;
        }
        .timer-badge.active {
            display: block;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .camera-selector {
            position: absolute;
            top: 16px;
            left: 12px;
            z-index: 25;
            display: flex;
            gap: 6px;
        }
        .cam-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
            color: #aaa;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: 600;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .cam-btn.active {
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .cam-btn:active {
            transform: scale(0.92);
        }
        
        .position-tip {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 9px;
            color: rgba(255,215,0,0.5);
            z-index: 7;
            pointer-events: none;
            white-space: nowrap;
        }
        
        @media (max-width: 430px) {
            .score-panel {
                padding: 5px 8px;
                min-width: 60px;
                top: 12px;
                right: 8px;
            }
            .score-item {
                font-size: 8px;
                padding: 0px 0;
            }
            .mode-filter-btn {
                font-size: 10px;
                padding: 4px 12px;
            }
            .mode-filters {
                gap: 12px;
            }
            .comp-chip {
                font-size: 8px;
                padding: 3px 10px;
            }
            .comp-chip .pos-indicator {
                font-size: 6px;
            }
            .action-btn {
                width: 40px;
                height: 40px;
                font-size: 15px;
            }
            .shutter-btn {
                width: 58px;
                height: 58px;
            }
            .ai-suggestion {
                font-size: 10px;
                padding: 5px 12px;
                bottom: 150px;
                max-width: 92%;
            }
            .guide-label {
                font-size: 9px;
                padding: 2px 8px;
                bottom: 6px;
            }
            .guide-label .position-indicator {
                font-size: 8px;
            }
            .bottom-controls {
                padding: 10px 0 18px 0;
            }
            .cam-btn {
                font-size: 8px;
                padding: 2px 8px;
            }
            .timer-badge {
                font-size: 11px;
                padding: 2px 10px;
                top: 12px;
            }
            .position-tip {
                font-size: 8px;
                bottom: 45px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // 15 COMPOSIÇÕES COM POSIÇÕES
        const COMPOSITIONS = [
            { id: 'rule-of-thirds', label: 'RULE OF THIRDS', positions: ['padrão', 'invertido', 'vertical', 'horizontal'] },
            { id: 'symmetry', label: 'SYMMETRY', positions: ['vertical', 'horizontal', 'central'] },
            { id: 'phi-grid', label: 'PHI GRID', positions: ['padrão', 'invertido'] },
            { id: 'fibonacci-spiral', label: 'FIBONACCI SPIRAL', positions: ['superior-esquerdo', 'superior-direito', 'inferior-esquerdo', 'inferior-direito'] },
            { id: 'golden-triangles', label: 'GOLDEN TRIANGLES', positions: ['superior', 'inferior', 'esquerda', 'direita'] },
            { id: 'vanishing-point', label: 'VANISHING POINT', positions: ['centro', 'superior', 'inferior', 'esquerda', 'direita'] },
            { id: 'framing-depth', label: 'FRAMING DEPTH', positions: ['padrão', 'invertido'] },
            { id: 'landscape-depth', label: 'LANDSCAPE DEPTH', positions: ['superior', 'inferior'] },
            { id: 'leading-lines', label: 'LEADING LINES', positions: ['direita', 'esquerda', 'centro'] },
            { id: 'lines-patterns', label: 'LINES AND PATTERNS', positions: ['horizontal', 'vertical', 'diagonal', 'curvo'] },
            { id: 'fill-the-frame', label: 'FILL THE FRAME', positions: ['centro', 'superior', 'inferior'] },
            { id: 'negative-space', label: 'NEGATIVE SPACE', positions: ['superior', 'inferior', 'esquerda', 'direita'] },
            { id: 'left-to-right', label: 'LEFT TO RIGHT', positions: ['esquerda→direita', 'direita→esquerda'] },
            { id: 'dynamic-symmetry', label: 'DYNAMIC SYMMETRY', positions: ['padrão', 'invertido'] },
            { id: 'harmonic-armature', label: 'HARMONIC ARMATURE', positions: ['padrão', 'refletido'] }
        ];

        (function() {
            const root = document.getElementById('root');
            let currentComposition = COMPOSITIONS[0];
            let currentPositionIndex = 0;
            let facingMode = 'environment';
            let stream = null;
            let isCameraReady = false;
            let videoElement = null;
            let zoomLevel = 1;
            let isRecording = false;
            let mediaRecorder = null;
            let recordedChunks = [];
            let recordingTimer = null;
            let seconds = 0;
            let availableCameras = [];
            let currentCameraIndex = 0;

            // Função para obter posição atual
            const getCurrentPosition = () => {
                return currentComposition.positions[currentPositionIndex % currentComposition.positions.length];
            };

            // Função para avançar posição
            const nextPosition = () => {
                currentPositionIndex = (currentPositionIndex + 1) % currentComposition.positions.length;
                renderGuideOverlay(currentComposition, getCurrentPosition());
                updateChips();
                updateLabel();
            };

            // Atualizar chips
            const updateChips = () => {
                document.querySelectorAll('.comp-chip').forEach(chip => {
                    const id = chip.dataset.id;
                    const isActive = id === currentComposition.id;
                    chip.classList.toggle('active', isActive);
                    if (isActive) {
                        const pos = getCurrentPosition();
                        const posDisplay = chip.querySelector('.pos-indicator');
                        if (posDisplay) posDisplay.textContent = `📍 ${pos}`;
                    }
                });
            };

            // Atualizar label
            const updateLabel = () => {
                const label = document.getElementById('guideLabel');
                const pos = getCurrentPosition();
                label.innerHTML = `${currentComposition.label} <span class="position-indicator">📍 ${pos}</span>`;
            };

            // Renderizar overlay da composição
            const renderGuideOverlay = (comp, position) => {
                const grid = document.getElementById('overlayGrid');
                grid.innerHTML = '';
                updateLabel();

                let container = document.createElement('div');
                container.style.cssText = 'width:100%;height:100%;position:relative;';

                const id = comp.id;
                const isInverted = position === 'invertido' || position === 'refletido' || position === 'inferior';
                const isVertical = position === 'vertical';
                const isHorizontal = position === 'horizontal';

                switch(id) {
                    case 'rule-of-thirds': {
                        const lines = [];
                        if (position === 'vertical') {
                            lines.push({ left: '33.33%', top: '0', width: '1px', height: '100%' });
                            lines.push({ left: '66.66%', top: '0', width: '1px', height: '100%' });
                        } else if (position === 'horizontal') {
                            lines.push({ top: '33.33%', left: '0', width: '100%', height: '1px' });
                            lines.push({ top: '66.66%', left: '0', width: '100%', height: '1px' });
                        } else {
                            lines.push({ left: '33.33%', top: '0', width: '1px', height: '100%' });
                            lines.push({ left: '66.66%', top: '0', width: '1px', height: '100%' });
                            lines.push({ top: '33.33%', left: '0', width: '100%', height: '1px' });
                            lines.push({ top: '66.66%', left: '0', width: '100%', height: '1px' });
                        }
                        if (position === 'invertido') {
                            // Inverte a ênfase - marcamos os cantos
                            const corners = [
                                { left: '10%', top: '10%', w: '15%', h: '15%' },
                                { left: '75%', top: '75%', w: '15%', h: '15%' }
                            ];
                            corners.forEach(c => {
                                const div = document.createElement('div');
                                div.style.cssText = `position:absolute;left:${c.left};top:${c.top};width:${c.w};height:${c.h};border:1px solid rgba(255,215,0,0.2);border-radius:4px;`;
                                container.appendChild(div);
                            });
                        }
                        lines.forEach(l => {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            Object.assign(div.style, l);
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'symmetry': {
                        if (position === 'vertical') {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            div.style.cssText = 'left:50%;top:0;width:1px;height:100%;';
                            container.appendChild(div);
                        } else if (position === 'horizontal') {
                            const div = document.createElement('div');
                            div.className = 'grid-line';
                            div.style.cssText = 'top:50%;left:0;width:100%;height:1px;';
                            container.appendChild(div);
                        } else {
                            const div1 = document.createElement('div');
                            div1.className = 'grid-line';
                            div1.style.cssText = 'left:50%;top:0;width:1px;height:100%;';
                            container.appendChild(div1);
                            const div2 = document.createElement('div');
                            div2.className = 'grid-line';
                            div2.style.cssText = 'top:50%;left:0;width:100%;height:1px;';
                            container.appendChild(div2);
                            // Círculo central
                            const circle = document.createElement('div');
                            circle.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20%;height:20%;border:1px solid rgba(255,215,0,0.2);border-radius:50%;';
                            container.appendChild(circle);
                        }
                        break;
                    }
                    case 'phi-grid': {
                        const ratio = isInverted ? 61.8 : 38.2;
                        const div1 = document.createElement('div');
                        div1.className = 'grid-line';
                        div1.style.cssText = `left:${ratio}%;top:0;width:1px;height:100%;`;
                        container.appendChild(div1);
                        const div2 = document.createElement('div');
                        div2.className = 'grid-line';
                        div2.style.cssText = `top:${ratio}%;left:0;width:100%;height:1px;`;
                        container.appendChild(div2);
                        // Retângulo áureo
                        const rect = document.createElement('div');
                        const rPos = isInverted ? 61.8 : 38.2;
                        const rSize = isInverted ? 38.2 : 23.6;
                        rect.style.cssText = `position:absolute;left:${rPos}%;top:${rPos}%;width:${rSize}%;height:${rSize}%;border:1px solid rgba(255,215,0,0.15);border-radius:4px;`;
                        container.appendChild(rect);
                        break;
                    }
                    case 'fibonacci-spiral': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        
                        let cx = 50, cy = 50;
                        let startX = 50, startY = 50;
                        let scale = 1;
                        
                        if (position === 'superior-esquerdo') { cx = 20; cy = 20; }
                        else if (position === 'superior-direito') { cx = 80; cy = 20; }
                        else if (position === 'inferior-esquerdo') { cx = 20; cy = 80; }
                        else if (position === 'inferior-direito') { cx = 80; cy = 80; }
                        
                        const spiral = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        const d = `M${cx},${cy} Q${cx+10},${cy-10} ${cx+20},${cy} Q${cx+30},${cy+10} ${cx+20},${cy+20} Q${cx+10},${cy+30} ${cx},${cy+20} Q${cx-10},${cy+10} ${cx},${cy}`;
                        spiral.setAttribute('d', d);
                        spiral.setAttribute('fill', 'none');
                        spiral.setAttribute('stroke', 'rgba(255,215,0,0.6)');
                        spiral.setAttribute('stroke-width', '1.5');
                        svg.appendChild(spiral);
                        
                        // Círculo no centro da espiral
                        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        dot.setAttribute('cx', cx);
                        dot.setAttribute('cy', cy);
                        dot.setAttribute('r', '3');
                        dot.setAttribute('fill', 'rgba(255,215,0,0.8)');
                        svg.appendChild(dot);
                        
                        container.appendChild(svg);
                        break;
                    }
                    case 'golden-triangles': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        
                        let points = '50,5 5,95 95,95';
                        if (position === 'inferior') points = '50,95 5,5 95,5';
                        else if (position === 'esquerda') points = '5,50 95,5 95,95';
                        else if (position === 'direita') points = '95,50 5,5 5,95';
                        
                        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                        poly.setAttribute('points', points);
                        poly.setAttribute('fill', 'none');
                        poly.setAttribute('stroke', 'rgba(255,215,0,0.5)');
                        poly.setAttribute('stroke-width', '1.5');
                        svg.appendChild(poly);
                        
                        container.appendChild(svg);
                        break;
                    }
                    case 'vanishing-point': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        
                        let vx = 50, vy = 50;
                        if (position === 'superior') { vx = 50; vy = 10; }
                        else if (position === 'inferior') { vx = 50; vy = 90; }
                        else if (position === 'esquerda') { vx = 10; vy = 50; }
                        else if (position === 'direita') { vx = 90; vy = 50; }
                        
                        const lines = [
                            [vx, vy, 10, 10], [vx, vy, 90, 10],
                            [vx, vy, 10, 90], [vx, vy, 90, 90],
                            [vx, vy, 10, 50], [vx, vy, 90, 50],
                            [vx, vy, 50, 10], [vx, vy, 50, 90]
                        ];
                        lines.forEach(([x1,y1,x2,y2]) => {
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', x1 + '%');
                            line.setAttribute('y1', y1 + '%');
                            line.setAttribute('x2', x2 + '%');
                            line.setAttribute('y2', y2 + '%');
                            line.setAttribute('stroke', `rgba(255,215,0,${Math.random()*0.2+0.2})`);
                            line.setAttribute('stroke-width', '1');
                            svg.appendChild(line);
                        });
                        
                        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        dot.setAttribute('cx', vx + '%');
                        dot.setAttribute('cy', vy + '%');
                        dot.setAttribute('r', '5');
                        dot.setAttribute('fill', 'rgba(255,215,0,0.8)');
                        svg.appendChild(dot);
                        
                        container.appendChild(svg);
                        break;
                    }
                    case 'framing-depth': {
                        const divs = [
                            {top: '10%', left: '10%', width: '80%', height: '80%', borderWidth: '2px', opacity: 0.3},
                            {top: '20%', left: '20%', width: '60%', height: '60%', borderWidth: '1px', opacity: 0.15}
                        ];
                        if (isInverted) {
                            divs[0].top = '5%'; divs[0].left = '5%'; divs[0].width = '90%'; divs[0].height = '90%';
                            divs[1].top = '15%'; divs[1].left = '15%'; divs[1].width = '70%'; divs[1].height = '70%';
                        }
                        divs.forEach(d => {
                            const div = document.createElement('div');
                            div.style.cssText = `position:absolute;top:${d.top};left:${d.left};width:${d.width};height:${d.height};border:${d.borderWidth} solid rgba(255,215,0,${d.opacity});border-radius:8px;pointer-events:none;`;
                            container.appendChild(div);
                        });
                        break;
                    }
                    case 'landscape-depth': {
                        const positions = position === 'superior' ? [70, 85] : [15, 30];
                        positions.forEach(p => {
                            const div = document.createElement('div');
                            div.style.cssText = `position:absolute;top:${p}%;left:0;width:100%;height:1px;border-top:1px solid rgba(255,215,0,${p===70||p===15?0.3:0.15});`;
                            container.appendChild(div);
                        });
                        // Adicionar indicadores de profundidade
                        for (let i = 0; i < 3; i++) {
                            const div = document.createElement('div');
                            const y = position === 'superior' ? 10 + i * 25 : 30 + i * 20;
                            const w = 60 - i * 15;
                            div.style.cssText = `position:absolute;top:${y}%;left:${(100-w)/2}%;width:${w}%;height:1px;border-top:1px solid rgba(255,215,0,${0.1 - i*0.02});`;
                            container.appendChild(div);
                        }
                        break;
                    }
                    case 'leading-lines': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        
                        let startX = 10, startY = 90, endX = 90, endY = 10;
                        if (position === 'esquerda') { startX = 10; startY = 50; endX = 90; endY = 50; }
                        else if (position === 'centro') { startX = 50; startY = 90; endX = 50; endY = 10; }
                        
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M${startX},${startY} Q${(startX+endX)/2},${(startY+endY)/2-20} ${endX},${endY}`);
                        path.setAttribute('fill', 'none');
                        path.setAttribute('stroke', 'rgba(255,215,0,0.5)');
                        path.setAttribute('stroke-width', '2');
                        path.setAttribute('stroke-dasharray', '8,4');
                        svg.appendChild(path);
                        
                        // Linhas auxiliares
                        for (let i = 1; i <= 3; i++) {
                            const pct = i * 25;
                            const path2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            path2.setAttribute('d', `M${startX + pct*0.3},${startY - pct*0.2} Q${(startX+endX)/2 + pct*0.1},${(startY+endY)/2-20} ${endX - pct*0.3},${endY + pct*0.2}`);
                            path2.setAttribute('fill', 'none');
                            path2.setAttribute('stroke', `rgba(255,215,0,${0.2 - i*0.04})`);
                            path2.setAttribute('stroke-width', '0.8');
                            path2.setAttribute('stroke-dasharray', '4,4');
                            svg.appendChild(path2);
                        }
                        
                        container.appendChild(svg);
                        break;
                    }
                    case 'lines-patterns': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        
                        let pattern = [];
                        if (position === 'horizontal') {
                            for (let i = 0; i < 10; i++) {
                                pattern.push({x1:0, y1:i*11, x2:100, y2:i*11});
                            }
                        } else if (position === 'vertical') {
                            for (let i = 0; i < 10; i++) {
                                pattern.push({x1:i*11, y1:0, x2:i*11, y2:100});
                            }
                        } else if (position === 'diagonal') {
                            for (let i = -5; i < 15; i++) {
                                pattern.push({x1:i*10, y1:0, x2:i*10+100, y2:100});
                            }
                        } else {
                            for (let i = 0; i < 8; i++) {
                                pattern.push({x1:0, y1:i*14, x2:100, y2:i*14});
                                pattern.push({x1:i*14, y1:0, x2:i*14, y2:100});
                            }
                        }
                        
                        pattern.forEach(p => {
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', p.x1 + '%');
                            line.setAttribute('y1', p.y1 + '%');
                            line.setAttribute('x2', p.x2 + '%');
                            line.setAttribute('y2', p.y2 + '%');
                            line.setAttribute('stroke', `rgba(255,215,0,${0.1 + Math.random()*0.15})`);
                            line.setAttribute('stroke-width', '0.5');
                            svg.appendChild(line);
                        });
                        
                        container.appendChild(svg);
                        break;
                    }
                    case 'fill-the-frame': {
                        let top = 20, left = 20, width = 60, height = 60;
                        if (position === 'superior') { top = 5; left = 20; width = 60; height = 45; }
                        else if (position === 'inferior') { top = 50; left = 20; width = 60; height = 45; }
                        
                        const div = document.createElement('div');
                        div.style.cssText = `position:absolute;top:${top}%;left:${left}%;width:${width}%;height:${height}%;border:2px solid rgba(255,215,0,0.3);border-radius:4px;`;
                        container.appendChild(div);
                        
                        // Indicadores de preenchimento
                        const indicators = [
                            {x: 30, y: 30}, {x: 50, y: 30}, {x: 70, y: 30},
                            {x: 30, y: 50}, {x: 50, y: 50}, {x: 70, y: 50},
                            {x: 30, y: 70}, {x: 50, y: 70}, {x: 70, y: 70}
                        ];
                        indicators.forEach(ind => {
                            const dot = document.createElement('div');
                            dot.style.cssText = `position:absolute;left:${ind.x}%;top:${ind.y}%;width:4px;height:4px;background:rgba(255,215,0,0.2);border-radius:50%;transform:translate(-50%,-50%);`;
                            container.appendChild(dot);
                        });
                        break;
                    }
                    case 'negative-space': {
                        const rect = document.createElement('div');
                        let top = 20, left = 20, width = 60, height = 60;
                        if (position === 'superior') { top = 5; left = 20; width = 60; height = 40; }
                        else if (position === 'inferior') { top = 55; left = 20; width = 60; height = 40; }
                        else if (position === 'esquerda') { top = 20; left = 5; width = 40; height = 60; }
                        else if (position === 'direita') { top = 20; left = 55; width = 40; height = 60; }
                        
                        rect.style.cssText = `position:absolute;top:${top}%;left:${left}%;width:${width}%;height:${height}%;border:2px solid rgba(255,215,0,0.2);border-radius:4px;`;
                        container.appendChild(rect);
                        
                        // Área de espaço negativo destacada
                        const neg = document.createElement('div');
                        const nTop = position === 'superior' ? 50 : position === 'inferior' ? 10 : 20;
                        const nLeft = position === 'esquerda' ? 50 : position === 'direita' ? 10 : 20;
                        neg.style.cssText = `position:absolute;top:${nTop}%;left:${nLeft}%;width:40%;height:40%;background:rgba(255,215,0,0.05);border:1px dashed rgba(255,215,0,0.15);border-radius:4px;`;
                        container.appendChild(neg);
                        break;
                    }
                    case 'left-to-right': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        
                        const dir = position === 'direita→esquerda' ? -1 : 1;
                        const startX = dir === 1 ? 10 : 90;
                        const endX = dir === 1 ? 90 : 10;
                        
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M${startX},50 Q${(startX+endX)/2},30 ${endX},50`);
                        path.setAttribute('fill', 'none');
                        path.setAttribute('stroke', 'rgba(255,215,0,0.5)');
                        path.setAttribute('stroke-width', '2');
                        path.setAttribute('stroke-dasharray', '6,3');
                        svg.appendChild(path);
                        
                        // Setas de direção
                        for (let i = 0; i < 3; i++) {
                            const x = startX + (endX - startX) * (0.2 + i * 0.3);
                            const tri = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                            const points = dir === 1 ? 
                                `${x+5},47 ${x+5},53 ${x+12},50` :
                                `${x-5},47 ${x-5},53 ${x-12},50`;
                            tri.setAttribute('points', points);
                            tri.setAttribute('fill', 'rgba(255,215,0,0.3)');
                            svg.appendChild(tri);
                        }
                        
                        container.appendChild(svg);
                        break;
                    }
                    case 'dynamic-symmetry': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        
                        const lines = [
                            ['0%','0%','100%','100%'],
                            ['100%','0%','0%','100%'],
                            ['0%','50%','100%','50%'],
                            ['50%','0%','50%','100%']
                        ];
                        if (isInverted) {
                            lines.push(['0%','25%','100%','75%']);
                            lines.push(['25%','0%','75%','100%']);
                        }
                        
                        lines.forEach(([x1,y1,x2,y2]) => {
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', x1);
                            line.setAttribute('y1', y1);
                            line.setAttribute('x2', x2);
                            line.setAttribute('y2', y2);
                            line.setAttribute('stroke', `rgba(255,215,0,${isInverted ? 0.15 : 0.25})`);
                            line.setAttribute('stroke-width', '0.8');
                            svg.appendChild(line);
                        });
                        
                        container.appendChild(svg);
                        break;
                    }
                    case 'harmonic-armature': {
                        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                        svg.setAttribute('width', '100%');
                        svg.setAttribute('height', '100%');
                        svg.style.cssText = 'position:absolute;top:0;left:0;';
                        
                        const points = [
                            [20,20], [50,20], [80,20],
                            [20,50], [50,50], [80,50],
                            [20,80], [50,80], [80,80]
                        ];
                        const ref = isInverted ? 
                            [[0,0], [100,100], [0,100], [100,0]] :
                            [[20,20], [80,20], [80,80], [20,80]];
                        
                        // Linhas da armadura
                        for (let i = 0; i < ref.length; i++) {
                            for (let j = i+1; j < ref.length; j++) {
                                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                                line.setAttribute('x1', ref[i][0] + '%');
                                line.setAttribute('y1', ref[i][1] + '%');
                                line.setAttribute('x2', ref[j][0] + '%');
                                line.setAttribute('y2', ref[j][1] + '%');
                                line.setAttribute('stroke', 'rgba(255,215,0,0.12)');
                                line.setAttribute('stroke-width', '0.6');
                                svg.appendChild(line);
                            }
                        }
                        
                        // Pontos da armadura
                        points.forEach(([x,y]) => {
                            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                            dot.setAttribute('cx', x + '%');
                            dot.setAttribute('cy', y + '%');
                            dot.setAttribute('r', '2');
                            dot.setAttribute('fill', 'rgba(255,215,0,0.2)');
                            svg.appendChild(dot);
                        });
                        
                        container.appendChild(svg);
                        break;
                    }
                    default: {
                        // Fallback
                        const div = document.createElement('div');
                        div.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:1px dashed rgba(255,215,0,0.1);';
                        container.appendChild(div);
                        break;
                    }
                }
                grid.appendChild(container);
            };

            // Criar app
            const createApp = () => {
                root.innerHTML = `
                    <div class="camera-container" id="app">
                        <div class="video-wrapper">
                            <video id="video" autoplay playsinline muted></video>
                            <div class="overlay-grid" id="overlayGrid"></div>
                            <div class="guide-label" id="guideLabel">${currentComposition.label}</div>
                            
                            <div class="camera-selector" id="cameraSelector"></div>
                            
                            <div class="score-panel">
                                <div class="score-item"><span>Composição</span><span class="score-value" id="compScore">78%</span></div>
                                <div class="score-item"><span>Iluminação</span><span class="score-value" id="lightScore">65%</span></div>
                                <div class="score-item"><span>Enquadramento</span><span class="score-value" id="frameScore">72%</span></div>
                                <div class="score-item" style="border-top:1px solid rgba(255,255,255,0.08);padding-top:3px;margin-top:1px">
                                    <span>Geral</span>
                                    <span class="score-value" style="color:#fbbf24" id="overallScore">72</span>
                                </div>
                            </div>

                            <div class="ai-suggestion" id="suggestion">📸 Toque na composição para alternar posição</div>

                            <div class="bottom-controls">
                                <div class="mode-filters">
                                    <button class="mode-filter-btn active" data-mode="camera">📷 Foto</button>
                                    <button class="mode-filter-btn" data-mode="video">🎥 Vídeo</button>
                                    <button class="mode-filter-btn" data-mode="learn">📚 Aprender</button>
                                </div>
                                
                                <div class="composition-scroll" id="compositionScroll">
                                    ${COMPOSITIONS.map(comp => `
                                        <div class="comp-chip ${comp.id === currentComposition.id ? 'active' : ''}" data-id="${comp.id}">
                                            ${comp.label}
                                            <span class="pos-indicator">${comp.id === currentComposition.id ? `📍 ${getCurrentPosition()}` : ''}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                
                                <div class="action-buttons">
                                    <button class="action-btn" id="flipBtn">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M4 8v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/>
                                            <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
                                            <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0"/>
                                        </svg>
                                    </button>
                                    <button class="shutter-btn" id="shutterBtn">
                                        <div class="record-dot"></div>
                                    </button>
                                    <button class="action-btn" id="zoomBtn">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="11" cy="11" r="8"/>
                                            <path d="m21 21-4.35-4.35"/>
                                            <path d="M11 8v6"/>
                                            <path d="M8 11h6"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                videoElement = document.getElementById('video');
                
                // Eventos
                document.getElementById('flipBtn').addEventListener('click', () => {
                    if (availableCameras.length > 1) {
                        const next = (currentCameraIndex + 1) % availableCameras.length;
                        switchCamera(next);
                    } else {
                        facingMode = facingMode === 'environment' ? 'user' : 'environment';
                        if (stream) stream.getTracks().forEach(t => t.stop());
                        startCamera();
                    }
                });

                document.getElementById('shutterBtn').addEventListener('click', handleShutter);
                document.getElementById('zoomBtn').addEventListener('click', () => {
                    zoomLevel = Math.min(zoomLevel + 0.1, 3);
                    if (videoElement) {
                        videoElement.style.transform = `scale(${zoomLevel})`;
                    }
                });

                // Eventos para as guias
                document.querySelectorAll('.comp-chip').forEach(chip => {
                    chip.addEventListener('click', function() {
                        const id = this.dataset.id;
                        const comp = COMPOSITIONS.find(c => c.id === id);
                        if (comp) {
                            currentComposition = comp;
                            currentPositionIndex = 0;
                            renderGuideOverlay(comp, getCurrentPosition());
                            updateChips();
                            updateLabel();
                            this.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                            document.getElementById('suggestion').textContent = `📍 ${comp.label} - Toque novamente para mudar posição`;
                        }
                    });
                    
                    // Duplo clique/tap para mudar posição
                    chip.addEventListener('dblclick', function(e) {
                        e.stopPropagation();
                        nextPosition();
                        document.getElementById('suggestion').textContent = `📍 Posição: ${getCurrentPosition()}`;
                    });
                });

                // Eventos para os modos
                document.querySelectorAll('.mode-filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.mode-filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        const mode = this.dataset.mode;
                        const shutter = document.getElementById('shutterBtn');
                        if (mode === 'video') {
                            shutter.classList.add('recording');
                            document.getElementById('suggestion').textContent = '🎥 Toque no botão vermelho para gravar';
                        } else if (mode === 'learn') {
                            shutter.classList.remove('recording');
                            document.getElementById('suggestion').textContent = `📚 ${currentComposition.label} - Toque na composição para alternar posição`;
                        } else {
                            shutter.classList.remove('recording');
                            document.getElementById('suggestion').textContent = '📸 Toque no botão para capturar';
                        }
                    });
                });

                detectCameras().then(() => {
                    startCamera();
                });
                renderGuideOverlay(currentComposition, getCurrentPosition());
                updateLabel();
            };

            // Detectar câmeras
            const detectCameras = async () => {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const videoDevices = devices.filter(d => d.kind === 'videoinput');
                    availableCameras = videoDevices;
                    if (availableCameras.length > 0) {
                        renderCameraButtons();
                    }
                    return videoDevices;
                } catch (e) {
                    console.log('Erro ao detectar câmeras:', e);
                    return [];
                }
            };

            const renderCameraButtons = () => {
                const container = document.getElementById('cameraSelector');
                if (!container) return;
                container.innerHTML = '';
                availableCameras.forEach((cam, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `cam-btn ${idx === currentCameraIndex ? 'active' : ''}`;
                    btn.textContent = cam.label ? cam.label.replace(/[^a-zA-Z0-9]/g,'').slice(0,8) : `Cam ${idx+1}`;
                    btn.dataset.index = idx;
                    btn.addEventListener('click', () => switchCamera(idx));
                    container.appendChild(btn);
                });
            };

            const switchCamera = async (index) => {
                if (index === currentCameraIndex) return;
                if (!availableCameras[index]) return;
                currentCameraIndex = index;
                const deviceId = availableCameras[index].deviceId;
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                await startCamera(deviceId);
                document.querySelectorAll('.cam-btn').forEach((btn, i) => {
                    btn.classList.toggle('active', i === index);
                });
            };

            // Iniciar câmera
            const startCamera = async (deviceId = null) => {
                try {
                    const constraints = {
                        video: {
                            facingMode: deviceId ? undefined : facingMode,
                            deviceId: deviceId ? { exact: deviceId } : undefined,
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: true
                    };

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    if (videoElement) {
                        videoElement.srcObject = stream;
                        await videoElement.play();
                        isCameraReady = true;
                        console.log('✅ Câmera iniciada!');
                    }
                } catch (error) {
                    console.error('❌ Erro:', error);
                    showPermissionError(error.message);
                }
            };

            const showPermissionError = (msg) => {
                const overlay = document.createElement('div');
                overlay.className = 'permission-overlay';
                overlay.innerHTML = `
                    <h2>📷 Acesso à Câmera</h2>
                    <p>O Photo Composition AI precisa acessar sua câmera para funcionar.</p>
                    <button class="permission-btn" id="retryBtn">Permitir Acesso</button>
                    <div class="error-msg">${msg || 'Toque no botão acima e permita o acesso no Safari'}</div>
                `;
                document.querySelector('.video-wrapper').appendChild(overlay);
                document.getElementById('retryBtn').addEventListener('click', () => {
                    overlay.remove();
                    startCamera();
                });
            };

            // Manipular shutter
            const handleShutter = () => {
                const activeMode = document.querySelector('.mode-filter-btn.active');
                if (!activeMode) return;
                const mode = activeMode.dataset.mode;
                
                if (mode === 'video') {
                    toggleRecording();
                } else if (mode === 'camera') {
                    capturePhoto();
                } else {
                    document.getElementById('suggestion').textContent = `📚 "${currentComposition.label}" - Posição: ${getCurrentPosition()}`;
                }
            };

            // Capturar foto
            const capturePhoto = () => {
                if (!videoElement || !isCameraReady) {
                    alert('Aguarde a câmera iniciar');
                    return;
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = videoElement.videoWidth || 1280;
                canvas.height = videoElement.videoHeight || 720;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg');
                
                const preview = document.createElement('div');
                preview.className = 'photo-preview';
                preview.innerHTML = `
                    <img src="${dataUrl}" alt="Foto" />
                    <div class="photo-actions">
                        <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                        <button class="btn-save" onclick="downloadMedia('${dataUrl}','jpg')">💾 Salvar</button>
                    </div>
                `;
                document.body.appendChild(preview);
                
                const compScore = Math.floor(60 + Math.random() * 35);
                const lightScore = Math.floor(50 + Math.random() * 40);
                const frameScore = Math.floor(55 + Math.random() * 40);
                document.getElementById('compScore').textContent = compScore + '%';
                document.getElementById('lightScore').textContent = lightScore + '%';
                document.getElementById('frameScore').textContent = frameScore + '%';
                document.getElementById('overallScore').textContent = Math.floor((compScore + lightScore + frameScore) / 3);
                document.getElementById('suggestion').textContent = `📸 ${currentComposition.label} - Posição: ${getCurrentPosition()}`;
            };

            // Gravação
            const toggleRecording = async () => {
                if (isRecording) {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                    isRecording = false;
                    document.getElementById('shutterBtn').classList.remove('recording');
                    document.getElementById('timerBadge').classList.remove('active');
                    document.getElementById('timerBadge').textContent = '00:00';
                    if (recordingTimer) {
                        clearInterval(recordingTimer);
                        recordingTimer = null;
                    }
                    seconds = 0;
                    document.getElementById('suggestion').textContent = '✅ Vídeo salvo!';
                    return;
                }

                if (!stream) return;
                try {
                    const options = { mimeType: 'video/mp4' };
                    mediaRecorder = new MediaRecorder(stream, options);
                    recordedChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            recordedChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                        const url = URL.createObjectURL(blob);
                        const preview = document.createElement('div');
                        preview.className = 'photo-preview';
                        preview.innerHTML = `
                            <video src="${url}" controls autoplay></video>
                            <div class="photo-actions">
                                <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                                <button class="btn-save" onclick="downloadMedia('${url}','mp4')">💾 Salvar</button>
                            </div>
                        `;
                        document.body.appendChild(preview);
                        recordedChunks = [];
                    };

                    mediaRecorder.start(100);
                    isRecording = true;
                    document.getElementById('shutterBtn').classList.add('recording');
                    document.getElementById('timerBadge').classList.add('active');
                    seconds = 0;
                    recordingTimer = setInterval(() => {
                        seconds++;
                        const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
                        const secs = String(seconds % 60).padStart(2, '0');
                        document.getElementById('timerBadge').textContent = `${mins}:${secs}`;
                    }, 1000);
                    document.getElementById('suggestion').textContent = '🔴 Gravando... Toque no botão vermelho para parar';
                } catch (err) {
                    console.error('Erro ao gravar:', err);
                    alert('Erro ao gravar vídeo.');
                }
            };

            window.downloadMedia = (url, ext) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = `photo-${Date.now()}.${ext}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const checkCameraSupport = () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    root.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;padding:30px;text-align:center;background:#000;color:#fff;">
                            <h2 style="font-size:24px;margin-bottom:10px;">📱 Dispositivo não compatível</h2>
                            <p style="color:#aaa;max-width:300px;">Seu navegador não suporta acesso à câmera.</p>
                        </div>
                    `;
                    return false;
                }
                return true;
            };

            if (checkCameraSupport()) {
                createApp();
            }

            // Sugestões IA
            setInterval(() => {
                const el = document.getElementById('suggestion');
                if (el && !el.textContent.includes('📚') && !el.textContent.includes('✅') && !el.textContent.includes('🔴') && !el.textContent.includes('🎥') && !el.textContent.includes('📍')) {
                    const actions = [
                        'Mova para esquerda', 'Mova para direita', 'Aproxime', 'Afaste',
                        'Suba a câmera', 'Abaixe a câmera', 'Gire levemente',
                        'Alinhe ao horizonte', 'Posicione no ponto ideal',
                        `Aplique ${currentComposition.label}`
                    ];
                    el.textContent = actions[Math.floor(Math.random() * actions.length)];
                }
            }, 5000);

            // Adicionar evento de clique na tela para mudar posição (exceto em botões)
            document.addEventListener('click', function(e) {
                const target = e.target;
                if (target.closest('.comp-chip') || target.closest('.action-btn') || 
                    target.closest('.mode-filter-btn') || target.closest('.cam-btn') ||
                    target.closest('.shutter-btn')) {
                    return;
                }
                // Clique na tela muda a posição da composição atual
                nextPosition();
                document.getElementById('suggestion').textContent = `📍 ${currentComposition.label} - Posição: ${getCurrentPosition()}`;
            });

        })();
    </script>
</body>
</html>
