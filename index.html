<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Photo AI" />
    <link rel="manifest" href="/manifest.json" />
    <title>Photo Composition AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none;
        }
        #root {
            height: 100%;
            width: 100%;
            background: #000;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .overlay-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .grid-line {
            position: absolute;
            background: rgba(255, 215, 0, 0.5);
        }
        .guide-label {
            position: absolute;
            color: rgba(255, 215, 0, 0.9);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 12px;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            z-index: 6;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        
        /* Novos controles inferiores estilo filtros */
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.8) 30%);
            padding: 20px 0 30px 0;
            z-index: 20;
            pointer-events: none;
        }
        .bottom-controls > * {
            pointer-events: auto;
        }
        
        .mode-filters {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            padding: 0 20px;
        }
        .mode-filter-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(4px);
        }
        .mode-filter-btn.active {
            background: #fbbf24;
            border-color: #fbbf24;
            color: #000;
        }
        .mode-filter-btn:active {
            transform: scale(0.92);
        }
        
        .composition-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 0 16px 10px 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .composition-scroll::-webkit-scrollbar {
            display: none;
        }
        .comp-chip {
            flex: 0 0 auto;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(6px);
            padding: 5px 14px;
            border-radius: 16px;
            font-size: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .comp-chip.active {
            background: rgba(255, 215, 0, 0.25);
            border-color: #fbbf24;
            color: #fbbf24;
        }
        .comp-chip:active {
            transform: scale(0.92);
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 0 20px;
            margin-top: 5px;
        }
        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active {
            transform: scale(0.88);
            background: rgba(255,255,255,0.25);
        }
        .shutter-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255,255,255,0.5);
            box-shadow: 0 0 40px rgba(255,255,255,0.15);
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: 0.15s;
        }
        .shutter-btn:active {
            transform: scale(0.88);
        }
        .shutter-btn.recording {
            background: #ff3b30;
            border-color: #ff3b30;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .record-dot {
            width: 20px;
            height: 20px;
            background: #ff3b30;
            border-radius: 4px;
            margin: 0 auto;
        }
        .shutter-btn.recording .record-dot {
            border-radius: 50%;
            width: 24px;
            height: 24px;
        }
        
        .score-panel {
            position: absolute;
            top: 20px;
            right: 16px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 10px 14px;
            min-width: 90px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            pointer-events: none;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 2px 0;
            color: #eee;
        }
        .score-value {
            font-weight: 700;
            color: #fbbf24;
        }
        .ai-suggestion {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #fbbf24;
            white-space: nowrap;
            z-index: 15;
            max-width: 85%;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 30px;
            text-align: center;
        }
        .permission-overlay h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        .permission-overlay p {
            color: #aaa;
            font-size: 16px;
            max-width: 300px;
            margin-bottom: 20px;
        }
        .permission-btn {
            background: #fbbf24;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            color: #000;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .permission-btn:active {
            transform: scale(0.95);
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
        }
        .photo-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .photo-preview img, .photo-preview video {
            max-width: 100%;
            max-height: 65%;
            border-radius: 12px;
            object-fit: contain;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .photo-actions {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        .photo-actions button {
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .photo-actions button:active {
            transform: scale(0.95);
        }
        .btn-close {
            background: #fbbf24;
            color: #000;
        }
        .btn-save {
            background: #333;
            color: #fff;
        }
        .timer-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.8);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            z-index: 30;
            display: none;
        }
        .timer-badge.active {
            display: block;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        @media (max-width: 430px) {
            .score-panel {
                padding: 6px 10px;
                min-width: 65px;
                top: 14px;
                right: 10px;
            }
            .score-item {
                font-size: 9px;
                padding: 1px 0;
            }
            .mode-filter-btn {
                font-size: 11px;
                padding: 4px 14px;
            }
            .mode-filters {
                gap: 15px;
            }
            .comp-chip {
                font-size: 9px;
                padding: 4px 10px;
            }
            .action-btn {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }
            .shutter-btn {
                width: 62px;
                height: 62px;
            }
            .ai-suggestion {
                font-size: 11px;
                padding: 6px 14px;
                bottom: 165px;
                max-width: 92%;
            }
            .guide-label {
                font-size: 10px;
                padding: 3px 10px;
                bottom: 8px;
            }
            .bottom-controls {
                padding: 12px 0 20px 0;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // TODAS AS 57 REGRAS DE COMPOSIÇÃO
        const COMPOSITION_RULES = [
            'Regra dos Terços', 'Proporção Áurea', 'Espiral Áurea', 'Regra do Centro',
            'Regra dos Quartos', 'Regra dos Nove Quadrantes', 'Simetria',
            'Assimetria Balanceada', 'Equilíbrio de Peso Visual', 'Regra dos Ímpares',
            'Linhas Guia', 'Linhas Diagonais', 'Linhas Horizontais', 'Linhas Verticais',
            'Pontos de Fuga', 'Enquadramento Natural', 'Moldura Dentro da Moldura',
            'Camadas', 'Profundidade de Campo', 'Sobreposição de Elementos',
            'Espaço Negativo', 'Espaço Positivo', 'Espaço Respirável',
            'Minimalismo na Composição', 'Ritmo Visual', 'Repetição de Formas',
            'Textura', 'Padrões Geométricos', 'Ponto Focal Único',
            'Múltiplos Pontos Focais', 'Contraste de Foco', 'Isolamento do Sujeito',
            'Bokeh', 'Luz Dura vs Luz Suave', 'Contraste Tonal', 'High Key',
            'Low Key', 'Silhueta', 'Contraluz', 'Triângulos Composicionais',
            'Círculos e Curvas', 'Formas Geométricas Implícitas', 'Composição Triangular',
            'Hierarquia Visual', 'Fluxo de Leitura da Imagem', 'Direção Natural do Olhar',
            'Peso Visual', 'Regra do Olhar', 'Regra da Cabeça', 'Plano de Fundo Limpo',
            'Separação de Planos', 'Enquadramento Narrativo', 'Quebra Intencional de Regras',
            'Caos Controlado', 'Composição Abstrata', 'Minimalismo Extremo', 'Assimetria Radical'
        ];

        (function() {
            const root = document.getElementById('root');
            let facingMode = 'environment';
            let currentGuide = 'Regra dos Terços';
            let stream = null;
            let isCameraReady = false;
            let videoElement = null;
            let zoomLevel = 1;
            let isRecording = false;
            let mediaRecorder = null;
            let recordedChunks = [];
            let recordingTimer = null;
            let seconds = 0;

            // Renderizar guia
            const renderGuideOverlay = (guide) => {
                const grid = document.getElementById('overlayGrid');
                const label = document.getElementById('guideLabel');
                label.textContent = guide;

                let html = '';
                switch(guide) {
                    case 'Regra dos Terços':
                        html = `
                            <div class="grid-line" style="left:33.33%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:66.66%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="top:33.33%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:66.66%;left:0;width:100%;height:1px;"></div>
                        `;
                        break;
                    case 'Regra dos Quartos':
                        html = `
                            <div class="grid-line" style="left:25%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:50%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:75%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="top:25%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:50%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:75%;left:0;width:100%;height:1px;"></div>
                        `;
                        break;
                    case 'Regra dos Nove Quadrantes':
                        html = `
                            <div class="grid-line" style="left:33.33%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:66.66%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="top:33.33%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:66.66%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="left:11.11%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="left:22.22%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="left:44.44%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="left:55.55%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="left:77.77%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="left:88.88%;top:0;width:1px;height:100%;opacity:0.3;"></div>
                            <div class="grid-line" style="top:11.11%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                            <div class="grid-line" style="top:22.22%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                            <div class="grid-line" style="top:44.44%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                            <div class="grid-line" style="top:55.55%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                            <div class="grid-line" style="top:77.77%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                            <div class="grid-line" style="top:88.88%;left:0;width:100%;height:1px;opacity:0.3;"></div>
                        `;
                        break;
                    case 'Simetria':
                        html = `<div class="grid-line" style="left:50%;top:0;width:1px;height:100%;"></div>`;
                        break;
                    case 'Linhas Diagonais':
                        html = `
                            <div class="grid-line" style="top:0;left:0;width:100%;height:1px;transform:rotate(45deg);transform-origin:0 0;"></div>
                            <div class="grid-line" style="bottom:0;right:0;width:100%;height:1px;transform:rotate(-45deg);transform-origin:100% 100%;"></div>
                        `;
                        break;
                    case 'Linhas Horizontais':
                        html = `
                            <div class="grid-line" style="top:33.33%;left:0;width:100%;height:1px;"></div>
                            <div class="grid-line" style="top:66.66%;left:0;width:100%;height:1px;"></div>
                        `;
                        break;
                    case 'Linhas Verticais':
                        html = `
                            <div class="grid-line" style="left:33.33%;top:0;width:1px;height:100%;"></div>
                            <div class="grid-line" style="left:66.66%;top:0;width:1px;height:100%;"></div>
                        `;
                        break;
                    case 'Pontos de Fuga':
                        html = `
                            <svg width="100%" height="100%" style="position:absolute;top:0;left:0;">

                                <line x1="50%" y1="50%" x2="10%" y2="90%" stroke="rgba(255,215,0,0.4)" stroke-width="1" />

                                <circle cx="50%" cy="50%" r="4" fill="rgba(255,215,0,0.8)" />
                            </svg>
                        `;
                        break;
                    case 'Proporção Áurea':
                    case 'Espiral Áurea':
                        html = `
                            <svg width="100%" height="100%" viewBox="0 0 100 100" style="position:absolute;top:0;left:0;">
                                <rect x="38.2" y="38.2" width="23.6" height="23.6" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="1" />
                                <rect x="38.2" y="61.8" width="23.6" height="23.6" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="1" />
                                <rect x="61.8" y="38.2" width="23.6" height="23.6" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="1" />
                                <path d="M50,50 Q60,40 70,50 Q80,60 70,70 Q60,80 50,70 Q40,60 50,50" fill="none" stroke="rgba(255,215,0,0.6)" stroke-width="1.5" />
                                <circle cx="50" cy="50" r="2" fill="rgba(255,215,0,0.8)" />
                            </svg>
                        `;
                        break;
                    case 'Triângulos Composicionais':
                    case 'Composição Triangular':
                        html = `
                            <svg width="100%" height="100%" viewBox="0 0 100 100" style="position:absolute;top:0;left:0;">
                                <polygon points="50,5 5,95 95,95" fill="none" stroke="rgba(255,215,0,0.6)" stroke-width="1.5" />

                    case 'Círculos e Curvas':
                        html = `

                            </svg>
                        `;
                        break;
                    case 'Linhas Guia':
                        html = `
                            <svg width="100%" height="100%" style="position:absolute;top:0;left:0;">
                                <path d="M10,90 Q30,70 50,50 Q70,30 90,10" fill="none" stroke="rgba(255,215,0,0.5)" stroke-width="1.5" stroke-dasharray="5,5" />

                            </svg>
                        `;
                        break;
                    case 'Enquadramento Natural':
                    case 'Moldura Dentro da Moldura':
                        html = `
                            <div style="position:absolute;top:10%;left:10%;width:80%;height:80%;border:2px solid rgba(255,215,0,0.4);border-radius:8px;"></div>
                            <div style="position:absolute;top:20%;left:20%;width:60%;height:60%;border:1px solid rgba(255,215,0,0.2);border-radius:4px;"></div>
                        `;
                        break;
                    case 'Camadas':
                        html = `
                            <div style="position:absolute;bottom:0;left:0;width:100%;height:33%;border-top:1px solid rgba(255,215,0,0.3);"></div>
                            <div style="position:absolute;bottom:33%;left:0;width:100%;height:33%;border-top:1px solid rgba(255,215,0,0.2);"></div>
                        `;
                        break;
                    case 'Regra do Centro':
                        html = `
                            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30%;height:30%;border:2px solid rgba(255,215,0,0.4);border-radius:50%;"></div>
                            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10%;height:10%;border:1px solid rgba(255,215,0,0.6);border-radius:50%;"></div>
                        `;
                        break;
                    case 'Regra dos Ímpares':
                        html = `
                            <div style="position:absolute;top:30%;left:30%;width:8px;height:8px;background:rgba(255,215,0,0.4);border-radius:50%;"></div>
                            <div style="position:absolute;top:30%;left:50%;width:8px;height:8px;background:rgba(255,215,0,0.4);border-radius:50%;"></div>
                            <div style="position:absolute;top:30%;left:70%;width:8px;height:8px;background:rgba(255,215,0,0.4);border-radius:50%;"></div>
                        `;
                        break;
                    case 'Espaço Negativo':
                        html = `
                            <div style="position:absolute;top:0;left:0;width:100%;height:100%;border:2px solid rgba(255,215,0,0.2);"></div>
                            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40%;height:40%;border:1px solid rgba(255,215,0,0.4);"></div>
                            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20%;height:20%;background:rgba(255,215,0,0.1);border-radius:50%;"></div>
                        `;
                        break;
                    case 'Silhueta':
                        html = `
                            <div style="position:absolute;bottom:0;left:0;width:100%;height:40%;background:rgba(0,0,0,0.5);"></div>
                            <div style="position:absolute;bottom:40%;left:30%;width:40%;height:30%;background:rgba(0,0,0,0.3);clip-path:polygon(0% 100%,50% 0%,100% 100%);"></div>
                        `;
                        break;
                    case 'Contraluz':
                        html = `
                            <svg width="100%" height="100%" style="position:absolute;top:0;left:0;">
                                <circle cx="50%" cy="30%" r="20%" fill="rgba(255,200,50,0.15)" />
                                <circle cx="50%" cy="30%" r="10%" fill="rgba(255,200,50,0.25)" />
                                <circle cx="50%" cy="30%" r="5%" fill="rgba(255,200,50,0.4)" />
                            </svg>
                        `;
                        break;
                    case 'Bokeh':
                        html = `
                            <div style="position:absolute;top:20%;left:15%;width:8px;height:8px;background:rgba(255,215,0,0.3);border-radius:50%;filter:blur(2px);"></div>
                            <div style="position:absolute;top:25%;left:75%;width:12px;height:12px;background:rgba(255,215,0,0.2);border-radius:50%;filter:blur(3px);"></div>
                            <div style="position:absolute;top:60%;left:20%;width:6px;height:6px;background:rgba(255,215,0,0.3);border-radius:50%;filter:blur(1px);"></div>
                            <div style="position:absolute;top:70%;left:80%;width:10px;height:10px;background:rgba(255,215,0,0.2);border-radius:50%;filter:blur(4px);"></div>
                            <div style="position:absolute;top:40%;left:50%;width:4px;height:4px;background:rgba(255,215,0,0.4);border-radius:50%;filter:blur(1px);"></div>
                        `;
                        break;
                    case 'High Key':
                        html = `
                            <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center, rgba(255,255,255,0.15), transparent 70%);"></div>
                        `;
                        break;
                    case 'Low Key':
                        html = `
                            <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.5));"></div>
                            <div style="position:absolute;bottom:20%;left:50%;transform:translateX(-50%);width:60%;height:1px;background:rgba(255,215,0,0.2);"></div>
                        `;
                        break;
                    default:
                        html = '';
                }
                grid.innerHTML = html;
            };

            // Criar app
            const createApp = () => {
                root.innerHTML = `
                    <div class="camera-container" id="app">
                        <div class="video-wrapper">
                            <video id="video" autoplay playsinline muted></video>
                            <div class="overlay-grid" id="overlayGrid"></div>
                            <div class="guide-label" id="guideLabel">${currentGuide}</div>
                            <div class="timer-badge" id="timerBadge">00:00</div>
                            
                            <div class="score-panel">
                                <div class="score-item"><span>Composição</span><span class="score-value" id="compScore">78%</span></div>
                                <div class="score-item"><span>Iluminação</span><span class="score-value" id="lightScore">65%</span></div>
                                <div class="score-item"><span>Enquadramento</span><span class="score-value" id="frameScore">72%</span></div>
                                <div class="score-item" style="border-top:1px solid rgba(255,255,255,0.1);padding-top:4px;margin-top:2px">
                                    <span>Geral</span>
                                    <span class="score-value" style="color:#fbbf24" id="overallScore">72</span>
                                </div>
                            </div>

                            <div class="ai-suggestion" id="suggestion">📸 Aponte para um objeto principal</div>

                            <div class="bottom-controls">
                                <div class="mode-filters">
                                    <button class="mode-filter-btn active" data-mode="camera">📷 Foto</button>
                                    <button class="mode-filter-btn" data-mode="video">🎥 Vídeo</button>
                                    <button class="mode-filter-btn" data-mode="learn">📚 Aprender</button>
                                </div>
                                
                                <div class="composition-scroll" id="compositionScroll">
                                    ${COMPOSITION_RULES.map(rule => `
                                        <div class="comp-chip ${rule === currentGuide ? 'active' : ''}" data-guide="${rule}">
                                            ${rule}
                                        </div>
                                    `).join('')}
                                </div>
                                
                                <div class="action-buttons">
                                    <button class="action-btn" id="flipBtn">
                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M4 8v-2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/>
                                            <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
                                            <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0"/>
                                        </svg>
                                    </button>
                                    <button class="shutter-btn" id="shutterBtn">
                                        <div class="record-dot"></div>
                                    </button>
                                    <button class="action-btn" id="zoomBtn">
                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="11" cy="11" r="8"/>
                                            <path d="m21 21-4.35-4.35"/>
                                            <path d="M11 8v6"/>
                                            <path d="M8 11h6"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                videoElement = document.getElementById('video');
                
                // Eventos
                document.getElementById('flipBtn').addEventListener('click', toggleCamera);
                document.getElementById('shutterBtn').addEventListener('click', handleShutter);
                document.getElementById('zoomBtn').addEventListener('click', () => {
                    zoomLevel = Math.min(zoomLevel + 0.1, 3);
                    if (videoElement) {
                        videoElement.style.transform = `scale(${zoomLevel})`;
                    }
                });

                // Eventos para as guias (scroll horizontal)
                document.querySelectorAll('.comp-chip').forEach(chip => {
                    chip.addEventListener('click', function() {
                        document.querySelectorAll('.comp-chip').forEach(c => c.classList.remove('active'));
                        this.classList.add('active');
                        currentGuide = this.dataset.guide;
                        renderGuideOverlay(currentGuide);
                        // Scroll para o chip centralizar
                        this.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    });
                });

                // Eventos para os modos (filtros)
                document.querySelectorAll('.mode-filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.mode-filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        const mode = this.dataset.mode;
                        const shutter = document.getElementById('shutterBtn');
                        if (mode === 'video') {
                            shutter.classList.add('recording');
                            document.getElementById('suggestion').textContent = '🎥 Toque no botão vermelho para gravar';
                        } else if (mode === 'learn') {
                            shutter.classList.remove('recording');
                            document.getElementById('suggestion').textContent = '📚 Toque em uma regra para aprender mais';
                        } else {
                            shutter.classList.remove('recording');
                            document.getElementById('suggestion').textContent = '📸 Toque no botão para capturar';
                        }
                    });
                });

                startCamera();
                renderGuideOverlay(currentGuide);
            };

            // Iniciar câmera
            const startCamera = async () => {
                try {
                    const constraints = {
                        video: {
                            facingMode: facingMode,
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: true
                    };

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    if (videoElement) {
                        videoElement.srcObject = stream;
                        await videoElement.play();
                        isCameraReady = true;
                        console.log('✅ Câmera iniciada!');
                    }
                } catch (error) {
                    console.error('❌ Erro:', error);
                    showPermissionError(error.message);
                }
            };

            const showPermissionError = (msg) => {
                const overlay = document.createElement('div');
                overlay.className = 'permission-overlay';
                overlay.innerHTML = `
                    <h2>📷 Acesso à Câmera</h2>
                    <p>O Photo Composition AI precisa acessar sua câmera para funcionar.</p>
                    <button class="permission-btn" id="retryBtn">Permitir Acesso</button>
                    <div class="error-msg">${msg || 'Toque no botão acima e permita o acesso no Safari'}</div>
                `;
                document.querySelector('.video-wrapper').appendChild(overlay);
                document.getElementById('retryBtn').addEventListener('click', () => {
                    overlay.remove();
                    startCamera();
                });
            };

            const toggleCamera = () => {
                facingMode = facingMode === 'environment' ? 'user' : 'environment';
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                startCamera();
            };

            // Manipular shutter (foto ou vídeo)
            const handleShutter = () => {
                const activeMode = document.querySelector('.mode-filter-btn.active');
                if (!activeMode) return;
                const mode = activeMode.dataset.mode;
                
                if (mode === 'video') {
                    toggleRecording();
                } else if (mode === 'camera') {
                    capturePhoto();
                } else {
                    // Modo learn - mostrar explicação da regra atual
                    document.getElementById('suggestion').textContent = `📚 A regra "${currentGuide}" ajuda a criar composições equilibradas e harmoniosas.`;
                }
            };

            // Capturar foto
            const capturePhoto = () => {
                if (!videoElement || !isCameraReady) {
                    alert('Aguarde a câmera iniciar');
                    return;
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = videoElement.videoWidth || 1280;
                canvas.height = videoElement.videoHeight || 720;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg');
                
                const preview = document.createElement('div');
                preview.className = 'photo-preview';
                preview.innerHTML = `
                    <img src="${dataUrl}" alt="Foto" />
                    <div class="photo-actions">
                        <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                        <button class="btn-save" onclick="downloadMedia('${dataUrl}','jpg')">💾 Salvar</button>
                    </div>
                `;
                document.body.appendChild(preview);
                
                // Atualizar scores
                const compScore = Math.floor(60 + Math.random() * 35);
                const lightScore = Math.floor(50 + Math.random() * 40);
                const frameScore = Math.floor(55 + Math.random() * 40);
                document.getElementById('compScore').textContent = compScore + '%';
                document.getElementById('lightScore').textContent = lightScore + '%';
                document.getElementById('frameScore').textContent = frameScore + '%';
                document.getElementById('overallScore').textContent = Math.floor((compScore + lightScore + frameScore) / 3);
                
                document.getElementById('suggestion').textContent = `📸 ${currentGuide} aplicada com sucesso!`;
            };

            // Gravação de vídeo
            const toggleRecording = async () => {
                if (isRecording) {
                    // Parar gravação
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                    isRecording = false;
                    document.getElementById('shutterBtn').classList.remove('recording');
                    document.getElementById('timerBadge').classList.remove('active');
                    document.getElementById('timerBadge').textContent = '00:00';
                    if (recordingTimer) {
                        clearInterval(recordingTimer);
                        recordingTimer = null;
                    }
                    seconds = 0;
                    document.getElementById('suggestion').textContent = '✅ Vídeo salvo com sucesso!';
                    return;
                }

                // Iniciar gravação
                if (!stream) return;
                try {
                    const options = { mimeType: 'video/mp4' };
                    mediaRecorder = new MediaRecorder(stream, options);
                    recordedChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            recordedChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                        const url = URL.createObjectURL(blob);
                        const preview = document.createElement('div');
                        preview.className = 'photo-preview';
                        preview.innerHTML = `
                            <video src="${url}" controls autoplay></video>
                            <div class="photo-actions">
                                <button class="btn-close" onclick="this.closest('.photo-preview').remove()">Fechar</button>
                                <button class="btn-save" onclick="downloadMedia('${url}','mp4')">💾 Salvar</button>
                            </div>
                        `;
                        document.body.appendChild(preview);
                        recordedChunks = [];
                    };

                    mediaRecorder.start(100);
                    isRecording = true;
                    document.getElementById('shutterBtn').classList.add('recording');
                    document.getElementById('timerBadge').classList.add('active');
                    seconds = 0;
                    recordingTimer = setInterval(() => {
                        seconds++;
                        const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
                        const secs = String(seconds % 60).padStart(2, '0');
                        document.getElementById('timerBadge').textContent = `${mins}:${secs}`;
                    }, 1000);
                    document.getElementById('suggestion').textContent = '🔴 Gravando... Toque no botão vermelho para parar';
                } catch (err) {
                    console.error('Erro ao gravar:', err);
                    alert('Erro ao gravar vídeo. Verifique as permissões.');
                }
            };

            // Download
            window.downloadMedia = (url, ext) => {
                const link = document.createElement('a');
                link.href = url;
                link.download = `photo-${Date.now()}.${ext}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const checkCameraSupport = () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    root.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;padding:30px;text-align:center;background:#000;color:#fff;">
                            <h2 style="font-size:24px;margin-bottom:10px;">📱 Dispositivo não compatível</h2>
                            <p style="color:#aaa;max-width:300px;">Seu navegador não suporta acesso à câmera.</p>
                        </div>
                    `;
                    return false;
                }
                return true;
            };

            if (checkCameraSupport()) {
                createApp();
            }

            // Simular sugestões IA
            setInterval(() => {
                const suggestionEl = document.getElementById('suggestion');
                if (suggestionEl && !suggestionEl.textContent.includes('📚') && !suggestionEl.textContent.includes('✅') && !suggestionEl.textContent.includes('🔴')) {
                    const actions = [
                        'Mova para esquerda', 'Mova para direita', 'Aproxime', 'Afaste',
                        'Suba a câmera', 'Abaixe a câmera', 'Gire levemente',
                        'Alinhe ao horizonte', 'Posicione no ponto ideal',
                        `Aplique ${currentGuide}`, `Melhor ângulo para ${currentGuide}`
                    ];
                    suggestionEl.textContent = actions[Math.floor(Math.random() * actions.length)];
                }
            }, 5000);

        })();
    </script>
</body>
</html>
