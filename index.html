<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Photo AI" />
    <link rel="manifest" href="/manifest.json" />
    <title>Photo Composition AI</title>
    <style>
        /* ... (mesmo CSS anterior) ... */
        .guide-selector {
            position: absolute;
            top: 80px;
            left: 12px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 60%;
            overflow-y: auto;
            pointer-events: auto;
            padding-right: 5px;
            width: 140px;
        }
        .guide-selector::-webkit-scrollbar {
            width: 3px;
        }
        .guide-selector::-webkit-scrollbar-thumb {
            background: rgba(255,215,0,0.3);
            border-radius: 10px;
        }
        .guide-chip {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
            transition: 0.2s;
            touch-action: manipulation;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* ... resto do CSS ... */
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // TODAS AS 57 REGRAS DE COMPOSIÇÃO
        const COMPOSITION_RULES = [
            // Posicionamento
            'Regra dos Terços',
            'Proporção Áurea',
            'Espiral Áurea',
            'Regra do Centro',
            'Regra dos Quartos',
            'Regra dos Nove Quadrantes',
            // Equilíbrio
            'Simetria',
            'Assimetria Balanceada',
            'Equilíbrio de Peso Visual',
            'Regra dos Ímpares',
            // Linhas
            'Linhas Guia',
            'Linhas Diagonais',
            'Linhas Horizontais',
            'Linhas Verticais',
            'Pontos de Fuga',
            // Estrutura
            'Enquadramento Natural',
            'Moldura Dentro da Moldura',
            'Camadas',
            'Profundidade de Campo',
            'Sobreposição de Elementos',
            // Espaço
            'Espaço Negativo',
            'Espaço Positivo',
            'Espaço Respirável',
            'Minimalismo na Composição',
            // Padrões
            'Ritmo Visual',
            'Repetição de Formas',
            'Textura',
            'Padrões Geométricos',
            // Foco
            'Ponto Focal Único',
            'Múltiplos Pontos Focais',
            'Contraste de Foco',
            'Isolamento do Sujeito',
            'Bokeh',
            // Luz
            'Luz Dura vs Luz Suave',
            'Contraste Tonal',
            'High Key',
            'Low Key',
            'Silhueta',
            'Contraluz',
            // Geometria
            'Triângulos Composicionais',
            'Círculos e Curvas',
            'Formas Geométricas Implícitas',
            'Composição Triangular',
            // Psicologia
            'Hierarquia Visual',
            'Fluxo de Leitura da Imagem',
            'Direção Natural do Olhar',
            'Peso Visual',
            // Cinema
            'Regra do Olhar',
            'Regra da Cabeça',
            'Plano de Fundo Limpo',
            'Separação de Planos',
            'Enquadramento Narrativo',
            // Modernas
            'Quebra Intencional de Regras',
            'Caos Controlado',
            'Composição Abstrata',
            'Minimalismo Extremo',
            'Assimetria Radical'
        ];

        // Função para gerar o seletor de guias
        const renderGuideSelector = (currentGuide) => {
            return COMPOSITION_RULES.map(rule => `
                <div class="guide-chip ${rule === currentGuide ? 'active' : ''}" data-guide="${rule}">
                    ${rule}
                </div>
            `).join('');
        };

        // ... (restante do código com a lista atualizada)
        // No lugar onde você tinha a lista antiga, substitua por COMPOSITION_RULES
        
        // Exemplo de como usar no HTML:
        // <div class="guide-selector" id="guideSelector">
        //     ${renderGuideSelector(currentGuide)}
        // </div>
    </script>
</body>
</html>
